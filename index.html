function stripSid(d){ if(!d||typeof d!=="object")return d; const {_sid,...rest}=d; return rest; }

async function load(){
  try {
    const { data, error } = await sb.from("app_data").select("data").eq("id", ROW_ID).maybeSingle();
    if (error) throw error;
    if (data && data.data) {
      const clean = stripSid(data.data);
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(clean)); } catch(_) {}
      return clean;
    }
    return null;
  } catch (e) {
    try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : null; } catch(_) { return null; }
  }
}
async function save(v){
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(v)); } catch(_) {}
  try {
    const payload = { ...v, _sid: MY_SID };
    const { error } = await sb.from("app_data").upsert({ id: ROW_ID, data: payload, updated_at: new Date().toISOString() });
    if (error) throw error;
    return true;
  } catch (e) { return false; }
}

// Auto-detect subgroup from item name keywords
function guessSubgroup(name,cat){
  const n=(name||"").toLowerCase();
  if(cat==="connectors"){
    if(n.includes("מצמד הברגה"))return "מצמד הברגה";
    if(n.includes("רקורד"))return "רקורד / הברגה";
    if(n.includes("מצמד"))return "מצמדים";
    if(n.includes("זווית")||n.includes("זוית"))return "זוויות";
    if(n.includes("טי "))return "טי";
    if(n.includes("מעבר"))return "מעברים";
    if(n.includes("סופית")||n.includes("פקק"))return "סופיות";
    if(n.includes("רוכב")||n.includes("אוכף")||n.includes("מותקע"))return "רוכבים";
    if(n.includes("שן"))return "מחברי שן";
    if(n.includes("ניפל")||n.includes("מופה")||n.includes("הברגה")||n.includes("מתוברג"))return "אביזרי הברגה";
    return "מצמדים";
  }
  if(cat==="pipes"){
    if(n.includes("טפטוף")||n.includes("טפטפת"))return "טפטוף";
    if(n.includes("מיקרו")||n.includes("שלוחה"))return "מיקרו";
    if(n.includes("גן")||n.includes("גמיש"))return "גן";
    if(n.includes("פוליאתילן")||n.includes("צינור"))return "פוליאתילן";
    return "פוליאתילן";
  }
  if(cat==="sprinklers"){
    if(n.includes("טפטפת")||n.includes("מחלק"))return "טפטפות";
    return "ממטירים";
  }
  if(cat==="spray"){
    if(n.includes("עשב"))return "קוטלי עשבים";
    if(n.includes("דשן")||n.includes("דישון")||n.includes("הזנה"))return "דישון";
    if(n.includes("הרטב")||n.includes("מפזר"))return "עזר";
    if(n.includes("חרק")||n.includes("מזיק")||n.includes("פטר")||n.includes("גופרית")||n.includes("נמל")||n.includes("שמן"))return "הדברה";
    return "הדברה";
  }
  if(cat==="consumables"){
    if(n.includes("חרמש")||n.includes("חוט")||n.includes("דיסק")||n.includes("קסטה"))return "חרמש";
    if(n.includes("שמן")||n.includes("דלק")||n.includes("מיכל"))return "שמנים ודלק";
    if(n.includes("מסור")||n.includes("שרשרת")||n.includes("מזמרה")||n.includes("להב")||n.includes("גיזום"))return "מסור וגיזום";
    if(n.includes("כפפ")||n.includes("משקפ")||n.includes("מגן")||n.includes("אוזני"))return "ציוד מגן";
    return "כללי";
  }
  return "כללי";
}

function getHebrewDate(d){
  try{
    const fmt=new Intl.DateTimeFormat("he-u-ca-hebrew",{day:"numeric",month:"long"});
    const parts=fmt.formatToParts(d);
    let day="",month="";
    parts.forEach(p=>{if(p.type==="day")day=p.value;if(p.type==="month")month=p.value;});
    return {day,month,full:day+" "+month};
  }catch(e){return null;}
}

// Helper: get all photos sorted/filtered
function getAllPhotos(data){
  const all=[];
  Object.keys(data.photos||{}).forEach(key=>{
    (data.photos[key]||[]).forEach(p=>{
      all.push({...p, _key:key});
    });
  });
  return all;
}

          (payload)=>{

            if(!incoming) return;

            const clean = stripSid(incoming);
            setData(p => {
              if(JSON.stringify(p)===JSON.stringify(clean)) return p;
              // SMART MERGE - never lose inventory items or warehouse quantities
              const merged = {...EMPTY, ...clean};
              // Inventory: union of both lists (keep any item that exists in either)
              const localInv = p.inventory || [];
              const remoteInv = clean.inventory || [];
              const invById = {};
              remoteInv.forEach(it=>{ invById[it.id] = it; });
              localInv.forEach(it=>{ if(!invById[it.id]) invById[it.id] = it; });
              merged.inventory = Object.values(invById);
              // Warehouse: keep the higher quantity / preserve data from both
              const localWh = p.warehouse || {};

              Object.keys(localWh).forEach(id=>{
                if(!mergedWh[id]){ mergedWh[id] = localWh[id]; }

                    threshold: r.threshold||l.threshold||0,

        // Check for swapped times
        if(a.startTime && a.endTime && isValidTime(a.startTime) && isValidTime(a.endTime) && a.startTime>a.endTime){

    const billReady=[];
    const reminders=[];

      if(t.billable==="ready")billReady.push({...t,date:d});

        <span style={{fontSize:14,fontWeight:700,color:C.purp}}>{"📅 "+upcomingMeetings.length+" פגישות קרובות"}</span>

            const allCells=[

              {allCells.slice(0,3).map((a,j)=><div key={j} style={{fontSize:8,padding:"1px 3px",borderRadius:3,marginBottom:1,background:a.type==="m"?C.orgB:a.type==="sub"?C.bluB:a.type==="meet"?C.purpB:a.type==="trip"?C.purpB:C.grnP,color:a.type==="m"?C.org:a.type==="sub"?C.blu:a.type==="meet"?C.purp:a.type==="trip"?C.purp:C.grn,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{a.label}</div>)}
              {moreCount>0 && <div style={{fontSize:8,color:C.txtM,textAlign:"center"}}>{"+"+moreCount}</div>}
              {tasks.length>0 && allCells.length===0 && <div style={{fontSize:8,color:C.org,textAlign:"center"}}>{"📌"+tasks.length}</div>}
            </div>;
          })}
        </div>
        <div style={{fontSize:10,color:C.txtL,textAlign:"center",marginTop:10}}>{"לחץ על יום · 🚗=נסיעה · 📅=פגישה · 🔨=קבלן"}</div>

      {/* ── NAVIGATION ── */}

        <button onClick={()=>setView("weekly")} style={{flex:1,padding:"11px 4px",borderRadius:10,border:"1px solid "+C.bdr,background:C.wht,color:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"📅 שבוע"}</button>
        <button onClick={()=>{setSelDay(new Date());setView("daily");}} style={{flex:1,padding:"11px 4px",borderRadius:10,border:"1px solid "+C.bdr,background:C.wht,color:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"📋 היום"}</button>

          <span style={{fontSize:22}}>➕</span>{"משימה"}
        </button>
        <button onClick={()=>{setForm({tripDate:todayISO,tripPlace:"",tripNote:""});setModal("addTrip");}} style={{padding:"14px 4px",borderRadius:12,border:"none",background:C.purp,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <span style={{fontSize:22}}>🚗</span>{"נסיעה"}

        <span style={{fontSize:16}}>⚙️</span>{"עוד פעולות"}
        {((()=>{
          const all=[];Object.values(data.projectOrders||{}).forEach(arr=>arr.forEach(o=>{if(o.status!=="received")all.push(o);}));
          const lowItems=(data.inventory||[]).filter(it=>{
            if(!["connectors","pipes","sprinklers","headsys","spray","consumables"].includes(it.category))return false;
            const wh=(data.warehouse||{})[it.id]||{};
            return (wh.threshold||0)>0 && (wh.qty||0)<=(wh.threshold||0);
          });
          const badges=[];
          if(all.length>0)badges.push("📦"+all.length);
          if(lowItems.length>0)badges.push("⚠️"+lowItems.length);
          return badges.length>0?<span style={{fontSize:11,color:C.org,fontWeight:700}}>{"· "+badges.join(" ")}</span>:null;
        })())}

      {/* Site cards */}
      {(allSites.length>0) && <div style={{marginTop:16}}>

          <span style={{fontSize:14,fontWeight:700,color:C.txt}}>{"📁 כרטיסי לקוח"}</span>

          {allSites.map(s=>{
            const taskCount=Object.values(data.dailyTasks||{}).flat().filter(t=>t.siteId===s.id&&t.status!=="done").length;
            const billCount=Object.values(data.dailyTasks||{}).flat().filter(t=>t.siteId===s.id&&t.billable==="ready").length+(data.billingExtras||[]).filter(e=>e.siteId===s.id&&!e.invoiced).length;

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:14}}>{isDev?"🌱":"🔧"}</span>

  // ═══ PROJECTS DASHBOARD ═══
  const projectsView=(()=>{

      <div style={{textAlign:"center",marginBottom:16}}>

      </div>

      </div>}

      {active.map(p=>{
        const tasks=Object.values(data.dailyTasks||{}).flat().filter(t=>t.siteId===p.id);

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{textAlign:"left",fontSize:12,color:C.txtM}}>
              {p.deadline && <div style={{padding:"3px 8px",borderRadius:8,background:C.bluB,color:C.blu,fontWeight:700,fontSize:10}}>{"יעד: "+p.deadline}</div>}
            </div>

        <input type="date" value={sNDD} onChange={e=>setSNDD(e.target.value)} style={{padding:8,borderRadius:8,border:"1px solid "+C.bdr,fontSize:11,fontFamily:"inherit"}}/>
        <input value={sND} onChange={e=>setSND(e.target.value)} placeholder={"שם פרויקט"} style={{flex:1,minWidth:80,padding:"8px 12px",borderRadius:8,border:"1px solid "+C.bdr,fontSize:14,fontFamily:"inherit",direction:"rtl",outline:"none",boxSizing:"border-box"}}/>

    <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.bdr,padding:16,marginBottom:12}}>
      <div style={{fontSize:15,fontWeight:700,textAlign:"center",marginBottom:6}}>{"📚 מאגר ציוד וצמחייה"}</div>

        const catItems=(data.inventory||[]).filter(it=>it.category===cat.id);
        return <div key={cat.id} style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:6,color:C.grn,padding:"4px 8px",background:C.grnP,borderRadius:6,display:"flex",justifyContent:"space-between"}}>
            <span>{catItems.length}</span>
            <span>{cat.icon+" "+cat.label}</span>
          </div>
          {catItems.map(it=><div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",borderRadius:6,background:C.cardA,marginBottom:4,fontSize:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span onClick={()=>confirmDel(it.name||"פריט",()=>delInvItem(it.id))} style={{cursor:"pointer",color:C.red,fontSize:14}}>{"✕"}</span>
              {it.defaultPrice>0 && <span style={{padding:"1px 6px",borderRadius:8,fontSize:10,background:"#fff3cd",color:C.org,fontWeight:600}}>{"₪"+it.defaultPrice}</span>}
              {it.size && <span style={{padding:"1px 6px",borderRadius:8,fontSize:10,background:C.bluB,color:C.blu}}>{it.size}</span>}
            </div>
            <span style={{fontWeight:500}}>{it.name}</span>
          </div>)}
          {/* Add item to this category */}
          <div style={{display:"flex",gap:4,marginTop:6}}>
            <button onClick={()=>{setForm({invCategory:cat.id,invName:"",invSize:cat.sizes[0]||"",invPrice:""});setModal("addInvItem");}} style={{padding:"6px 12px",borderRadius:8,border:"1px dashed "+C.grn,background:C.grnP,color:C.grn,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",width:"100%"}}>{"+ הוסף "+cat.label.slice(0,-1)}</button>
          </div>
        </div>;
      })}
    </div>
    <div style={{textAlign:"center",marginTop:16}}><button onClick={()=>setModal("reset")} style={{padding:"10px 20px",borderRadius:10,border:"none",background:C.red,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"🗑 איפוס"}</button></div>
  </div>;

  // ═══ MODALS ═══
  const renderModal=()=>{
    if(!modal)return null;
    const ov={position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(3px)",padding:16};
    const bx={background:C.card,borderRadius:16,padding:22,width:400,maxWidth:"95vw",maxHeight:"85vh",overflowY:"auto"};
    const close=()=>{setModal(null);setExpImg(null);setExpStep(0);};
    const inp={width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bdr,fontSize:14,fontFamily:"inherit",boxSizing:"border-box",direction:"rtl",outline:"none"};
    const sb={width:"100%",padding:14,borderRadius:12,border:"none",background:C.grn,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginTop:8};
    const lb={fontSize:12,fontWeight:600,color:C.txtM,display:"block",marginBottom:4};

    // ─── ADD TRIP ───
    if(modal==="addTrip")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.purp,marginBottom:14,textAlign:"center"}}>{"🚗 הוספת נסיעה"}</h3>
      <div style={{marginBottom:12}}>
        <label style={lb}>{"לאיפה?"}</label>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
          {TRIP_PRESETS.map(p=><button key={p} onClick={()=>setForm({...form,tripPlace:p})} style={{width:"100%",padding:"14px",borderRadius:10,border:"2px solid "+(form.tripPlace===p?C.purp:C.bdr),background:form.tripPlace===p?C.purpB:"#fff",color:form.tripPlace===p?C.purp:C.txt,fontSize:16,fontWeight:form.tripPlace===p?700:500,cursor:"pointer",fontFamily:"inherit",textAlign:"right",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>{form.tripPlace===p?"✓":""}</span>
            <span>{"📍 "+p}</span>
          </button>)}
        </div>
        <input value={(TRIP_PRESETS.includes(form.tripPlace)?"":form.tripPlace)||""} onChange={e=>setForm({...form,tripPlace:e.target.value})} placeholder={"או מקום אחר..."} style={inp}/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={lb}>{"מה הלכת להביא / הערה"}</label>
        <textarea value={form.tripNote||""} onChange={e=>setForm({...form,tripNote:e.target.value})} placeholder={"לדוגמה: דשן, זרעים..."} style={{...inp,minHeight:70,resize:"vertical"}}/>
      </div>
      <div style={{marginBottom:14}}>
        <label style={lb}>{"תאריך"}</label>
        <input type="date" value={form.tripDate||selISO} onChange={e=>setForm({...form,tripDate:e.target.value})} style={inp}/>
      </div>
      <button onClick={saveTrip} style={{...sb,background:C.purp}}>{"שמור נסיעה"}</button>
    </div></div>;

    // ─── ADD MEETING ───
    if(modal==="addMeeting")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.purp,marginBottom:14,textAlign:"center"}}>{"📅 פגישה חדשה"}</h3>
      <div style={{marginBottom:12}}>
        <label style={lb}>{"לקוח / אתר"}</label>
        <select value={form.meetingSiteId||""} onChange={e=>setForm({...form,meetingSiteId:e.target.value})} style={inp}>
          <option value="">{"-- בחר --"}</option>
          {allSites.map(s=><option key={s.id} value={s.id}>{(s.type==="m"?"🔧 ":"🌱 ")+s.name}</option>)}
          <option value="__custom__">{"📍 מקום אחר..."}</option>
        </select>
      </div>
      {form.meetingSiteId==="__custom__" && <div style={{marginBottom:12}}>
        <label style={lb}>{"שם / מקום הפגישה"}</label>
        <input value={form.meetingCustomPlace||""} onChange={e=>setForm({...form,meetingCustomPlace:e.target.value})} placeholder={"לדוגמה: בנק, רואה חשבון, אחר..."} style={inp} autoFocus/>
      </div>}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{flex:1}}><label style={lb}>{"תאריך"}</label><input type="date" value={form.meetingDate||todayISO} onChange={e=>setForm({...form,meetingDate:e.target.value})} style={inp}/></div>
        <div style={{flex:1}}><label style={lb}>{"שעה"}</label><input type="time" value={form.meetingTime||""} onChange={e=>setForm({...form,meetingTime:e.target.value})} style={inp}/></div>
      </div>
      <div style={{marginBottom:14}}>
        <label style={lb}>{"הערות / נושאים"}</label>
        <textarea value={form.meetingNotes||""} onChange={e=>setForm({...form,meetingNotes:e.target.value})} placeholder={"מה לדבר עליו..."} style={{...inp,minHeight:70,resize:"vertical"}}/>
      </div>
      <button onClick={saveMeeting} style={{...sb,background:C.purp}}>{"שמור פגישה"}</button>
    </div></div>;

    // ─── ADD PROJECT ───
    if(modal==="addProject")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.blu,marginBottom:14,textAlign:"center"}}>{"🌱 פרויקט חדש"}</h3>
      <div style={{marginBottom:10}}><label style={lb}>{"שם הפרויקט"}</label><input value={form.newProjectName||""} onChange={e=>setForm({...form,newProjectName:e.target.value})} style={inp} autoFocus/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"שם הלקוח"}</label><input value={form.newProjectClient||""} onChange={e=>setForm({...form,newProjectClient:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"טלפון"}</label><input type="tel" value={form.newProjectPhone||""} onChange={e=>setForm({...form,newProjectPhone:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"כתובת"}</label><input value={form.newProjectAddress||""} onChange={e=>setForm({...form,newProjectAddress:e.target.value})} style={inp}/></div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1}}><label style={lb}>{"💼 הצעת מחיר (₪)"}</label><input type="number" value={form.newProjectPrice||""} onChange={e=>setForm({...form,newProjectPrice:e.target.value})} placeholder={"4500"} style={inp}/></div>
        <div style={{flex:1}}><label style={lb}>{"📄 מס' הצעת מחיר"}</label><input value={form.newProjectQuoteNumber||""} onChange={e=>setForm({...form,newProjectQuoteNumber:e.target.value})} placeholder={"לדוגמה: 1024"} style={inp}/></div>
      </div>
      <div style={{marginBottom:14}}>
        <label style={lb}>{"יעד סיום"}</label><input type="date" value={form.newProjectDeadline||""} onChange={e=>setForm({...form,newProjectDeadline:e.target.value})} style={inp}/>
      </div>
      <button onClick={()=>{if(!(form.newProjectName||"").trim())return;up(d=>{d.devSites=[...(d.devSites||[]),{id:uid(),name:form.newProjectName.trim(),deadline:form.newProjectDeadline||"",quotedPrice:+form.newProjectPrice||0,quoteNumber:form.newProjectQuoteNumber||"",client:form.newProjectClient||"",phone:form.newProjectPhone||"",address:form.newProjectAddress||"",status:"active"}];});setForm({});setModal(null);}} style={{...sb,background:C.blu}}>{"צור פרויקט"}</button>
    </div></div>;

    // ─── ADD INVENTORY ITEM ───
    if(modal==="addInvItem"){
      const cat=INV_CATS.find(c=>c.id===form.invCategory);
      if(!cat)return null;
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
        <h3 style={{fontSize:18,color:C.grn,marginBottom:14,textAlign:"center"}}>{cat.icon+" הוסף "+cat.label.slice(0,-1)}</h3>
        <div style={{marginBottom:10}}><label style={lb}>{"שם הפריט"}</label><input value={form.invName||""} onChange={e=>setForm({...form,invName:e.target.value})} placeholder={cat.id==="trees"?"לדוגמה: זית סורי":cat.id==="shrubs"?"לדוגמה: לבנדר":"לדוגמה: פיטוניה"} style={inp} autoFocus/></div>
        <div style={{marginBottom:10}}>
          <label style={lb}>{"גודל"}</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(cat.sizes.length,4)+", 1fr)",gap:6,marginBottom:6}}>
            {cat.sizes.map(sz=><button key={sz} onClick={()=>setForm({...form,invSize:sz})} style={{padding:"8px 4px",borderRadius:8,border:"2px solid "+(form.invSize===sz?C.grn:C.bdr),background:form.invSize===sz?C.grnP:"#fff",color:form.invSize===sz?C.grn:C.txtM,fontSize:12,fontWeight:form.invSize===sz?700:500,cursor:"pointer",fontFamily:"inherit"}}>{sz}</button>)}
          </div>
          <input value={form.invSize||""} onChange={e=>setForm({...form,invSize:e.target.value})} placeholder={"או הקלד גודל אחר..."} style={{...inp,fontSize:12,padding:"6px 10px"}}/>
        </div>
        <div style={{marginBottom:14}}><label style={lb}>{"מחיר ברירת מחדל ₪ (אופציונלי)"}</label><input type="number" value={form.invPrice||""} onChange={e=>setForm({...form,invPrice:e.target.value})} placeholder={"לדוגמה: 25"} style={inp}/></div>
        <button onClick={()=>{addInvItem();}} style={{...sb,background:C.grn}}>{"שמור והמשך"}</button>
        <button onClick={close} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginTop:6}}>{"סיים"}</button>
      </div></div>;
    }

    // ─── ADD ORDER (single, to specific project) ───
    if(modal==="addOrder")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.org,marginBottom:14,textAlign:"center"}}>{"📦 הזמנה חדשה"}</h3>
      {!form.orderProjectId && <div style={{marginBottom:10}}><label style={lb}>{"לאיזה פרויקט?"}</label>
        <select value={form.orderProjectId||""} onChange={e=>setForm({...form,orderProjectId:e.target.value})} style={inp} autoFocus>
          <option value="">{"-- בחר פרויקט --"}</option>
          {(data.devSites||[]).filter(p=>p.status!=="done").map(p=><option key={p.id} value={p.id}>{"🌱 "+p.name}</option>)}
        </select>
      </div>}
      {form.orderProjectId && <div style={{marginBottom:10,padding:"8px 10px",background:C.bluB,borderRadius:8,fontSize:13,color:C.blu,fontWeight:600,textAlign:"center"}}>{"🌱 "+(allSites.find(s=>s.id===form.orderProjectId)?.name||"")}</div>}
      <div style={{marginBottom:10}}><label style={lb}>{"מה הוזמן?"}</label><input value={form.orderDesc||""} onChange={e=>setForm({...form,orderDesc:e.target.value})} placeholder={"לדוגמה: דקל אדום, 5 שתילים"} style={inp} autoFocus={!!form.orderProjectId}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"ספק"}</label><input value={form.orderSupplier||""} onChange={e=>setForm({...form,orderSupplier:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"מחיר (₪)"}</label><input type="number" value={form.orderAmount||""} onChange={e=>setForm({...form,orderAmount:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"סטטוס"}</label>
        <select value={form.orderStatus||"ordered"} onChange={e=>setForm({...form,orderStatus:e.target.value})} style={inp}>
          <option value="ordered">{"📞 הוזמן"}</option><option value="onway">{"🚛 בדרך"}</option><option value="received">{"✅ התקבל"}</option>
        </select>
      </div>
      <div style={{marginBottom:14}}><label style={lb}>{"הערות"}</label><textarea value={form.orderNote||""} onChange={e=>setForm({...form,orderNote:e.target.value})} style={{...inp,minHeight:50}}/></div>
      <button onClick={addOrder} style={{...sb,background:C.org}}>{"שמור הזמנה"}</button>
    </div></div>;

    // ─── EDIT ORDER ───
    if(modal==="editOrder")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.blu,marginBottom:14,textAlign:"center"}}>{"✏️ עריכת הזמנה"}</h3>
      <div style={{marginBottom:10,padding:"8px 10px",background:C.bluB,borderRadius:8,fontSize:13,color:C.blu,fontWeight:600,textAlign:"center"}}>{"🌱 "+(allSites.find(s=>s.id===form.editOrderPid)?.name||"")}</div>
      <div style={{marginBottom:10}}><label style={lb}>{"מה הוזמן?"}</label><input value={form.orderDesc||""} onChange={e=>setForm({...form,orderDesc:e.target.value})} style={inp} autoFocus/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"ספק"}</label><input value={form.orderSupplier||""} onChange={e=>setForm({...form,orderSupplier:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"מחיר (₪)"}</label><input type="number" value={form.orderAmount||""} onChange={e=>setForm({...form,orderAmount:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"סטטוס"}</label>
        <select value={form.orderStatus||"ordered"} onChange={e=>setForm({...form,orderStatus:e.target.value})} style={inp}>
          <option value="ordered">{"📞 הוזמן"}</option><option value="onway">{"🚛 בדרך"}</option><option value="received">{"✅ התקבל"}</option>
        </select>
      </div>
      <div style={{marginBottom:14}}><label style={lb}>{"הערות"}</label><textarea value={form.orderNote||""} onChange={e=>setForm({...form,orderNote:e.target.value})} style={{...inp,minHeight:50}}/></div>
      <button onClick={editOrder} style={{...sb,background:C.blu}}>{"שמור שינויים"}</button>
    </div></div>;


    // ─── DAY ACTIONS MENU (hidden actions) ───
    // ─── SITE DAY ACTIONS (move/remove from day) ───
    if(modal==="siteDayActions"){
      const siteId=form.moveSiteId;
      const siteName=form.moveSiteName||"";
      const fromDay=form.moveFromDay;

      const removeFromDay=()=>{
        confirmDel(siteName+" מיום זה",()=>{
          up(d=>{
            if(d.weekAssign && d.weekAssign[fromDay]){
              d.weekAssign[fromDay]=d.weekAssign[fromDay].filter(x=>x.siteId!==siteId);
            }
          });
        });
      };

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:420,padding:18}}>
        <h3 style={{textAlign:"right",marginBottom:6,fontSize:17}}>{"⚙️ פעולות"}</h3>
        <div style={{textAlign:"right",fontSize:13,color:C.txtM,marginBottom:14}}>{siteName+" · "+fmtFull(new Date(fromDay))}</div>

        <button onClick={()=>{setForm({...form,moveTargetDate:""});setModal("siteMoveToDay");}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.blu,background:C.bluB,color:C.blu,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:14,fontWeight:700}}>
          {"📅 העבר ליום אחר"}
        </button>

        <button onClick={removeFromDay} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.red,background:"#fff5f5",color:C.red,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:14,fontWeight:700}}>
          {"🗑 הסר מיום זה"}
        </button>

        <button onClick={close} style={{...sb,background:C.cardA,color:C.txt,marginTop:6}}>{"ביטול"}</button>
      </div></div>;
    }

    // ─── SITE MOVE TO DAY (date picker) ───
    if(modal==="siteMoveToDay"){
      const siteId=form.moveSiteId;
      const siteName=form.moveSiteName||"";
      const fromDay=form.moveFromDay;
      const targetDate=form.moveTargetDate||"";

      // Quick options
      const tomorrow=(()=>{const d=new Date(fromDay);d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})();
      const dayAfter=(()=>{const d=new Date(fromDay);d.setDate(d.getDate()+2);return d.toISOString().slice(0,10);})();
      const nextWeek=(()=>{const d=new Date(fromDay);d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);})();

      const doMove=(tDate)=>{
        if(!tDate||tDate===fromDay)return;
        // Find the type from the source assignment
        up(d=>{
          if(!d.weekAssign||!d.weekAssign[fromDay])return;
          const item=d.weekAssign[fromDay].find(x=>x.siteId===siteId);
          if(!item)return;
          // Remove from source day
          d.weekAssign[fromDay]=d.weekAssign[fromDay].filter(x=>x.siteId!==siteId);
          // Add to target day (if not already there)
          if(!d.weekAssign[tDate])d.weekAssign[tDate]=[];
          if(!d.weekAssign[tDate].some(x=>x.siteId===siteId)){
            d.weekAssign[tDate].push({siteId,type:item.type});
          }
        });
        setModal(null);
        setForm({});
      };

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:420,padding:18}}>
        <h3 style={{textAlign:"right",marginBottom:6,fontSize:17}}>{"📅 העבר ליום אחר"}</h3>
        <div style={{textAlign:"right",fontSize:13,color:C.txtM,marginBottom:14}}>{siteName}</div>

        <div style={{fontSize:11,color:C.txtM,marginBottom:6,textAlign:"right"}}>{"בחירה מהירה:"}</div>
        <button onClick={()=>doMove(tomorrow)} style={{width:"100%",padding:12,marginBottom:6,borderRadius:10,border:"1.5px solid "+C.blu,background:"#fff",color:C.blu,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:13,fontWeight:700}}>
          {"➡️ מחר ("+fmtFull(new Date(tomorrow))+")"}
        </button>
        <button onClick={()=>doMove(dayAfter)} style={{width:"100%",padding:12,marginBottom:6,borderRadius:10,border:"1.5px solid "+C.blu,background:"#fff",color:C.blu,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:13,fontWeight:700}}>
          {"➡️ מחרתיים ("+fmtFull(new Date(dayAfter))+")"}
        </button>
        <button onClick={()=>doMove(nextWeek)} style={{width:"100%",padding:12,marginBottom:12,borderRadius:10,border:"1.5px solid "+C.blu,background:"#fff",color:C.blu,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:13,fontWeight:700}}>
          {"➡️ שבוע הבא ("+fmtFull(new Date(nextWeek))+")"}
        </button>

        <div style={{fontSize:11,color:C.txtM,marginBottom:6,textAlign:"right",marginTop:10,paddingTop:10,borderTop:"1px solid "+C.bdr}}>{"או בחר תאריך אחר:"}</div>
        <div style={{display:"flex",gap:6}}>
          <input type="date" value={targetDate} onChange={e=>setForm({...form,moveTargetDate:e.target.value})} min={fromDay} style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1px solid "+C.bdr,fontSize:13,fontFamily:"inherit"}}/>
          <button onClick={()=>doMove(targetDate)} disabled={!targetDate} style={{padding:"10px 18px",borderRadius:10,border:"none",background:targetDate?C.blu:C.bdr,color:"#fff",fontSize:13,fontWeight:700,cursor:targetDate?"pointer":"not-allowed",fontFamily:"inherit",opacity:targetDate?1:0.5}}>{"העבר"}</button>
        </div>

        <button onClick={()=>{setForm({moveSiteId:siteId,moveSiteName:siteName,moveFromDay:fromDay});setModal("siteDayActions");}} style={{...sb,background:C.cardA,color:C.txt,marginTop:14}}>{"← חזור"}</button>
      </div></div>;
    }

    if(modal==="dayActions"){
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:420,padding:18}}>
        <h3 style={{textAlign:"right",marginBottom:14,fontSize:17}}>{"⚙️ פעולות נוספות"}</h3>

        <button onClick={()=>setModal("addToDay")} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.grn,background:C.grnP,color:C.grn,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:14,fontWeight:700}}>
          {"➕  הוסף ללוח היום"}
        </button>

        <button onClick={()=>{setForm({meetingSiteId:"",meetingDate:selISO,meetingTime:"",meetingNotes:"",meetingCustomPlace:""});setModal("addMeeting");}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.purp,background:C.purpB,color:C.purp,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:14,fontWeight:700}}>
          {"📅  הוסף פגישה"}
        </button>

        <button onClick={()=>{setForm({tripDate:selISO,tripPlace:"",tripNote:""});setModal("addTrip");}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.purp,background:C.purpB,color:C.purp,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:14,fontWeight:700}}>
          {"🚗  הוסף נסיעה"}
        </button>

        <button onClick={()=>{setDailyTab("workers");setModal(null);}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.bdr,background:C.cardA,color:C.txt,cursor:"pointer",fontFamily:"inherit",textAlign:"right",fontSize:14,fontWeight:700}}>
          {"🧑  סמן נוכחות עובדים"}
        </button>

        <button onClick={close} style={{...sb,background:C.cardA,color:C.txt,marginTop:6}}>{"ביטול"}</button>
      </div></div>;
    }

    // ─── ADD TO DAY MENU ───
    if(modal==="addToDay"){
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:420,padding:18}}>
        <h3 style={{textAlign:"right",marginBottom:14,fontSize:17}}>{"➕ הוסף ללוח היום"}</h3>
        <div style={{fontSize:11,color:C.txtM,marginBottom:14,textAlign:"right"}}>{fmtFull(new Date(selISO))}</div>

        <button onClick={()=>{setModal("addSiteToDay");setForm({});}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.grn,background:C.grnP,color:C.grn,cursor:"pointer",fontFamily:"inherit",textAlign:"right"}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>{"🏠 הוסף לקוח/אתר ליום"}</div>
          <div style={{fontSize:11,color:C.txtM}}>{"לקוח שלא היה משובץ - יתווסף לרשימה של היום"}</div>
        </button>

        <button onClick={()=>{setForm({notes:"",siteId:"",type:"",image:"",taskDate:selISO});setModal("addTask");}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.blu,background:C.bluB,color:C.blu,cursor:"pointer",fontFamily:"inherit",textAlign:"right"}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>{"📋 משימה כללית"}</div>
          <div style={{fontSize:11,color:C.txtM}}>{"משימה כללית - לקנות חומרים, התקשרויות וכד'"}</div>
        </button>

        <button onClick={()=>{setForm({extendSiteId:"",extendDays:1});setModal("extendProject");}} style={{width:"100%",padding:14,marginBottom:8,borderRadius:12,border:"2px solid "+C.org,background:"#fff7ed",color:C.org,cursor:"pointer",fontFamily:"inherit",textAlign:"right"}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:3}}>{"🔄 הארך פרויקט קיים"}</div>
          <div style={{fontSize:11,color:C.txtM}}>{"פרויקט שלא נגמר - להוסיף עוד ימים"}</div>
        </button>

        <button onClick={close} style={{...sb,background:C.cardA,color:C.txt,marginTop:6}}>{"ביטול"}</button>
      </div></div>;
    }

    // ─── ADD SITE TO DAY ───
    if(modal==="addSiteToDay"){
      const allSites=[...(data.maintenanceSites||[]).map(s=>({...s,_isMaint:true})),...(data.devSites||[]).filter(s=>s.status!=="done").map(s=>({...s,_isMaint:false}))];
      // Find sites already assigned today (correct structure: weekAssign[ISO date] = [{siteId, type}])
      const todayAssigns=(data.weekAssign||{})[selISO]||[];
      const alreadyAssigned=new Set(todayAssigns.map(a=>a.siteId));
      const availableSites=allSites.filter(s=>!alreadyAssigned.has(s.id));
      const selectedSiteId=form.targetSiteId||"";

      const doAdd=()=>{
        if(!selectedSiteId)return;
        // Find the site type
        const isMaint=(data.maintenanceSites||[]).some(s=>s.id===selectedSiteId);
        const type=isMaint?"m":"d";
        up(d=>{
          if(!d.weekAssign)d.weekAssign={};
          if(!d.weekAssign[selISO])d.weekAssign[selISO]=[];
          // Don't add duplicate
          if(!d.weekAssign[selISO].some(a=>a.siteId===selectedSiteId)){
            d.weekAssign[selISO].push({siteId:selectedSiteId,type});
          }
        });
        setModal(null);
        setForm({});
      };

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:480,padding:18,maxHeight:"90vh",overflowY:"auto"}}>
        <h3 style={{textAlign:"right",marginBottom:6,fontSize:17}}>{"🏠 הוסף לקוח/אתר ליום"}</h3>
        <div style={{fontSize:11,color:C.txtM,marginBottom:14,textAlign:"right"}}>{fmtFull(new Date(selISO))}</div>

        <label style={{...lb,fontSize:12}}>{"🏠 בחר לקוח / אתר:"}</label>
        {availableSites.length===0 ? <div style={{padding:14,textAlign:"center",color:C.txtM,fontSize:12}}>{"כל הלקוחות כבר משובצים היום"}</div> : <div style={{maxHeight:380,overflowY:"auto",border:"1px solid "+C.bdr,borderRadius:10,marginBottom:14}}>
          {availableSites.map(s=><div key={s.id} onClick={()=>setForm({...form,targetSiteId:s.id})} style={{padding:"12px 14px",borderBottom:"1px solid "+C.bdr,cursor:"pointer",background:selectedSiteId===s.id?C.grnP:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:selectedSiteId===s.id?C.grn:C.txtL,fontWeight:700}}>{selectedSiteId===s.id?"✓":""}</span>
            <span style={{fontWeight:selectedSiteId===s.id?700:500,fontSize:14,textAlign:"right"}}>{(s._isMaint?"🔧 ":"🌱 ")+s.name}</span>
          </div>)}
        </div>}

        <button onClick={doAdd} disabled={!selectedSiteId} style={{...sb,background:selectedSiteId?C.grn:C.bdr,opacity:selectedSiteId?1:0.5}}>{"הוסף ליום"}</button>

        <button onClick={()=>{setModal("addToDay");}} style={{...sb,background:C.cardA,color:C.txt,marginTop:6}}>{"← חזור"}</button>
      </div></div>;
    }

    // ─── EXTEND PROJECT ───
    if(modal==="extendProject"){
      // Find sites currently assigned this day (correct structure: weekAssign[ISO date] = [{siteId, type}])
      const todayAssigns=(data.weekAssign||{})[selISO]||[];
      const allSites=[...(data.maintenanceSites||[]),...(data.devSites||[])];
      const todayAssignedSites=todayAssigns.map(a=>allSites.find(s=>s.id===a.siteId)).filter(Boolean);

      const selSite=form.extendSiteId||"";
      const days=form.extendDays||1;

      const doExtend=()=>{
        if(!selSite||!days)return;
        const isMaint=(data.maintenanceSites||[]).some(s=>s.id===selSite);
        const type=isMaint?"m":"d";
        // Add the site to the next N days
        up(d=>{
          if(!d.weekAssign)d.weekAssign={};
          for(let i=1;i<=days;i++){
            const futureDate=new Date(selISO);
            futureDate.setDate(futureDate.getDate()+i);
            const futureISO=futureDate.toISOString().slice(0,10);
            if(!d.weekAssign[futureISO])d.weekAssign[futureISO]=[];
            // Don't add duplicate
            if(!d.weekAssign[futureISO].some(a=>a.siteId===selSite)){
              d.weekAssign[futureISO].push({siteId:selSite,type});
            }
          }
        });
        setModal(null);
        setForm({});
      };

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:480,padding:18}}>
        <h3 style={{textAlign:"right",marginBottom:6,fontSize:17}}>{"🔄 הארך פרויקט"}</h3>
        <div style={{fontSize:11,color:C.txtM,marginBottom:14,textAlign:"right"}}>{"בחר פרויקט מהיום והוסף אותו לימים הקרובים"}</div>

        {todayAssignedSites.length===0 ? <div style={{padding:20,textAlign:"center",background:"#fee",borderRadius:10,marginBottom:12,color:C.red,fontSize:13}}>
          {"אין פרויקטים משובצים ביום זה"}
        </div> : <React.Fragment>

        <label style={{...lb,fontSize:12}}>{"בחר פרויקט/אתר מהיום:"}</label>
        <div style={{maxHeight:200,overflowY:"auto",border:"1px solid "+C.bdr,borderRadius:10,marginBottom:14}}>
          {todayAssignedSites.map(s=>{
            const isMaint=(data.maintenanceSites||[]).some(m=>m.id===s.id);
            return <div key={s.id} onClick={()=>setForm({...form,extendSiteId:s.id})} style={{padding:"10px 12px",borderBottom:"1px solid "+C.bdr,cursor:"pointer",background:selSite===s.id?C.grnP:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:C.txtL}}>{selSite===s.id?"✓":""}</span>
              <span style={{fontWeight:selSite===s.id?700:500,fontSize:13}}>{(isMaint?"🔧 ":"🌱 ")+s.name}</span>
            </div>;
          })}
        </div>

        <label style={{...lb,fontSize:12}}>{"להאריך לכמה ימים נוספים:"}</label>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setForm({...form,extendDays:n})} style={{flex:1,padding:"10px 4px",borderRadius:10,border:"1.5px solid "+(days===n?C.grn:C.bdr),background:days===n?C.grnP:"#fff",color:days===n?C.grn:C.txt,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13}}>{n+(n===1?" יום":" ימים")}</button>)}
        </div>

        <button onClick={doExtend} disabled={!selSite} style={{...sb,background:selSite?C.grn:C.bdr,opacity:selSite?1:0.5}}>{"הארך"}</button>
        </React.Fragment>}

        <button onClick={()=>{setModal("addToDay");}} style={{...sb,background:C.cardA,color:C.txt,marginTop:6}}>{"← חזור"}</button>
      </div></div>;
    }


    // ─── SITE DAILY LOG (per-site daily summary modal) ───
    // ─── GENERIC DELETE CONFIRMATION ───
    // ─── REMINDERS ARCHIVE ───
    // ─── MONTHLY REPORT (DETAILED) ───
    if(modal==="monthlyReport"){
      const today=new Date();
      const reportMonth=form.reportMonth!=null?form.reportMonth:today.getMonth();
      const reportYear=form.reportYear!=null?form.reportYear:today.getFullYear();
      const monthStart=new Date(reportYear,reportMonth,1);
      const monthEnd=new Date(reportYear,reportMonth+1,0);
      const monthStartISO=monthStart.toISOString().slice(0,10);
      const monthEndISO=monthEnd.toISOString().slice(0,10);
      const monthName=monthStart.toLocaleDateString("he-IL",{month:"long",year:"numeric"});
      const reportTab=form.reportTab||"overview";

      const inMonth=(dateStr)=>dateStr>=monthStartISO && dateStr<=monthEndISO;

      // Helper to parse "07:00" to minutes
      const timeToMin=(t)=>{if(!t||typeof t!=="string")return 0;const m=t.match(/^(\d{1,2}):(\d{1,2})$/);if(!m)return 0;return (+m[1])*60+(+m[2]);};

      // Expected visits per frequency
      const expectedVisitsByFreq={
        "2 פעמים בשבוע":8,
        "כל שבוע":4,
        "דו שבועי":2,
        "פעמיים בחודש":2,
        "פעם בחודש":1
      };

      // ── DATA AGGREGATION ──

      // 1. Site visits
      const siteVisits={};
      Object.keys(data.weekAssign||{}).forEach(d=>{
        if(!inMonth(d))return;
        (data.weekAssign[d]||[]).forEach(a=>{
          if(!siteVisits[a.siteId])siteVisits[a.siteId]={count:0,dates:[],type:a.type};
          siteVisits[a.siteId].count++;
          siteVisits[a.siteId].dates.push(d);
        });
      });

      // 2. Worker stats
      const workerStats={};
      (data.workers||[]).filter(w=>w.type!=="sub").forEach(w=>{
        workerStats[w.id]={name:w.name,present:0,absent:0,totalMinutes:0,reasons:{},sitesByWorker:{},dailyHours:[]};
      });
      Object.keys(data.attendance||{}).forEach(d=>{
        if(!inMonth(d))return;
        Object.keys(data.attendance[d]||{}).forEach(wid=>{
          if(!workerStats[wid])return;
          const a=data.attendance[d][wid];
          if(a.present){
            workerStats[wid].present++;
            const start=timeToMin(a.startTime||"07:00");
            const end=timeToMin(a.endTime||"16:00");
            const hours=Math.max(0,end-start);
            workerStats[wid].totalMinutes+=hours;
            workerStats[wid].dailyHours.push({date:d,minutes:hours});
            // Track sites for worker
            const sites=Array.isArray(a.siteIds)?a.siteIds:(a.siteId?[a.siteId]:[]);
            sites.forEach(sid=>{
              if(!workerStats[wid].sitesByWorker[sid])workerStats[wid].sitesByWorker[sid]=0;
              workerStats[wid].sitesByWorker[sid]++;
            });
          } else if(a.absenceReason && a.absenceReason.trim()){
            workerStats[wid].absent++;
            const r=a.absenceReason;
            workerStats[wid].reasons[r]=(workerStats[wid].reasons[r]||0)+1;
          }
        });
      });

      // 3. Tasks
      let tasksCompleted=0,tasksOpen=0;
      const tasksBySite={};
      Object.keys(data.dailyTasks||{}).forEach(d=>{
        if(!inMonth(d))return;
        (data.dailyTasks[d]||[]).forEach(t=>{
          if(t.status==="done")tasksCompleted++;
          else tasksOpen++;
          if(t.siteId){
            if(!tasksBySite[t.siteId])tasksBySite[t.siteId]={done:0,open:0};
            if(t.status==="done")tasksBySite[t.siteId].done++;
            else tasksBySite[t.siteId].open++;
          }
        });
      });

      // 4. Reports
      const reportsBySite={};
      let totalReports=0;
      Object.keys(data.dailyLogs||{}).forEach(d=>{
        if(!inMonth(d))return;
        Object.keys(data.dailyLogs[d]||{}).forEach(sid=>{
          const log=data.dailyLogs[d][sid];
          if(log && (log.summary||(log.extras||[]).length>0)){
            totalReports++;
            if(!reportsBySite[sid])reportsBySite[sid]=[];
            reportsBySite[sid].push({date:d,...log});
          }
        });
      });

      // 5. Orders
      const ordersBySite={};
      let totalOrders=0,totalOrdersAmount=0;
      Object.keys(data.projectOrders||{}).forEach(pid=>{
        (data.projectOrders[pid]||[]).forEach(o=>{
          if(o.date && inMonth(o.date)){
            totalOrders++;
            totalOrdersAmount+=(+o.amount||0);
            if(!ordersBySite[pid])ordersBySite[pid]={count:0,amount:0,items:[]};
            ordersBySite[pid].count++;
            ordersBySite[pid].amount+=(+o.amount||0);
            ordersBySite[pid].items.push(o);
          }
        });
      });

      // 6. Billing extras
      const extrasBySite={};
      let totalExtras=0,totalExtrasAmount=0;
      Object.keys(data.dailyLogs||{}).forEach(d=>{
        if(!inMonth(d))return;
        Object.keys(data.dailyLogs[d]||{}).forEach(sid=>{
          const log=data.dailyLogs[d][sid];
          (log.extras||[]).forEach(ex=>{
            if(ex.desc){
              totalExtras++;
              const amt=+ex.amount||0;
              totalExtrasAmount+=amt;
              if(!extrasBySite[sid])extrasBySite[sid]={count:0,amount:0,items:[]};
              extrasBySite[sid].count++;
              extrasBySite[sid].amount+=amt;
              extrasBySite[sid].items.push({...ex,date:d});
            }
          });
        });
      });

      // 7. Trips & meetings
      let totalTrips=0;
      Object.keys(data.trips||{}).forEach(d=>{if(inMonth(d))totalTrips+=(data.trips[d]||[]).length;});
      let totalMeetings=0;
      Object.keys(data.meetings||{}).forEach(d=>{if(inMonth(d))totalMeetings+=(data.meetings[d]||[]).length;});

      // 8. Consistency check - missed visits
      const missedSites=[];
      (data.maintenanceSites||[]).forEach(s=>{
        const visits=(siteVisits[s.id]||{}).count||0;
        const expected=expectedVisitsByFreq[s.frequency]||0;
        if(expected>0){
          const ratio=visits/expected;
          if(ratio<1){
            missedSites.push({
              site:s,
              visits,
              expected,
              missing:expected-visits,
              ratio
            });
          }
        }
      });
      missedSites.sort((a,b)=>a.ratio-b.ratio);

      // Helper: format minutes to "H:MM"
      const fmtMin=(min)=>{const h=Math.floor(min/60);const m=min%60;return h+":"+(m<10?"0":"")+m;};

      // ── TABS ──
      const tabs=[
        {id:"overview",label:"סקירה",icon:"📊"},
        {id:"workers",label:"עובדים",icon:"👷"},
        {id:"sites",label:"לקוחות",icon:"🏠"},
        {id:"alerts",label:"התראות",icon:"⚠️"}
      ];

      // Month navigation
      const prevMonth=()=>{
        let m=reportMonth-1,y=reportYear;
        if(m<0){m=11;y--;}
        setForm({...form,reportMonth:m,reportYear:y});
      };
      const nextMonth=()=>{
        let m=reportMonth+1,y=reportYear;
        if(m>11){m=0;y++;}
        setForm({...form,reportMonth:m,reportYear:y});
      };

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:600,width:"100%",padding:0,maxHeight:"95vh"}}>
        <div style={{background:C.org,color:"#fff",padding:"12px 16px",position:"sticky",top:0,borderRadius:"16px 16px 0 0",zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={close} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
            <div style={{textAlign:"center",flex:1}}>
              <div style={{fontSize:16,fontWeight:700}}>{"📊 דוח חודשי"}</div>
            </div>
            <div style={{width:28}}></div>
          </div>
          {/* Month nav */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,gap:8}}>
            <button onClick={nextMonth} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>{"›"}</button>
            <div style={{flex:1,textAlign:"center",fontSize:14,fontWeight:700}}>{monthName}</div>
            <button onClick={prevMonth} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>{"‹"}</button>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",gap:4,overflowX:"auto"}}>
            {tabs.map(t=><button key={t.id} onClick={()=>setForm({...form,reportTab:t.id,drillDown:null,drillWorker:null,drillSite:null})} style={{flex:"1 1 0",padding:"7px 6px",borderRadius:14,border:"none",background:reportTab===t.id?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.1)",color:"#fff",fontSize:11,fontWeight:reportTab===t.id?700:500,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.icon+" "+t.label}</button>)}
          </div>
        </div>

        <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(95vh - 130px)"}}>

          {/* ── OVERVIEW TAB ── */}
          {reportTab==="overview" && (()=>{
            const drillDown=form.drillDown||null;

            // Build drill-down data once
            const allTasksDone=[];
            const allTasksOpen=[];
            Object.keys(data.dailyTasks||{}).forEach(d=>{
              if(!inMonth(d))return;
              (data.dailyTasks[d]||[]).forEach(t=>{
                const item={...t,date:d};
                if(t.status==="done")allTasksDone.push(item);
                else allTasksOpen.push(item);
              });
            });
            // Sort by date newest first
            allTasksDone.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
            allTasksOpen.sort((a,b)=>(a.date||"").localeCompare(b.date||""));

            // All reports
            const allReports=[];
            Object.keys(data.dailyLogs||{}).forEach(d=>{
              if(!inMonth(d))return;
              Object.keys(data.dailyLogs[d]||{}).forEach(sid=>{
                const log=data.dailyLogs[d][sid];
                if(log && (log.summary||(log.extras||[]).length>0)){
                  allReports.push({date:d,siteId:sid,...log});
                }
              });
            });
            allReports.sort((a,b)=>(b.date||"").localeCompare(a.date||""));

            // All orders
            const allOrdersList=[];
            Object.keys(data.projectOrders||{}).forEach(pid=>{

            // ── DRILL DOWN: Tasks Done ──

                    </div>
                  </div>;

            // ── DRILL DOWN: Trips ──
            if(drillDown==="trips"){
              return <div>
                {backBtn}
                {sectionHeader("🚗 נסיעות",C.purp,allTrips.length)}
                {allTrips.map((t,i)=><div key={t.id+"_"+i} style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+C.bdr}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                    <span style={{fontSize:10,color:C.txtL,whiteSpace:"nowrap"}}>{new Date(t.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})}</span>
                    <div style={{textAlign:"right",flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{"🚗 "+(t.place||"")}</div>
                      {t.note && <div style={{fontSize:11,color:C.txtM,marginTop:2}}>{t.note}</div>}
                    </div>
                  </div>
                </div>)}
                {allTrips.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:20,fontSize:12}}>{"אין נסיעות"}</div>}
              </div>;

            // ── DRILL DOWN: Meetings ──
            if(drillDown==="meetings"){
              return <div>
                {backBtn}
                {sectionHeader("📅 פגישות",C.purp,allMeetingsList.length)}
                {allMeetingsList.map((m,i)=><div key={m.id+"_"+i} style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+C.bdr}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                    <span style={{fontSize:10,color:C.txtL,whiteSpace:"nowrap"}}>{new Date(m.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})+(m.time?" "+m.time:"")}</span>

                      <div style={{fontSize:13,fontWeight:700}}>{"📅 "+(m.with||m.title||"פגישה")}</div>

                    </div>
                  </div>

                {allMeetingsList.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:20,fontSize:12}}>{"אין פגישות"}</div>}

                  {"סה״כ: ₪"+totalOrdersAmount.toLocaleString()}
                </div>
                {allOrdersList.filter(o=>o.amount>0).map(o=><div key={o.id} style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+C.bdr}}>

                    <span style={{fontWeight:700,color:C.red,fontSize:14}}>{"₪"+(+o.amount).toLocaleString()}</span>
                    <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                      <div style={{fontSize:13,fontWeight:700}}>{o.desc}</div>
                      <div style={{fontSize:10,color:C.txtM}}>{new Date(o.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})+" · "+sn(o.pid)}</div>
                    </div>
                  </div>
                </div>)}
              </div>;
            }

            // ── DRILL DOWN: Financial - income ──
            if(drillDown==="income"){
              const allExtras=[];
              Object.keys(data.dailyLogs||{}).forEach(d=>{
                if(!inMonth(d))return;
                Object.keys(data.dailyLogs[d]||{}).forEach(sid=>{
                  const log=data.dailyLogs[d][sid];
                  (log.extras||[]).forEach(ex=>{
                    if(ex.desc)allExtras.push({...ex,date:d,siteId:sid});
                  });
                });
              });
              allExtras.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
              return <div>
                {backBtn}
                {sectionHeader("💰 הכנסות (תוספות חיוב)",C.grn,allExtras.length)}

                  {"סה״כ: ₪"+totalExtrasAmount.toLocaleString()}
                </div>
                {allExtras.map((e,i)=><div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+C.bdr}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontWeight:700,color:C.grn,fontSize:14}}>{e.amount?"₪"+(+e.amount).toLocaleString():""}</span>
                    <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                      <div style={{fontSize:13,fontWeight:700}}>{e.desc+(e.qty?" ×"+e.qty:"")}</div>
                      <div style={{fontSize:10,color:C.txtM}}>{new Date(e.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})+" · "+sn(e.siteId)}</div>
                    </div>
                  </div>
                </div>)}
                {allExtras.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:20,fontSize:12}}>{"אין הכנסות"}</div>}
              </div>;
            }

            // ── MAIN OVERVIEW ──
            return <div>
              <div style={{fontSize:11,color:C.txtM,marginBottom:8,textAlign:"center"}}>{"💡 לחץ על כל מספר לפירוט מלא"}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:8,marginBottom:14}}>
                <div onClick={()=>setForm({...form,drillDown:"sites"})} style={{background:C.grnP,borderRadius:10,padding:12,textAlign:"center",border:"1px solid "+C.grn,cursor:"pointer"}}>
                  <div style={{fontSize:26,fontWeight:700,color:C.grn}}>{Object.keys(siteVisits).length}</div>
                  <div style={{fontSize:11,color:C.txtM}}>{"לקוחות שטופלו ›"}</div>
                </div>
                <div onClick={()=>setForm({...form,drillDown:"tasksDone"})} style={{background:"#fff7ed",borderRadius:10,padding:12,textAlign:"center",border:"1px solid "+C.org,cursor:"pointer"}}>
                  <div style={{fontSize:26,fontWeight:700,color:C.org}}>{tasksCompleted}</div>
                  <div style={{fontSize:11,color:C.txtM}}>{"משימות בוצעו ›"}</div>
                </div>
                <div onClick={()=>setForm({...form,drillDown:"reports"})} style={{background:C.bluB,borderRadius:10,padding:12,textAlign:"center",border:"1px solid "+C.blu,cursor:"pointer"}}>

                {totalOrdersAmount>0 && <div onClick={()=>setForm({...form,drillDown:"expenses"})} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",fontSize:13,cursor:"pointer",background:C.cardA,borderRadius:6,marginBottom:5}}>
                  <span style={{fontWeight:700,color:C.red}}>{"-₪"+totalOrdersAmount.toLocaleString()+" ›"}</span>
                  <span style={{color:C.txtM}}>{"הוצאות (הזמנות)"}</span>
                </div>}
                {totalExtrasAmount>0 && <div onClick={()=>setForm({...form,drillDown:"income"})} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",fontSize:13,cursor:"pointer",background:C.cardA,borderRadius:6,marginBottom:5}}>
                  <span style={{fontWeight:700,color:C.grn}}>{"+₪"+totalExtrasAmount.toLocaleString()+" ›"}</span>
                  <span style={{color:C.txtM}}>{"הכנסות (תוספות חיוב)"}</span>
                </div>}
                <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 4px 0",fontSize:14,borderTop:"2px solid "+C.bdr,marginTop:6}}>
                  <span style={{fontWeight:700,color:(totalExtrasAmount-totalOrdersAmount)>=0?C.grn:C.red}}>{(totalExtrasAmount-totalOrdersAmount)>=0?"+":""}{"₪"+(totalExtrasAmount-totalOrdersAmount).toLocaleString()}</span>
                  <span style={{color:C.txt,fontWeight:700}}>{"מאזן"}</span>
                </div>
              </div>}

              {/* Activity */}
              <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:14,border:"1px solid "+C.bdr}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:C.purp,textAlign:"right"}}>{"📋 פעילות נוספת"}</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <div onClick={()=>setForm({...form,drillDown:"tasksOpen"})} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:C.cardA,borderRadius:8,fontSize:13,cursor:"pointer"}}>
                    <span style={{fontWeight:700,color:C.org}}>{tasksOpen+" ›"}</span><span style={{color:C.txtM}}>{"📋 משימות פתוחות"}</span>
                  </div>
                  <div onClick={()=>setForm({...form,drillDown:"trips"})} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:C.cardA,borderRadius:8,fontSize:13,cursor:"pointer"}}>
                    <span style={{fontWeight:700,color:C.purp}}>{totalTrips+" ›"}</span><span style={{color:C.txtM}}>{"🚗 נסיעות"}</span>
                  </div>
                  <div onClick={()=>setForm({...form,drillDown:"meetings"})} style={{display:"flex",justifyContent:"space-between",padding:"8px 10px",background:C.cardA,borderRadius:8,fontSize:13,cursor:"pointer"}}>
                    <span style={{fontWeight:700,color:C.purp}}>{totalMeetings+" ›"}</span><span style={{color:C.txtM}}>{"📅 פגישות"}</span>
                  </div>
                </div>
              </div>
            </div>;
          })()}

          {/* ── WORKERS TAB ── */}
          {reportTab==="workers" && (()=>{
            const drillWorker=form.drillWorker||null;

            const backBtn=<button onClick={()=>setForm({...form,drillWorker:null})} style={{padding:"7px 12px",borderRadius:8,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>{"← חזור לרשימה"}</button>;

            // ── DRILL: Single worker - full daily breakdown ──
            if(drillWorker){
              const w=(data.workers||[]).find(x=>x.id===drillWorker);
              const s=workerStats[drillWorker];
              if(!w||!s)return <div>{backBtn}<div style={{textAlign:"center",color:C.txtL,padding:20}}>{"עובד לא נמצא"}</div></div>;

              // Build full daily log for this worker
              const dailyEntries=[];
              Object.keys(data.attendance||{}).forEach(d=>{
                if(!inMonth(d))return;
                const a=(data.attendance[d]||{})[drillWorker];
                if(!a)return;
                if(a.present){
                  const start=timeToMin(a.startTime||"07:00");
                  const end=timeToMin(a.endTime||"16:00");
                  const sites=Array.isArray(a.siteIds)?a.siteIds:(a.siteId?[a.siteId]:[]);
                  dailyEntries.push({date:d,present:true,start:a.startTime||"07:00",end:a.endTime||"16:00",minutes:Math.max(0,end-start),sites});
                } else if(a.absenceReason && a.absenceReason.trim()){
                  dailyEntries.push({date:d,present:false,reason:a.absenceReason});
                }
              });
              dailyEntries.sort((a,b)=>(b.date||"").localeCompare(a.date||""));

              return <div>
                {backBtn}
                <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:10,border:"2px solid "+C.blu}}>
                  <div style={{fontSize:18,fontWeight:700,marginBottom:10,color:C.blu,textAlign:"right"}}>{"👷 "+s.name}</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:6}}>
                    <div style={{background:C.grnP,padding:"8px 10px",borderRadius:8,textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:C.grn}}>{s.present}</div>
                      <div style={{fontSize:10,color:C.txtM}}>{"ימי נוכחות"}</div>
                    </div>
                    <div style={{background:"#fee",padding:"8px 10px",borderRadius:8,textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:C.red}}>{s.absent}</div>
                      <div style={{fontSize:10,color:C.txtM}}>{"ימי היעדרות"}</div>

                    if(daysOld>=14)oldTasks.push({...t,date:d,daysOld});

                    const daysOld=Math.floor((new Date(todayISO)-new Date(o.date))/(1000*60*60*24));

    if(modal==="remindersArchive"){
      const completed=[];
      Object.keys(data.dailyTasks||{}).forEach(d=>{

            <div style={{flex:1,textAlign:"right"}}>
              <div style={{fontSize:14,fontWeight:500,textDecoration:"line-through",color:C.txtM}}>{t.notes}</div>

          {completed.length>0 && <div style={{textAlign:"center",fontSize:11,color:C.txtL,padding:"10px 0",marginTop:8,borderTop:"1px solid "+C.bdr}}>
            {"💡 לחץ על ✅ כדי להחזיר תזכורת לפעילה"}
          </div>}
        </div>
      </div></div>;

    if(modal==="confirmDelete"){
      const itemName=form.delName||"";
      const onConfirm=form.delAction;
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:380,padding:20}}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:36,marginBottom:8}}>{"⚠️"}</div>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{"האם למחוק?"}</div>
          {itemName && <div style={{fontSize:14,color:C.txtM,padding:"8px 12px",background:C.cardA,borderRadius:8,marginTop:8}}>{itemName}</div>}
          <div style={{fontSize:11,color:C.txtL,marginTop:10}}>{"פעולה זו לא ניתנת לביטול"}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={close} style={{flex:1,padding:12,borderRadius:10,border:"1.5px solid "+C.bdr,background:"#fff",color:C.txt,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
          <button onClick={()=>{if(typeof onConfirm==="function")onConfirm();setModal(null);setForm({});}} style={{flex:1,padding:12,borderRadius:10,border:"none",background:C.red,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"🗑 מחק"}</button>
        </div>
      </div></div>;

    if(modal==="siteLog"){
      const siteId=form.logSiteId;

      const site=[...(data.maintenanceSites||[]),...(data.devSites||[])].find(s=>s.id===siteId);
      if(!site)return null;
      const isMaint=(data.maintenanceSites||[]).some(m=>m.id===siteId);

      const summary=form.logSummary||"";
      const extras=form.logExtras||[];
      const reminders=form.logReminders||[];

      const updExtra=(i,field,val)=>{
        const ne=[...extras];
        ne[i]={...ne[i],[field]:val};
        setForm({...form,logExtras:ne});
      };
      const remExtra=(i)=>{
        const ne=[...extras];
        ne.splice(i,1);
        setForm({...form,logExtras:ne});
      };
      const addExtra=()=>{
        setForm({...form,logExtras:[...extras,{desc:"",qty:""}]});
      };
      const updRem=(i,val)=>{
        const nr=[...reminders];
        nr[i]={text:val};
        setForm({...form,logReminders:nr});
      };
      const remRem=(i)=>{
        const nr=[...reminders];
        nr.splice(i,1);
        setForm({...form,logReminders:nr});
      };
      const addRem=()=>{
        setForm({...form,logReminders:[...reminders,{text:""}]});

      const saveLog=()=>{
        up(d=>{
          if(!d.dailyLogs)d.dailyLogs={};
          if(!d.dailyLogs[dyKey])d.dailyLogs[dyKey]={};
          d.dailyLogs[dyKey][siteId]={

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:520,padding:0,maxHeight:"94vh"}}>

            <div style={{textAlign:"right",flex:1,marginInlineStart:10}}>
              <div style={{fontSize:17,fontWeight:700}}>{(isMaint?"🔧 ":"🌱 ")+site.name}</div>

            </div>

        <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(94vh - 70px)"}}>
          {/* 1. Summary */}
          <div style={{marginBottom:14}}>

            <textarea value={summary} onChange={e=>setForm({...form,logSummary:e.target.value})} placeholder={"מה נעשה היום? (כיסוח, גיזום, השקיה...)"} style={{...inp,minHeight:70,fontSize:13,padding:"10px 12px"}}/>
          </div>

          {/* 2. Extras */}
