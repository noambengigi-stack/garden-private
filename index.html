// EXPENSES VIEW - מסך הוצאות מלא
// ═══════════════════════════════════════════════════════════════════
function ExpensesView({ data, monthView, setMonthView, addExpense, updateExpense, deleteExpense }) {
  const [showAdd, setShowAdd] = useState(false);
  const [filter, setFilter] = useState("month"); // "month" | "all" | "unlinked" | "client" | "project"
  const [search, setSearch] = useState("");
  const [photoViewer, setPhotoViewer] = useState(null); // {photos: [], index: 0}

  const allExpenses = data.expenses || [];
  const mk = monthKey(monthView);

  const changeMonth = delta => {
    const n = new Date(monthView);
    n.setMonth(n.getMonth() + delta);
    setMonthView(n);
  };

  // סינון
  const filtered = allExpenses.filter(e => {
    if (filter === "month" && !(e.date || "").startsWith(mk)) return false;
    if (filter === "unlinked" && e.linkType !== "none" && e.linkType) return false;
    if (filter === "client" && e.linkType !== "client" && e.linkType !== "client_day") return false;
    if (filter === "project" && e.linkType !== "project") return false;
    if (search) {
      const s = search.toLowerCase();
      const client = e.clientId ? data.clients.find(c => c.id === e.clientId) : null;
      const project = e.projectId ? (data.projects || []).find(p => p.id === e.projectId) : null;
      if (!e.desc.toLowerCase().includes(s) &&
          !(client && client.name.toLowerCase().includes(s)) &&
          !(project && project.title.toLowerCase().includes(s))) return false;
    }
    return true;
  }).sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  // סטטיסטיקות
  const monthExpenses = allExpenses.filter(e => (e.date || "").startsWith(mk));
  const monthTotal = monthExpenses.reduce((s, e) => s + (e.amount || 0), 0);
  const monthByWorker = monthExpenses.filter(e => e.addedBy === "worker").reduce((s, e) => s + (e.amount || 0), 0);
  const monthByAdmin = monthTotal - monthByWorker;

  return (
    <div style={{padding:12,paddingBottom:80}}>
      {/* ניווט חודשי */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:"10px 12px",marginBottom:12}}>
        <button onClick={() => changeMonth(-1)} style={{background:"none",border:"none",fontSize:22,color:C.red,cursor:"pointer"}}>→</button>
        <div style={{fontSize:16,fontWeight:700,color:C.red}}>{MONTHS[monthView.getMonth()]} {monthView.getFullYear()}</div>
        <button onClick={() => changeMonth(1)} style={{background:"none",border:"none",fontSize:22,color:C.red,cursor:"pointer"}}>←</button>
      </div>

      {/* סטטיסטיקות חודש */}
      <div style={{background:C.card,borderRadius:14,border:`2px solid ${C.red}`,padding:14,marginBottom:12}}>
        <div style={{textAlign:"center",marginBottom:10}}>
          <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:2}}>סה"כ הוצאות החודש</div>
          <div style={{fontSize:28,fontWeight:700,color:C.red}}>₪{monthTotal.toLocaleString()}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{textAlign:"center",padding:"6px 8px",background:C.cardA,borderRadius:8}}>
            <div style={{fontSize:10,color:C.txtM}}>👤 על ידי המנהל</div>
            <div style={{fontSize:14,fontWeight:700,color:C.txt}}>₪{monthByAdmin.toLocaleString()}</div>
          </div>
          <div style={{textAlign:"center",padding:"6px 8px",background:C.bluB,borderRadius:8}}>
            <div style={{fontSize:10,color:C.blu}}>👷 על ידי עובדים</div>
            <div style={{fontSize:14,fontWeight:700,color:C.blu}}>₪{monthByWorker.toLocaleString()}</div>
          </div>
        </div>
      </div>

      {/* כפתור הוספה */}
      {!showAdd && (
        <button onClick={() => setShowAdd(true)} style={{width:"100%",background:C.red,color:"#fff",border:"none",borderRadius:12,padding:14,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:12}}>
          + רשום הוצאה חדשה
        </button>
      )}

      {/* טופס הוספה */}
      {showAdd && (
        <div style={{marginBottom:12}}>
          <WorkerExpenseForm
            defaultLink={{ linkType: "none" }}
            data={data}
            allowChangeLink={true}
            onSave={(exp) => { addExpense(exp); setShowAdd(false); }}
            onCancel={() => setShowAdd(false)}
          />
        </div>
      )}

      {/* חיפוש */}
      <input
        type="text"
        placeholder="🔍 חיפוש בהוצאות..."
        value={search}
        onChange={e => setSearch(e.target.value)}
        style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff",marginBottom:8}}
      />

      {/* פילטרים */}
      <div style={{display:"flex",gap:4,marginBottom:10,overflowX:"auto"}}>
        <button onClick={() => setFilter("month")} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filter === "month" ? C.red : C.cardA,color:filter === "month" ? "#fff" : C.txtM,whiteSpace:"nowrap"}}>החודש</button>
        <button onClick={() => setFilter("all")} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filter === "all" ? C.red : C.cardA,color:filter === "all" ? "#fff" : C.txtM,whiteSpace:"nowrap"}}>הכל</button>
        <button onClick={() => setFilter("unlinked")} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filter === "unlinked" ? C.red : C.cardA,color:filter === "unlinked" ? "#fff" : C.txtM,whiteSpace:"nowrap"}}>ללא שיוך</button>
        <button onClick={() => setFilter("client")} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filter === "client" ? C.red : C.cardA,color:filter === "client" ? "#fff" : C.txtM,whiteSpace:"nowrap"}}>לקוחות</button>
        <button onClick={() => setFilter("project")} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:filter === "project" ? C.red : C.cardA,color:filter === "project" ? "#fff" : C.txtM,whiteSpace:"nowrap"}}>פרויקטים</button>
      </div>

      {/* רשימה */}
      {filtered.length === 0 ? (
        <div style={{background:C.card,borderRadius:14,border:`1px dashed ${C.bdr}`,padding:30,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:8}}>💸</div>
          <div style={{fontSize:14,color:C.txtM}}>אין הוצאות בקטגוריה זו</div>
        </div>
      ) : (
        <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:8}}>
          {filtered.map(e => {
            const client = e.clientId ? data.clients.find(c => c.id === e.clientId) : null;
            const project = e.projectId ? (data.projects || []).find(p => p.id === e.projectId) : null;

            let linkLabel = "";
            let linkColor = C.txtM;
            if (e.linkType === "client_day" && client) { linkLabel = `👤 ${client.name} · ${fmtDM(e.dayKey || e.date)}`; linkColor = CITY_COLORS[client.city]?.text || C.txtM; }
            else if (e.linkType === "client" && client) { linkLabel = `👤 ${client.name}`; linkColor = CITY_COLORS[client.city]?.text || C.txtM; }
            else if (e.linkType === "project" && project) { linkLabel = `🚧 ${project.title}`; linkColor = C.prp; }
            else linkLabel = "ללא שיוך";

            return (
              <div key={e.id} style={{padding:"10px 8px",borderBottom:`1px solid ${C.bdrL}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{e.desc}</div>
                    <div style={{fontSize:11,color:C.txtM,marginTop:2,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                      <span>{fmtDM(e.date)}</span>
                      <span style={{color:linkColor}}>· {linkLabel}</span>
                      {e.addedBy === "worker" && <span style={{background:C.bluB,color:C.blu,padding:"1px 6px",borderRadius:6,fontWeight:600,fontSize:9}}>👷 עובד</span>}
                      {(e.photos || []).length > 0 && <span style={{background:C.grnP,color:C.grn,padding:"1px 6px",borderRadius:6,fontWeight:600,fontSize:9}}>📸 {e.photos.length}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:15,fontWeight:700,color:C.red}}>₪{(e.amount || 0).toLocaleString()}</span>
                  <button onClick={() => { if (confirm(`למחוק הוצאה: ${e.desc}?`)) deleteExpense(e.id); }} style={{background:"none",border:"none",color:C.red,fontSize:18,cursor:"pointer",padding:2}}>×</button>
                </div>

                {/* תמונות מצורפות */}
                {(e.photos || []).length > 0 && (
                  <div style={{display:"flex",gap:4,marginTop:8,overflowX:"auto"}}>
                    {e.photos.map((p, idx) => (
                      <img
                        key={p.id}
                        src={p.data}
                        onClick={() => setPhotoViewer({ photos: e.photos, index: idx, expense: e })}
                        style={{width:60,height:60,objectFit:"cover",borderRadius:6,border:`1px solid ${C.bdr}`,cursor:"pointer",flexShrink:0}}
                      />
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          {/* סיכום למטה */}
          <div style={{marginTop:8,padding:10,background:C.redB,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:C.red,fontWeight:600}}>סה"כ ({filtered.length} הוצאות):</span>
            <span style={{fontSize:15,fontWeight:700,color:C.red}}>₪{filtered.reduce((s, e) => s + (e.amount || 0), 0).toLocaleString()}</span>
          </div>
        </div>
      )}

      {/* תצוגת תמונה במסך מלא */}
      {photoViewer && (
        <div onClick={() => setPhotoViewer(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={(e) => e.stopPropagation()} style={{maxWidth:"100%",maxHeight:"100%",position:"relative"}}>
            <img src={photoViewer.photos[photoViewer.index].data} style={{maxWidth:"100%",maxHeight:"85vh",objectFit:"contain",borderRadius:8}} />

            {/* ניווט בין תמונות */}
            {photoViewer.photos.length > 1 && (
              <div style={{position:"absolute",bottom:-50,left:0,right:0,display:"flex",justifyContent:"center",gap:8,alignItems:"center"}}>
                <button
                  onClick={() => setPhotoViewer({...photoViewer, index: (photoViewer.index - 1 + photoViewer.photos.length) % photoViewer.photos.length})}
                  style={{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:"50%",width:36,height:36,fontSize:18,cursor:"pointer"}}
                >→</button>
                <span style={{color:"#fff",fontSize:13,fontWeight:600}}>{photoViewer.index + 1} / {photoViewer.photos.length}</span>
                <button
                  onClick={() => setPhotoViewer({...photoViewer, index: (photoViewer.index + 1) % photoViewer.photos.length})}
                  style={{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:"50%",width:36,height:36,fontSize:18,cursor:"pointer"}}
                >←</button>
              </div>
            )}
          </div>

          <button onClick={() => setPhotoViewer(null)} style={{position:"absolute",top:20,left:20,background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:"50%",width:40,height:40,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>

          {/* פרטי ההוצאה למטה */}
          <div style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.95)",padding:"8px 12px",borderRadius:8,maxWidth:"60%"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.txt}}>{photoViewer.expense.desc}</div>
            <div style={{fontSize:11,color:C.txtM}}>{fmtDM(photoViewer.expense.date)} · ₪{(photoViewer.expense.amount || 0).toLocaleString()}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// SMART SCHEDULE SECTION - מרכז תזמון חכם
// ═══════════════════════════════════════════════════════════════════
function SmartScheduleSection({ data, onSchedule, onOpenDay }) {
  const [open, setOpen] = useState(false);
  const [pickingFor, setPickingFor] = useState(null); // clientId

  // חשב לקוחות שצריכים תזמון
  // לקוח צריך תזמון אם:
  // - הביקור האחרון שלו כבר בעבר (או אין ביקור כלל)
  // - הזמן שעבר מאז הביקור האחרון מתאים לתדירות שלו
  const pending = useMemo(() => {
    const now = new Date();
    const todayKey = iso(now);

    // מצא לכל לקוח את הביקור האחרון (בעבר או בעתיד)
    const lastVisits = {}; // clientId -> dateKey
    Object.entries(data.schedule || {}).forEach(([dayKey, items]) => {
      (items || []).forEach(item => {
        const cur = lastVisits[item.clientId];
        if (!cur || dayKey > cur) {
          lastVisits[item.clientId] = dayKey;
        }
      });
    });

    return data.clients.map(c => {
      const lastKey = lastVisits[c.id];
      const freq = c.frequency || "monthly";

      // מספר ימים בין ביקור לביקור לפי תדירות
      const daysBetween = freq === "weekly" ? 7 :
                          freq === "twice" ? 15 :
                          freq === "three" ? 10 :
                          freq === "four" ? 7 : 30;

      let suggestedDate;
      let reason;
      let urgency = "normal"; // normal | due | overdue

      if (!lastKey) {
        // אין ביקור בכלל - ממתין לתזמון ראשון
        suggestedDate = todayKey;
        reason = "לקוח חדש - אין ביקור עדיין";
        urgency = "overdue";
      } else {
        const lastDate = new Date(lastKey);
        const nextDate = new Date(lastDate);
        nextDate.setDate(nextDate.getDate() + daysBetween);
        suggestedDate = iso(nextDate);

        const daysFromLast = Math.round((now - lastDate) / (1000 * 60 * 60 * 24));
        const daysUntilNext = Math.round((nextDate - now) / (1000 * 60 * 60 * 24));

        if (lastKey > todayKey) {
          // יש ביקור עתידי - אין צורך לתזמן עכשיו
          reason = "יש ביקור מתוכנן בעתיד";
          return null; // לא כולל ברשימה
        } else if (daysFromLast >= daysBetween) {
          // הגיע/עבר זמן הביקור
          reason = `חלפו ${daysFromLast} ימים מהביקור האחרון`;
          urgency = daysFromLast > daysBetween + 7 ? "overdue" : "due";
        } else {
          // עדיין לא הגיע הזמן
          return null;
        }
      }

      return {
        client: c,
        lastKey,
        suggestedDate,
        reason,
        urgency,
        daysBetween
      };
    }).filter(Boolean).sort((a, b) => {
      // קודם overdue, אח"כ due
      const order = { overdue: 0, due: 1, normal: 2 };
      return order[a.urgency] - order[b.urgency];
    });
  }, [data]);

  if (pending.length === 0) {
    return null; // לא להציג אם אין מה לתזמן
  }

  const overdueCount = pending.filter(p => p.urgency === "overdue").length;
  const dueCount = pending.filter(p => p.urgency === "due").length;

  return (
    <div style={{background:C.card,borderRadius:14,border:`2px solid ${overdueCount > 0 ? C.red : C.hdrL}`,padding:14,marginBottom:12}}>
      <div onClick={() => setOpen(!open)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:16,fontWeight:700,color:C.hdr}}>🎯 מוכנים לתזמון</span>
          <span style={{background:overdueCount > 0 ? C.red : C.hdrL,color:"#fff",padding:"2px 10px",borderRadius:12,fontSize:12,fontWeight:700}}>
            {pending.length}
          </span>
          {overdueCount > 0 && (
            <span style={{background:C.redB,color:C.red,padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,border:`1px solid ${C.red}`}}>
              ⚠️ {overdueCount} בפיגור
            </span>
          )}
        </div>
        <span style={{fontSize:16,color:C.txtM}}>{open ? "▼" : "◀"}</span>
      </div>

      {!open && pending.length > 0 && (
        <div style={{fontSize:12,color:C.txtM,marginTop:6}}>
          {overdueCount > 0 && <span style={{color:C.red,fontWeight:600}}>⚠️ {overdueCount} בפיגור · </span>}
          {dueCount > 0 && <span style={{color:C.org,fontWeight:600}}>📅 {dueCount} להיום · </span>}
          לחץ לצפייה
        </div>
      )}

      {open && (
        <div style={{marginTop:12}}>
          {pending.map(p => (
            <SchedulePendingItem
              key={p.client.id}
              pending={p}
              isPicking={pickingFor === p.client.id}
              onPick={() => setPickingFor(pickingFor === p.client.id ? null : p.client.id)}
              onSchedule={(dayKey) => {
                onSchedule(p.client.id, dayKey);
                setPickingFor(null);
              }}
              onOpenDay={onOpenDay}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// כרטיס לקוח ממתין לתזמון
function SchedulePendingItem({ pending, isPicking, onPick, onSchedule, onOpenDay }) {
  const { client: c, suggestedDate, reason, urgency, daysBetween } = pending;
  const cc = CITY_COLORS[c.city];

  // חשב 3 הצעות תאריכים - עבור בית שמש מעדיף ראשון/חמישי
  const suggestions = useMemo(() => {
    const isBeitShemesh = c.city === "בית שמש";
    const base = new Date(suggestedDate);
    const opts = [];

    // הצעה 1: התאריך המוצע (אם הוא יום עבודה)
    const firstOpt = new Date(base);
    // דחה משישי/שבת ליום עבודה
    while (!WORK_DAYS.includes(firstOpt.getDay())) firstOpt.setDate(firstOpt.getDate() + 1);

    // בשביל בית שמש: נסה להעביר לראשון/חמישי הקרוב אם לא
    if (isBeitShemesh) {
      const dow = firstOpt.getDay();
      if (dow !== 0 && dow !== 4) {
        const distToSun = dow > 4 ? 7 - dow : -dow;
        const distToThu = 4 - dow;
        const bestDist = Math.abs(distToSun) <= Math.abs(distToThu) ? distToSun : distToThu;
        if (Math.abs(bestDist) <= 3) firstOpt.setDate(firstOpt.getDate() + bestDist);
      }
    }
    opts.push({ date: iso(firstOpt), label: isBeitShemesh ? "מומלץ (א׳/ה׳)" : "מומלץ" });

    // הצעה 2: +3 ימים (לבית שמש - היום הבא של א/ה)
    const d2 = new Date(opts[0].date);
    if (isBeitShemesh) {
      // קפוץ לראשון/חמישי הבא
      d2.setDate(d2.getDate() + 1);
      while (d2.getDay() !== 0 && d2.getDay() !== 4) d2.setDate(d2.getDate() + 1);
      opts.push({ date: iso(d2), label: "הא׳/ה׳ הבא" });
    } else {
      let added = 0;
      while (added < 3) { d2.setDate(d2.getDate() + 1); if (WORK_DAYS.includes(d2.getDay())) added++; }
      opts.push({ date: iso(d2), label: "+3 ימים" });
    }

    // הצעה 3: +7 ימים (לבית שמש - עוד ראשון/חמישי)
    const d3 = new Date(opts[1].date);
    if (isBeitShemesh) {
      d3.setDate(d3.getDate() + 1);
      while (d3.getDay() !== 0 && d3.getDay() !== 4) d3.setDate(d3.getDate() + 1);
      opts.push({ date: iso(d3), label: "עוד א׳/ה׳" });
    } else {
      let added = 0;
      while (added < 7) { d3.setDate(d3.getDate() + 1); if (WORK_DAYS.includes(d3.getDay())) added++; }
      opts.push({ date: iso(d3), label: "+שבוע" });
    }

    return opts;
  }, [suggestedDate, c.city]);

  const [customDate, setCustomDate] = useState("");
  const [recurring, setRecurring] = useState(true); // ברירת מחדל: חוזר

  const bgColor = urgency === "overdue" ? C.redB : urgency === "due" ? C.orgB : C.cardA;
  const borderColor = urgency === "overdue" ? C.red : urgency === "due" ? C.org : C.bdr;

  const doSchedule = (date) => onSchedule(date, recurring);

  return (
    <div style={{background:bgColor,border:`1px solid ${borderColor}`,borderRadius:10,padding:10,marginBottom:6}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
            <span style={{fontSize:14,fontWeight:700,color:C.txt}}>{c.name}</span>
            <span style={{fontSize:9,background:cc.bg,color:cc.text,padding:"1px 6px",borderRadius:8,fontWeight:600}}>{c.city}</span>
            {urgency === "overdue" && <span style={{fontSize:9,background:C.red,color:"#fff",padding:"1px 6px",borderRadius:8,fontWeight:700}}>⚠️ בפיגור</span>}
            {urgency === "due" && <span style={{fontSize:9,background:C.org,color:"#fff",padding:"1px 6px",borderRadius:8,fontWeight:700}}>📅 מוכן</span>}
          </div>
          <div style={{fontSize:10,color:C.txtM}}>{reason} · {freqLabel(c.frequency)}</div>
        </div>
        {!isPicking && (
          <button onClick={onPick} style={{background:C.hdr,color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>
            שבץ ←
          </button>
        )}
      </div>

      {/* הצעות תאריכים */}
      {isPicking && (
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px dashed ${borderColor}`}}>
          {/* טוגל חזרתי */}
          <div onClick={() => setRecurring(!recurring)} style={{
            display:"flex",
            alignItems:"center",
            gap:6,
            padding:"6px 10px",
            background:recurring ? C.grnP : "#fff",
            border:`1.5px solid ${recurring ? C.grn : C.bdr}`,
            borderRadius:8,
            marginBottom:10,
            cursor:"pointer"
          }}>
            <div style={{
              width:18,height:18,borderRadius:4,
              border:`2px solid ${recurring ? C.grn : C.bdr}`,
              background:recurring ? C.grn : "#fff",
              color:"#fff",fontSize:12,fontWeight:700,
              display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0
            }}>{recurring ? "✓" : ""}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:C.txt}}>🔁 שבץ גם 3 חודשים קדימה</div>
            </div>
          </div>

          <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6}}>באיזה תאריך לשבץ?</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {suggestions.map((s, i) => {
              const d = new Date(s.date);
              return (
                <button key={i} onClick={() => doSchedule(s.date)} style={{
                  background:"#fff",
                  color:C.txt,
                  border:`1.5px solid ${i === 0 ? C.hdr : C.bdr}`,
                  borderRadius:8,
                  padding:"10px 12px",
                  fontSize:13,
                  fontWeight:600,
                  cursor:"pointer",
                  display:"flex",
                  justifyContent:"space-between",
                  alignItems:"center"
                }}>
                  <span style={{fontSize:10,color:i === 0 ? C.hdr : C.txtM,fontWeight:700,background:i === 0 ? C.grnP : C.cardA,padding:"2px 8px",borderRadius:8}}>{s.label}</span>
                  <span>{DAYNAMES[d.getDay()]} · {fmtHeb(d)}</span>
                </button>
              );
            })}
          </div>

          {/* תאריך מותאם */}
          <div style={{marginTop:10,paddingTop:10,borderTop:`1px dashed ${borderColor}`}}>
            <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6}}>או בחר תאריך אחר:</div>
            <div style={{display:"flex",gap:6}}>
              <input
                type="date"
                value={customDate}
                onChange={e => setCustomDate(e.target.value)}
                style={{flex:1,padding:"8px 10px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff"}}
              />
              <button
                onClick={() => { if (customDate) doSchedule(customDate); }}
                disabled={!customDate}
                style={{
                  background:customDate ? C.hdr : C.cardA,
                  color:customDate ? "#fff" : C.txtL,
                  border:"none",
                  borderRadius:8,
                  padding:"8px 14px",
                  fontSize:12,
                  fontWeight:700,
                  cursor:customDate ? "pointer" : "not-allowed"
                }}>שבץ</button>
            </div>
          </div>

          <button onClick={onPick} style={{width:"100%",marginTop:8,background:"none",border:"none",color:C.txtM,fontSize:11,cursor:"pointer",padding:6}}>ביטול</button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// REMINDERS SECTION - יומן תזכורות
// ═══════════════════════════════════════════════════════════════════
function RemindersSection({ reminders, settings, unscheduledCount, onOpenUnscheduled, onAdd, onToggle, onDelete, onEdit, onUpdateSetting }) {
  const [showAdd, setShowAdd] = useState(false);
  const [showDone, setShowDone] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [newText, setNewText] = useState("");
  const [newDate, setNewDate] = useState("");
  const [useDate, setUseDate] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState("");
  const [editDate, setEditDate] = useState("");
  const [useEditDate, setUseEditDate] = useState(false);
  const [confirmId, setConfirmId] = useState(null); // המזהה של הרגע שממתין לאישור

  const order = settings.remindersOrder || "newest";

  const openReminders = reminders.filter(r => !r.done);
  const doneReminders = reminders.filter(r => r.done);

  // מיון
  const sortFn = (a, b) => {
    if (order === "oldest") return (a.createdAt || "").localeCompare(b.createdAt || "");
    return (b.createdAt || "").localeCompare(a.createdAt || "");
  };
  openReminders.sort(sortFn);
  doneReminders.sort((a, b) => (b.doneAt || "").localeCompare(a.doneAt || ""));

  // האם תזכורת כבר בפיגור?
  const todayISO = iso(new Date());
  const isOverdue = (r) => r.dueDate && r.dueDate < todayISO;
  const isDueToday = (r) => r.dueDate === todayISO;
  const overdueCount = openReminders.filter(isOverdue).length;

  const saveNew = () => {
    const t = newText.trim();
    if (!t) return;
    onAdd(t, useDate ? newDate : null);
    setNewText("");
    setNewDate("");
    setUseDate(false);
    setShowAdd(false);
  };

  const startEdit = (r) => {
    setEditingId(r.id);
    setEditText(r.text);
    setEditDate(r.dueDate || "");
    setUseEditDate(!!r.dueDate);
  };

  const saveEdit = () => {
    const t = editText.trim();
    if (!t) return;
    onEdit(editingId, t, useEditDate ? editDate : null);
    setEditingId(null);
  };

  const handleToggleClick = (r) => {
    if (r.done) {
      // לא צריך אישור לביטול סימון
      onToggle(r.id);
    } else {
      // דורש אישור לסימון כבוצעה
      setConfirmId(r.id);
    }
  };

  const confirmDone = () => {
    onToggle(confirmId);
    setConfirmId(null);
  };

  const confirmReminder = reminders.find(r => r.id === confirmId);

  return (
    <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:14,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:16,fontWeight:700,color:C.hdr}}>📋 יומן תזכורות</span>
          {openReminders.length > 0 && (
            <span style={{background:overdueCount > 0 ? C.red : C.hdrL,color:"#fff",padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:700}}>
              {openReminders.length}
            </span>
          )}
        </div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={() => setShowSettings(!showSettings)} style={{background:"none",border:"none",color:C.txtM,fontSize:16,cursor:"pointer",padding:4}} title="הגדרות">⚙️</button>
          <button onClick={() => setShowAdd(true)} style={{background:C.hdr,color:"#fff",border:"none",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ חדשה</button>
        </div>
      </div>

      {/* הגדרות */}
      {showSettings && (
        <div style={{background:C.cardA,border:`1px solid ${C.bdr}`,borderRadius:10,padding:10,marginBottom:10}}>
          <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6}}>סידור תזכורות:</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={() => onUpdateSetting("remindersOrder", "newest")} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:order === "newest" ? C.hdr : "#fff",color:order === "newest" ? "#fff" : C.txt}}>חדש בראש</button>
            <button onClick={() => onUpdateSetting("remindersOrder", "oldest")} style={{flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:order === "oldest" ? C.hdr : "#fff",color:order === "oldest" ? "#fff" : C.txt}}>ישן בראש</button>
          </div>
        </div>
      )}

      {/* התראת לא שובצו - קטנה יותר, בתוך התזכורות */}
      {unscheduledCount > 0 && (
        <div onClick={onOpenUnscheduled} style={{background:C.orgB,borderRadius:10,border:`1px solid ${C.org}`,padding:"8px 12px",marginBottom:8,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,color:C.org}}>←</span>
          <div style={{fontSize:12,fontWeight:600,color:"#9a6b1f"}}>📌 {unscheduledCount} לקוחות לא שובצו החודש</div>
        </div>
      )}

      {/* טופס הוספה */}
      {showAdd && (
        <div style={{background:C.grnP,border:`2px solid ${C.hdr}`,borderRadius:10,padding:12,marginBottom:10}}>
          <textarea
            value={newText}
            onChange={e => setNewText(e.target.value)}
            placeholder="לדוגמה: לקנות שתילים, להתקשר ליעל, לקבוע פגישה עם ספק..."
            rows={2}
            autoFocus
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:14,resize:"vertical",background:"#fff",marginBottom:8}}
          />
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.txtM,cursor:"pointer"}}>
              <input type="checkbox" checked={useDate} onChange={e => setUseDate(e.target.checked)} style={{cursor:"pointer"}} />
              <span>עם תאריך יעד</span>
            </label>
            {useDate && (
              <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} style={{padding:"6px 8px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:12,background:"#fff"}} />
            )}
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={saveNew} style={{flex:1,background:C.hdr,color:"#fff",border:"none",borderRadius:8,padding:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>שמור תזכורת</button>
            <button onClick={() => { setShowAdd(false); setNewText(""); setNewDate(""); setUseDate(false); }} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:8,padding:10,fontSize:13,cursor:"pointer"}}>ביטול</button>
          </div>
        </div>
      )}

      {/* תזכורות פתוחות */}
      {openReminders.length === 0 && !showAdd && (
        <div style={{textAlign:"center",color:C.txtL,fontSize:12,padding:"12px 0"}}>
          ✨ אין תזכורות פתוחות
        </div>
      )}

      {openReminders.map(r => {
        const overdue = isOverdue(r);
        const dueToday = isDueToday(r);
        const isEditing = editingId === r.id;

        if (isEditing) {
          return (
            <div key={r.id} style={{background:C.grnP,border:`2px solid ${C.hdr}`,borderRadius:10,padding:10,marginBottom:8}}>
              <textarea value={editText} onChange={e => setEditText(e.target.value)} rows={2} autoFocus style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:14,resize:"vertical",background:"#fff",marginBottom:8}} />
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.txtM,cursor:"pointer"}}>
                  <input type="checkbox" checked={useEditDate} onChange={e => setUseEditDate(e.target.checked)} style={{cursor:"pointer"}} />
                  <span>תאריך יעד</span>
                </label>
                {useEditDate && <input type="date" value={editDate} onChange={e => setEditDate(e.target.value)} style={{padding:"6px 8px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:12,background:"#fff"}} />}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={saveEdit} style={{flex:1,background:C.hdr,color:"#fff",border:"none",borderRadius:8,padding:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>שמור</button>
                <button onClick={() => setEditingId(null)} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:8,padding:8,fontSize:12,cursor:"pointer"}}>ביטול</button>
                <button onClick={() => { if (confirm("למחוק את התזכורת?")) { onDelete(r.id); setEditingId(null); } }} style={{background:C.redB,color:C.red,border:`1px solid ${C.red}`,borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>🗑️</button>
              </div>
            </div>
          );
        }

        return (
          <div key={r.id} style={{
            display:"flex",alignItems:"flex-start",gap:10,padding:"10px 8px",
            borderBottom:`1px solid ${C.bdrL}`,
            background:overdue ? C.redB : dueToday ? C.orgB : "transparent",
            borderRadius:overdue || dueToday ? 8 : 0,
            marginBottom:overdue || dueToday ? 4 : 0
          }}>
            <button
              onClick={() => handleToggleClick(r)}
              style={{
                width:28,height:28,borderRadius:"50%",
                border:`2px solid ${C.bdr}`,background:"#fff",color:C.bdr,
                cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center",marginTop:2
              }}
            >✓</button>
            <div onClick={() => startEdit(r)} style={{flex:1,minWidth:0,cursor:"pointer"}}>
              <div style={{fontSize:14,color:C.txt,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{r.text}</div>
              {r.dueDate && (
                <div style={{fontSize:10,marginTop:3,fontWeight:600,color:overdue ? C.red : dueToday ? C.org : C.txtM}}>
                  {overdue ? "⚠️ באיחור: " : dueToday ? "📅 להיום: " : "📅 ליעד: "}
                  {fmtDM(new Date(r.dueDate))}
                </div>
              )}
            </div>
          </div>
        );
      })}

      {/* תזכורות שבוצעו */}
      {doneReminders.length > 0 && (
        <div style={{marginTop:10,paddingTop:8,borderTop:`1px dashed ${C.bdr}`}}>
          <button onClick={() => setShowDone(!showDone)} style={{background:"none",border:"none",color:C.txtM,fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
            {showDone ? "▼" : "◀"} בוצעו ({doneReminders.length})
          </button>
          {showDone && doneReminders.map(r => (
            <div key={r.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 6px",opacity:0.5}}>
              <button onClick={() => onToggle(r.id)} style={{width:24,height:24,borderRadius:"50%",border:`2px solid ${C.grn}`,background:C.grn,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:C.txt,textDecoration:"line-through"}}>{r.text}</div>
                {r.doneAt && <div style={{fontSize:9,color:C.txtL,marginTop:2}}>בוצע: {fmtDM(new Date(r.doneAt))}</div>}
              </div>
              <button onClick={() => { if (confirm("למחוק את התזכורת?")) onDelete(r.id); }} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:2}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* חלון אישור סימון בוצע */}
      {confirmId && confirmReminder && (
        <div onClick={() => setConfirmId(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
          <div onClick={e => e.stopPropagation()} style={{background:C.card,borderRadius:16,padding:20,maxWidth:380,width:"100%",boxShadow:"0 10px 30px rgba(0,0,0,0.2)"}}>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:40,marginBottom:8}}>✓</div>
              <div style={{fontSize:17,fontWeight:700,color:C.txt,marginBottom:8}}>לסמן כבוצעה?</div>
              <div style={{fontSize:13,color:C.txtM,background:C.cardA,padding:"8px 12px",borderRadius:8,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{confirmReminder.text}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={confirmDone} style={{flex:1,background:C.hdr,color:"#fff",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>✓ כן, בוצעה</button>
              <button onClick={() => setConfirmId(null)} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:10,padding:12,fontSize:14,cursor:"pointer"}}>לא</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// MONTHLY CALENDAR
// ═══════════════════════════════════════════════════════════════════
function MonthlyCalendar({ monthView, setMonthView, data, onDayClick }) {
  const now = monthView;
  const mm = now.getMonth(), yy = now.getFullYear();
  const firstDay = new Date(yy, mm, 1);
  const daysInMonth = new Date(yy, mm + 1, 0).getDate();
  const firstDow = firstDay.getDay();
  const cells = [];
  // לא צריך null padding cells - כל תא מציין gridColumn מפורש
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(yy, mm, d));
  const todayISO = iso(new Date());

  const changeMonth = delta => {
    const n = new Date(monthView);
    n.setMonth(n.getMonth() + delta);
    setMonthView(n);
  };

  return (
    <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={() => changeMonth(-1)} style={{background:C.cardA,border:`1px solid ${C.bdr}`,width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16,color:C.grn}}>→</button>
        <div style={{fontSize:16,fontWeight:700,color:C.grn}}>{MONTHS[mm]} {yy}</div>
        <button onClick={() => changeMonth(1)} style={{background:C.cardA,border:`1px solid ${C.bdr}`,width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16,color:C.grn}}>←</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:3,marginBottom:4}}>
        {DAYNAMES.map((d, i) => (
          <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:WORK_DAYS.includes(i) ? C.txtM : C.txtL,padding:4,gridColumn:i+1}}>{d.slice(0, 3)}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7, 1fr)",gap:3}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i} style={{minHeight:62}}></div>;
          const dy = iso(d);
          const dayOfWeek = d.getDay();
          const isWorkDay = WORK_DAYS.includes(dayOfWeek);
          const items = data.schedule[dy] || [];
          const isToday = dy === todayISO;
          const doneCount = items.filter(x => x.done).length;

          // פרויקטים פעילים ביום זה
          const dayProjs = (data.projects || []).filter(p => {
            if (p.status === "done") return false;
            if (!p.startDate) return false;
            if (p.isRange && p.endDate) {
              return p.startDate <= dy && p.endDate >= dy;
            }
            return p.startDate === dy;
          });

          // מיון לפי עיר
          const jCount = items.filter(x => {
            const c = data.clients.find(cl => cl.id === x.clientId);
            return c && c.city === "ירושלים";
          }).length;
          const bCount = items.filter(x => {
            const c = data.clients.find(cl => cl.id === x.clientId);
            return c && c.city === "בית שמש";
          }).length;

          // בדיקת חג
          const holiday = getHoliday(dy);
          const isHoliday = holiday && holiday.type === "holiday";
          const isEve = holiday && holiday.type === "eve";
          const isChol = holiday && holiday.type === "chol";

          // צבע רקע לפי חג
          let bgColor = !isWorkDay ? C.cardA : isToday ? C.grnP : items.length > 0 ? C.card : "#fff";
          let borderColor = isToday ? C.grn : C.bdr;
          if (isHoliday) { bgColor = "#fde2e4"; borderColor = "#bc4749"; }
          else if (isEve) { bgColor = "#fef3c7"; borderColor = "#e09f3e"; }
          else if (isChol) { bgColor = "#fef3c7"; borderColor = "#e09f3e"; }

          return (
            <div key={i}
                 onClick={() => isWorkDay && onDayClick(dy)}
                 style={{
                   gridColumn:dayOfWeek+1,
                   minHeight:62,
                   padding:4,
                   borderRadius:8,
                   border:`1px solid ${borderColor}`,
                   background:bgColor,
                   cursor:isWorkDay ? "pointer" : "default",
                   opacity:isWorkDay ? 1 : 0.4,
                   display:"flex",
                   flexDirection:"column",
                   gap:2
                 }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:isToday ? 700 : 500,color:isToday ? C.grn : isHoliday ? "#bc4749" : C.txt}}>
                  {d.getDate()}
                </span>
                {items.length > 0 && (
                  <span style={{fontSize:9,fontWeight:600,color:doneCount === items.length ? C.grn : C.txtM}}>
                    {doneCount}/{items.length}
                  </span>
                )}
              </div>
              {/* שם החג אם יש */}
              {holiday && (
                <div style={{
                  fontSize:8,
                  fontWeight:700,
                  color:isHoliday ? "#bc4749" : "#e09f3e",
                  textAlign:"center",
                  whiteSpace:"nowrap",
                  overflow:"hidden",
                  textOverflow:"ellipsis"
                }}>
                  🕎 {holiday.name}
                </div>
              )}
              {/* תצוגה של 2 לקוחות ראשונים עם צבע עיר */}
              <div style={{display:"flex",flexDirection:"column",gap:1,flex:1}}>
                {items.slice(0, 2).map((item, j) => {
                  const c = data.clients.find(cl => cl.id === item.clientId);
                  if (!c) return null;
                  const cc = CITY_COLORS[c.city];
                  return (
                    <div key={j} style={{
                      fontSize:8,
                      padding:"1px 4px",
                      borderRadius:3,
                      background:cc.bg,
                      color:cc.text,
                      fontWeight:500,
                      whiteSpace:"nowrap",
                      overflow:"hidden",
                      textOverflow:"ellipsis",
                      textDecoration:item.done ? "line-through" : "none",
                      opacity:item.done ? 0.5 : 1
                    }}>
                      {c.name}
                    </div>
                  );
                })}
                {items.length > 2 && (
                  <div style={{fontSize:8,color:C.txtM,textAlign:"center"}}>+{items.length - 2}</div>
                )}
                {/* פרויקטים פעילים */}
                {dayProjs.slice(0, 1).map((p, j) => (
                  <div key={`proj-${j}`} style={{
                    fontSize:8,
                    padding:"1px 4px",
                    borderRadius:3,
                    background:"#e9d8fd",
                    color:"#553c9a",
                    fontWeight:600,
                    whiteSpace:"nowrap",
                    overflow:"hidden",
                    textOverflow:"ellipsis"
                  }}>
                    🏗️ {p.title}
                  </div>
                ))}
                {dayProjs.length > 1 && (
                  <div style={{fontSize:8,color:"#7b2cbf",textAlign:"center"}}>+{dayProjs.length - 1} פרויקט</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// DAY VIEW - תצוגה של יום אחד
// ═══════════════════════════════════════════════════════════════════
function DayView({ selectedDay, setSelectedDay, data, toggleVisitDone, addClientToDay, removeClientFromDay, updateDayNote, updateNewNote, markLastNoteHandled, addExtra, removeExtra, updatePermanentNote, addProject, toggleProjectDone, deleteProject, updateProject, addProjectExpense, removeProjectExpense, addExpense, deleteExpense, moveVisitToDay, moveDayToDay }) {
  const date = new Date(selectedDay);
  const dayName = DAYNAMES[date.getDay()];
  const items = data.schedule[selectedDay] || [];
  const [addMode, setAddMode] = useState(false);
  const [showProjectForm, setShowProjectForm] = useState(false);
  const [showExpenseForm, setShowExpenseForm] = useState(false);
  const [expandedVisit, setExpandedVisit] = useState(null); // visitId
  const [showExtraForm, setShowExtraForm] = useState(null); // visitId
  const [expandedProject, setExpandedProject] = useState(null); // projectId
  const [moveVisitState, setMoveVisitState] = useState(null); // {visitId, clientName, isRecurring}
  const [moveDayState, setMoveDayState] = useState(false); // האם המודל פתוח

  // פרויקטים של היום הזה - כוללים גם תאריך יחיד וגם טווח שמכיל את היום
  const dayProjects = (data.projects || []).filter(p => {
    if (p.isRange) {
      return p.startDate <= selectedDay && selectedDay <= (p.endDate || p.startDate);
    }
    return p.startDate === selectedDay;
  });

  // הוצאות של היום הזה
  const dayExpenses = (data.expenses || []).filter(e => {
    return e.date === selectedDay || (e.linkType === "client_day" && e.dayKey === selectedDay);
  }).sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || ""));
  const dayExpensesTotal = dayExpenses.reduce((s, e) => s + (e.amount || 0), 0);

  const clientsWithData = items.map(item => ({
    ...item,
    client: data.clients.find(c => c.id === item.clientId)
  })).filter(x => x.client);

  const totalRevenue = clientsWithData.reduce((s, x) => {
    const extras = (x.extras || []).reduce((e, ex) => e + (ex.amount || 0), 0);
    return s + x.client.price + extras;
  }, 0);
  const doneCount = clientsWithData.filter(x => x.done).length;

  const existingIds = new Set(items.map(x => x.clientId));
  const availableClients = data.clients.filter(c => !existingIds.has(c.id));

  const changeDay = delta => {
    const d = new Date(selectedDay);
    d.setDate(d.getDate() + delta);
    while (!WORK_DAYS.includes(d.getDay())) {
      d.setDate(d.getDate() + (delta > 0 ? 1 : -1));
    }
    setSelectedDay(iso(d));
  };

  return (
    <div style={{padding:12,paddingBottom:80}}>
      {/* באנר חג אם יש */}
      {(() => {
        const hol = getHoliday(selectedDay);
        if (!hol) return null;
        const colors = hol.type === "holiday"
          ? { bg: "#fde2e4", border: "#bc4749", text: "#bc4749", icon: "🕎" }
          : { bg: "#fef3c7", border: "#e09f3e", text: "#a55a0a", icon: "🕯️" };
        const typeLabel = hol.type === "holiday" ? "חג" : hol.type === "eve" ? "ערב חג" : "חול המועד";
        return (
          <div style={{background:colors.bg,border:`2px solid ${colors.border}`,borderRadius:12,padding:10,marginBottom:12,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:colors.text}}>
              {colors.icon} {typeLabel}: {hol.name}
            </div>
          </div>
        );
      })()}

      {/* ניווט יומי */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:"10px 12px",marginBottom:12}}>
        <button onClick={() => changeDay(-1)} style={{background:"none",border:"none",fontSize:22,color:C.grn,cursor:"pointer"}}>→</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:C.grn}}>{dayName} · {fmtHeb(date)}</div>
          {clientsWithData.length > 0 && (
            <div style={{fontSize:11,color:C.txtM,marginTop:2}}>
              {doneCount}/{clientsWithData.length} בוצעו · ₪{totalRevenue.toLocaleString()}
            </div>
          )}
        </div>
        <button onClick={() => changeDay(1)} style={{background:"none",border:"none",fontSize:22,color:C.grn,cursor:"pointer"}}>←</button>
      </div>

      {/* כפתור העברת כל היום - מופיע רק אם יש לקוחות */}
      {clientsWithData.length > 0 && (
        <button
          onClick={() => setMoveDayState(true)}
          style={{width:"100%",background:C.bluB,color:C.blu,border:`1px solid ${C.blu}`,borderRadius:10,padding:10,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:12}}
        >📅 העבר את כל היום ליום אחר</button>
      )}

      {/* רשימת לקוחות היום */}
      {clientsWithData.length === 0 && dayProjects.length === 0 ? (
        <div style={{background:C.card,borderRadius:14,border:`1px dashed ${C.bdr}`,padding:24,textAlign:"center",marginBottom:12}}>
          <div style={{fontSize:40,marginBottom:8}}>🌱</div>
          <div style={{fontSize:14,color:C.txtM,marginBottom:0}}>אין לקוחות או פרויקטים משובצים ביום זה</div>
        </div>
      ) : clientsWithData.length === 0 ? null : (
        <div style={{marginBottom:12}}>
          {clientsWithData.map(item => {
            const c = item.client;
            const cc = CITY_COLORS[c.city];
            const isExpanded = expandedVisit === item.id;
            const extrasTotal = (item.extras || []).reduce((s, e) => s + (e.amount || 0), 0);
            const hasLastNote = item.lastVisitNote && !item.lastVisitNoteHandled;

            return (

                    </div>
                    <div style={{fontSize:12,color:C.txtM}}>
                      ₪{c.price}{extrasTotal > 0 && <span style={{color:C.prp,fontWeight:600}}> +₪{extrasTotal} תוספות</span>} · {freqLabel(c.frequency)}

                  <div style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center",flexShrink:0}}>
                    <button
                      onClick={() => setMoveVisitState({ visitId: item.id, clientName: c.name, isRecurring: item.isRecurring })}
                      title="העבר ליום אחר"
                      style={{background:C.bluB,border:`1px solid ${C.blu}`,color:C.blu,fontSize:11,fontWeight:700,cursor:"pointer",padding:"4px 8px",borderRadius:6,whiteSpace:"nowrap"}}
                    >📅 העבר</button>
                    <button onClick={() => { if (confirm(`להסיר את ${c.name} מיום ${fmtDM(selectedDay)}?\n\nהלקוח נשאר במאגר, מוסר רק הביקור הזה.`)) removeClientFromDay(selectedDay, item.id); }} style={{background:"none",border:"none",color:C.red,fontSize:18,cursor:"pointer",padding:2}}>×</button>
                  </div>
                </div>

                {/* 🔔 כפתור הערה בולט - תמיד מוצג */}
                <div style={{display:"flex",gap:6,marginTop:10}}>
                  <button
                    onClick={() => setExpandedVisit(isExpanded ? null : item.id)}
                    style={{
                      flex:1,
                      background:(c.permanentNote || item.dayNote || item.newNote) ? C.hdrL : C.card,
                      color:(c.permanentNote || item.dayNote || item.newNote) ? "#fff" : C.hdr,
                      border:`2px solid ${C.hdrL}`,
                      borderRadius:10,
                      padding:"10px 12px",
                      fontSize:13,
                      fontWeight:700,
                      cursor:"pointer",
                      display:"flex",
                      alignItems:"center",
                      justifyContent:"center",
                      gap:6
                    }}
                  >
                    <span style={{fontSize:16}}>✏️</span>
                    <span>{(c.permanentNote || item.dayNote || item.newNote) ? "ערוך הערות" : "הוסף הערה"}</span>
                  </button>
                  <button
                    onClick={() => { setExpandedVisit(item.id); setShowExtraForm(item.id); }}
                    style={{
                      background:C.prpB,
                      color:C.prp,
                      border:`2px solid ${C.prp}`,
                      borderRadius:10,
                      padding:"10px 14px",
                      fontSize:13,
                      fontWeight:700,
                      cursor:"pointer",
                      whiteSpace:"nowrap"
                    }}
                    title="הוסף תוספת / עבודה נוספת"
                  >
                    ➕ תוספת
                  </button>
                </div>

                {/* הערות - תמיד מוצגות */}
                {c.permanentNote && (
                  <div style={{marginTop:8,background:C.bluB,border:`1px solid ${C.blu}`,borderRight:`3px solid ${C.blu}`,borderRadius:6,padding:"6px 10px"}}>
                    <div style={{fontSize:10,color:C.blu,fontWeight:700,marginBottom:2}}>📌 הערה קבועה</div>
                    <div style={{fontSize:13,color:C.txt}}>{c.permanentNote}</div>
                  </div>
                )}

                {hasLastNote && (
                  <div style={{marginTop:8,background:C.orgB,border:`1px solid ${C.org}`,borderRight:`3px solid ${C.org}`,borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:10,color:C.org,fontWeight:700,marginBottom:2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span>⚠️ מביקור קודם - דורש טיפול</span>
                      <button onClick={() => markLastNoteHandled(selectedDay, item.id)} style={{background:C.org,color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:10,fontWeight:700,cursor:"pointer"}}>✓ טופל</button>
                    </div>
                    <div style={{fontSize:13,color:C.txt,marginTop:4}}>{item.lastVisitNote}</div>
                  </div>

                {item.dayNote && (
                  <div style={{marginTop:8,background:C.grnP,border:`1px solid ${C.grn}`,borderRight:`3px solid ${C.grn}`,borderRadius:6,padding:"6px 10px"}}>

                )}

                      <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"2px 0"}}>
                        <span>{e.desc}</span>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{fontWeight:600,color:C.prp}}>₪{e.amount}</span>
                          <button onClick={() => removeExtra(selectedDay, item.id, e.id)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:0}}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {item.newNote && (
                  <div style={{marginTop:8,background:"#e7f5e9",border:`1px solid ${C.hdrL}`,borderRight:`3px solid ${C.hdrL}`,borderRadius:6,padding:"6px 10px"}}>
                    <div style={{fontSize:10,color:C.hdrL,fontWeight:700,marginBottom:2}}>💬 הערה שתעבור לביקור הבא</div>
                    <div style={{fontSize:13,color:C.txt}}>{item.newNote}</div>
                  </div>
                )}

                {/* תצוגה מורחבת - עריכה */}
                {isExpanded && (
                  <div style={{marginTop:10,paddingTop:10,borderTop:`1px dashed ${C.bdr}`}}>
                    <EditableNoteField
                      label="📌 הערה קבועה (תמיד תופיע)"
                      value={c.permanentNote || ""}
                      placeholder="לדוגמה: מפתח תחת העציץ, הכלב נושך..."
                      color={C.blu}
                      bgColor={C.bluB}
                      onSave={(val) => updatePermanentNote(c.id, val)}
                    />
                    <EditableNoteField
                      label="📝 הערת יום (רק ליום זה)"
                      value={item.dayNote || ""}
                      placeholder="הערה ספציפית לביקור הזה..."
                      color={C.grn}
                      bgColor={C.grnP}
                      onSave={(val) => updateDayNote(selectedDay, item.id, val)}
                    />
                    <EditableNoteField
                      label="💬 הערה לביקור הבא (תעבור הלאה)"
                      value={item.newNote || ""}
                      placeholder="מה שיצטרכו לטפל בו פעם הבאה..."
                      color={C.hdrL}
                      bgColor="#e7f5e9"
                      onSave={(val) => updateNewNote(selectedDay, item.id, val)}
                    />

                    {/* הוספת תוספת */}
                    {showExtraForm === item.id ? (
                      <ExtraForm
                        onSave={(desc, amount) => { addExtra(selectedDay, item.id, desc, amount); setShowExtraForm(null); }}
                        onCancel={() => setShowExtraForm(null)}
                      />
                    ) : (
                      <button onClick={() => setShowExtraForm(item.id)} style={{width:"100%",marginTop:8,background:C.prpB,color:C.prp,border:`1px dashed ${C.prp}`,borderRadius:8,padding:10,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ הוסף תוספת לביקור (עבודה נוספת + מחיר)</button>
                    )}

                    <button onClick={() => setExpandedVisit(null)} style={{width:"100%",marginTop:8,background:"none",color:C.txtM,border:"none",padding:8,fontSize:11,cursor:"pointer"}}>סגור</button>
                  </div>
                )}

            );
          })}
        </div>
      )}

      {/* פרויקטים של היום */}
      {dayProjects.length > 0 && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.prp,marginBottom:6,paddingRight:4}}>🚧 פרויקטים</div>
          {dayProjects.map(p => (
            <ProjectDayCard
              key={p.id}
              project={p}
              client={p.linkedClientId ? data.clients.find(c => c.id === p.linkedClientId) : null}
              isExpanded={expandedProject === p.id}
              onToggleExpand={() => setExpandedProject(expandedProject === p.id ? null : p.id)}
              onToggleDone={() => toggleProjectDone(p.id)}
              onDelete={() => { if (confirm(`למחוק את הפרויקט "${p.title}"?`)) deleteProject(p.id); }}
              onUpdate={(updates) => updateProject(p.id, updates)}
              onAddExpense={(desc, amount, date) => addProjectExpense(p.id, desc, amount, date)}
              onRemoveExpense={(expenseId) => removeProjectExpense(p.id, expenseId)}
            />
          ))}
        </div>
      )}

      {/* כפתורי הוספה - לקוח + פרויקט + הוצאה */}
      {!addMode && !showProjectForm && !showExpenseForm && clientsWithData.length > 0 && (
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={() => setAddMode(true)} style={{flex:"1 1 45%",background:C.card,border:`2px dashed ${C.grn}`,borderRadius:12,padding:14,color:C.grn,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ הוסף לקוח</button>
          <button onClick={() => setShowProjectForm(true)} style={{flex:"1 1 45%",background:C.card,border:`2px dashed ${C.prp}`,borderRadius:12,padding:14,color:C.prp,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ הוסף פרויקט</button>
          <button onClick={() => setShowExpenseForm(true)} style={{flex:"1 1 100%",background:C.card,border:`2px dashed ${C.red}`,borderRadius:12,padding:12,color:C.red,fontSize:13,fontWeight:600,cursor:"pointer"}}>💸 רשום הוצאה ליום זה</button>
        </div>
      )}

      {/* אם אין לקוחות */}
      {!addMode && !showProjectForm && !showExpenseForm && clientsWithData.length === 0 && (
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}}>
          <button onClick={() => setAddMode(true)} style={{flex:"1 1 45%",background:C.grn,color:"#fff",border:"none",borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ הוסף לקוח</button>
          <button onClick={() => setShowProjectForm(true)} style={{flex:"1 1 45%",background:C.prp,color:"#fff",border:"none",borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ הוסף פרויקט</button>
          <button onClick={() => setShowExpenseForm(true)} style={{flex:"1 1 100%",background:C.red,color:"#fff",border:"none",borderRadius:12,padding:12,fontSize:13,fontWeight:600,cursor:"pointer"}}>💸 רשום הוצאה ליום זה</button>
        </div>
      )}

      {/* מסך הוספה */}
      {addMode && (
        <AddClientToDay
          availableClients={availableClients}
          onAdd={(clientId, recurring) => { addClientToDay(selectedDay, clientId, "", recurring); }}
          onClose={() => setAddMode(false)}
        />
      )}

      {/* טופס פרויקט */}
      {showProjectForm && (
        <AddProjectForm
          selectedDay={selectedDay}
          data={data}
          onSave={(project) => { addProject(project); setShowProjectForm(false); }}
          onClose={() => setShowProjectForm(false)}
        />
      )}

      {/* טופס הוצאה ליום */}
      {showExpenseForm && (
        <div style={{marginTop:8}}>
          <WorkerExpenseForm
            defaultLink={{ linkType: "none", dayKey: selectedDay }}
            data={data}
            selectedDay={selectedDay}
            allowChangeLink={true}
            onSave={(exp) => { addExpense({...exp, date: exp.date || selectedDay}); setShowExpenseForm(false); }}
            onCancel={() => setShowExpenseForm(false)}
          />
        </div>
      )}

      {/* הוצאות של היום - הצגה */}
      {dayExpenses.length > 0 && !showExpenseForm && (
        <div style={{marginTop:14,background:C.card,borderRadius:12,border:`1px solid ${C.bdr}`,padding:12}}>
          <div style={{fontSize:12,color:C.red,fontWeight:700,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>💸 הוצאות היום ({dayExpenses.length})</span>
            <span style={{fontSize:13}}>סה"כ ₪{dayExpensesTotal.toLocaleString()}</span>
          </div>
          {dayExpenses.map(e => {
            const client = e.clientId ? data.clients.find(c => c.id === e.clientId) : null;
            return (
              <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",borderBottom:`1px solid ${C.bdrL}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.txt}}>{e.desc}</div>
                  <div style={{fontSize:10,color:C.txtM}}>
                    {client ? `👤 ${client.name}` : "ללא שיוך"}
                    {e.addedBy === "worker" && <span style={{background:C.bluB,color:C.blu,padding:"1px 5px",borderRadius:5,marginRight:4,fontWeight:600}}>👷 עובד</span>}
                  </div>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:C.red}}>₪{e.amount}</span>
                <button onClick={() => { if (confirm(`למחוק הוצאה: ${e.desc}?`)) deleteExpense(e.id); }} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:2}}>×</button>
              </div>
            );
          })}
        </div>
      )}

      {/* מודל העברת ביקור ליום אחר */}
      {moveVisitState && (
        <MoveVisitModal
          visitId={moveVisitState.visitId}
          clientName={moveVisitState.clientName}
          isRecurring={moveVisitState.isRecurring}
          currentDay={selectedDay}
          onConfirm={(newDay) => {
            moveVisitToDay(selectedDay, moveVisitState.visitId, newDay);
            setMoveVisitState(null);
            setSelectedDay(newDay);
          }}
          onCancel={() => setMoveVisitState(null)}
        />
      )}

      {/* מודל העברת יום שלם */}
      {moveDayState && (
        <MoveDayModal
          currentDay={selectedDay}
          items={items}
          data={data}
          onConfirm={(newDay, includeDone) => {
            moveDayToDay(selectedDay, newDay, includeDone);
            setMoveDayState(false);
            setSelectedDay(newDay);
          }}
          onCancel={() => setMoveDayState(false)}
        />
      )}
    </div>
  );
}

// מודל בחירת יום העברה
function MoveVisitModal({ visitId, clientName, isRecurring, currentDay, onConfirm, onCancel }) {
  const getDefaultNewDay = () => {
    const d = new Date(currentDay);
    d.setDate(d.getDate() + 1);
    while (!WORK_DAYS.includes(d.getDay())) {
      d.setDate(d.getDate() + 1);
    }
    return iso(d);
  };

  const [newDay, setNewDay] = useState(getDefaultNewDay());

  const quickOptions = [
    { label: "מחר", days: 1 },
    { label: "בעוד שבוע", days: 7 },
    { label: "בעוד שבועיים", days: 14 },
  ];

  const setQuick = (days) => {
    const d = new Date(currentDay);
    d.setDate(d.getDate() + days);
    while (!WORK_DAYS.includes(d.getDay())) {
      d.setDate(d.getDate() + 1);
    }
    setNewDay(iso(d));
  };

  const newDate = new Date(newDay);
  const newDayName = DAYNAMES[newDate.getDay()];
  const newHoliday = getHoliday(newDay);

  const handleConfirm = () => {
    if (newHoliday) {
      const typeLabel = newHoliday.type === "holiday" ? "חג" : newHoliday.type === "eve" ? "ערב חג" : "חול המועד";
      if (!confirm(`⚠️ ${newDay} הוא ${typeLabel} (${newHoliday.name}).\n\nהאם בכל זאת להעביר?`)) return;
    }
    onConfirm(newDay);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.card,borderRadius:16,padding:20,maxWidth:400,width:"100%",border:`2px solid ${C.blu}`}}>
        <div style={{fontSize:18,fontWeight:700,color:C.blu,marginBottom:6,textAlign:"center"}}>📅 העבר ליום אחר</div>
        <div style={{fontSize:13,color:C.txtM,textAlign:"center",marginBottom:14}}>
          העברה של <strong style={{color:C.txt}}>{clientName}</strong>
        </div>

        {isRecurring && (
          <div style={{background:C.orgB,border:`1px solid ${C.org}`,borderRadius:8,padding:10,marginBottom:12,fontSize:12,color:C.org}}>
            ℹ️ זה לקוח חוזר. גם השיבוצים העתידיים יידחו בהתאם להפרש הימים.
          </div>
        )}

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:C.txtM,marginBottom:6}}>בחר תאריך חדש:</div>
          <input
            type="date"
            value={newDay}
            onChange={e => setNewDay(e.target.value)}
            min={iso(new Date())}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:15,background:"#fff"}}
          />
          <div style={{fontSize:12,color:C.txtM,marginTop:6,textAlign:"center"}}>
            {newDayName} · {fmtDM(newDay)}
            {newHoliday && <span style={{color:"#bc4749",fontWeight:600}}> · ⚠️ {newHoliday.name}</span>}
          </div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {quickOptions.map(opt => (
            <button
              key={opt.days}
              onClick={() => setQuick(opt.days)}
              style={{flex:1,padding:"8px 6px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.cardA,color:C.txt,fontSize:11,fontWeight:600,cursor:"pointer"}}
            >{opt.label}</button>
          ))}
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={handleConfirm} style={{flex:1,background:C.blu,color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>📅 העבר</button>
          <button onClick={onCancel} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"12px",fontSize:14,cursor:"pointer"}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

          <input
            type="date"
            value={newDay}
            onChange={e => setNewDay(e.target.value)}
            style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:15,background:"#fff"}}
          />
          <div style={{fontSize:12,color:C.txtM,marginTop:6,textAlign:"center"}}>
            {newDayName} · {fmtDM(newDay)}
            {newHoliday && <span style={{color:"#bc4749",fontWeight:600}}> · ⚠️ {newHoliday.name}</span>}
          </div>
        </div>

        {/* כפתורים מהירים */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {quickOptions.map(opt => (
            <button
              key={opt.days}
              onClick={() => setQuick(opt.days)}
              style={{flex:1,padding:"8px 6px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.cardA,color:C.txt,fontSize:11,fontWeight:600,cursor:"pointer"}}
            >{opt.label}</button>
          ))}
        </div>

        {/* בחירה - להעביר גם בוצעו? - רק אם יש בוצעו */}
        {doneItems.length > 0 && (
          <div style={{background:C.cardA,borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{fontSize:12,color:C.txtM,fontWeight:600,marginBottom:8}}>
              יש {doneItems.length} ביקורים שכבר בוצעו. מה לעשות איתם?
            </div>
            <div style={{display:"flex",gap:6}}>
              <button
                onClick={() => setIncludeDone(false)}
                style={{flex:1,padding:8,borderRadius:8,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:!includeDone ? C.blu : C.cardA,color:!includeDone ? "#fff" : C.txtM}}
              >להשאיר ביום הזה ({doneItems.length})</button>
              <button
                onClick={() => setIncludeDone(true)}
                style={{flex:1,padding:8,borderRadius:8,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",background:includeDone ? C.blu : C.cardA,color:includeDone ? "#fff" : C.txtM}}
              >להעביר גם אותם</button>
            </div>
          </div>
        )}

        {/* סיכום */}
        <div style={{background:C.grnP,borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:C.grn,textAlign:"center"}}>
          {includeDone || doneItems.length === 0
            ? `יועברו ${items.length} ביקורים ליום החדש`
            : `יועברו ${notDoneItems.length} ביקורים, ${doneItems.length} יישארו ביום הזה`
          }
        </div>

        {/* כפתורי פעולה */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={handleConfirm} style={{flex:1,background:C.blu,color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>📅 העבר</button>
          <button onClick={onCancel} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"12px",fontSize:14,cursor:"pointer"}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

// קומפוננטה של שדה הערה לעריכה
function EditableNoteField({ label, value, placeholder, color, bgColor, onSave }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(value);

  useEffect(() => { setText(value); }, [value]);

  const save = () => { onSave(text); setEditing(false); };
  const cancel = () => { setText(value); setEditing(false); };

  return (
    <div style={{marginTop:8}}>
      <div style={{fontSize:10,color,fontWeight:700,marginBottom:4}}>{label}</div>
      {editing ? (
        <div>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            placeholder={placeholder}
            rows={2}
            style={{width:"100%",padding:8,borderRadius:6,border:`1px solid ${color}`,fontSize:13,resize:"vertical",background:"#fff"}}
            autoFocus
          />
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button onClick={save} style={{background:color,color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>שמור</button>
            <button onClick={cancel} style={{background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer"}}>ביטול</button>
          </div>
        </div>
      ) : (
        <div onClick={() => setEditing(true)} style={{background:value ? bgColor : C.cardA,border:`1px solid ${value ? color : C.bdr}`,borderRadius:6,padding:"6px 10px",fontSize:12,color:value ? C.txt : C.txtL,cursor:"pointer",minHeight:28}}>
          {value || <span style={{fontStyle:"italic"}}>לחץ להוספה...</span>}
        </div>
      )}
    </div>
  );
}

// טופס הוספת תוספת
function ExtraForm({ onSave, onCancel }) {
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState("");

  const save = () => {
    if (!desc.trim()) { alert("נא הכנס תיאור"); return; }
    onSave(desc.trim(), Number(amount) || 0);
    setDesc("");
    setAmount("");
  };

  return (
    <div style={{marginTop:8,background:C.prpB,border:`1px solid ${C.prp}`,borderRadius:8,padding:10}}>
      <div style={{fontSize:11,color:C.prp,fontWeight:700,marginBottom:6}}>➕ תוספת לביקור</div>
      <input
        type="text"
        value={desc}
        onChange={e => setDesc(e.target.value)}
        placeholder="תיאור העבודה (למשל: גיזום עץ, קניית שתילים...)"
        style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,marginBottom:6,background:"#fff"}}
        autoFocus
      />
      <input
        type="number"
        value={amount}
        onChange={e => setAmount(e.target.value)}
        placeholder="מחיר ₪"
        style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,marginBottom:8,background:"#fff"}}
      />
      <div style={{display:"flex",gap:6}}>
        <button onClick={save} style={{flex:1,background:C.prp,color:"#fff",border:"none",borderRadius:6,padding:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>הוסף</button>
        <button onClick={onCancel} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:6,padding:8,fontSize:12,cursor:"pointer"}}>ביטול</button>

  );
}

// ADD PROJECT FORM - טופס הוספת פרויקט
// ═══════════════════════════════════════════════════════════════════
function AddProjectForm({ selectedDay, data, onSave, onClose }) {

    title: "",
    description: "",
    startDate: selectedDay,
    endDate: selectedDay,
    isRange: false,
    totalPrice: "",
    clientName: "",
    city: "ירושלים",
    area: "",
    linkedClientId: null

  const [linkMode, setLinkMode] = useState("new"); // "new" | "existing"

  const save = () => {
    if (!form.title.trim()) { alert("נא הכנס כותרת לפרויקט"); return; }

    const client = linkMode === "existing" && form.linkedClientId
      ? data.clients.find(c => c.id === form.linkedClientId)
      : null;

    const project = {
      title: form.title.trim(),
      description: form.description.trim(),
      startDate: form.startDate,
      endDate: form.isRange ? (form.endDate || form.startDate) : form.startDate,
      isRange: form.isRange,
      totalPrice: Number(form.totalPrice) || 0,
      linkedClientId: client ? client.id : null,
      clientName: client ? client.name : form.clientName.trim(),
      city: client ? client.city : form.city,
      area: client ? client.area : form.area,
    };

    onSave(project);
  };

  return (
    <div style={{background:C.card,borderRadius:14,border:`2px solid ${C.prp}`,padding:14,marginTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:16,fontWeight:700,color:C.prp}}>🚧 פרויקט חדש</div>

      </div>

      <div style={{background:C.prpB,border:`1px solid ${C.prp}`,borderRadius:8,padding:10,marginBottom:12,fontSize:11,color:C.prp,lineHeight:1.4}}>

      </div>

        {/* כותרת */}

        </div>

        {/* לקוח - חדש או קיים */}
        {linkMode === "existing" ? (
          <div>
            <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>בחר לקוח קיים *</div>
            <select value={form.linkedClientId || ""} onChange={e => setForm({...form, linkedClientId: e.target.value})} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}}>
              <option value="">-- בחר --</option>
              {data.clients.map(c => <option key={c.id} value={c.id}>{c.name} ({c.city})</option>)}
            </select>
          </div>
        ) : (
          <>
            <div>
              <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>שם הלקוח</div>
              <input type="text" value={form.clientName} onChange={e => setForm({...form, clientName: e.target.value})} placeholder="אופציונלי - אם זה עצמאי" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}} />
            </div>

          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <button onClick={() => setForm({...form, isRange: false})} style={{flex:1,padding:8,borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:!form.isRange ? C.prp : "#fff",color:!form.isRange ? "#fff" : C.txt}}>📅 יום יחיד</button>
            <button onClick={() => setForm({...form, isRange: true})} style={{flex:1,padding:8,borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:form.isRange ? C.prp : "#fff",color:form.isRange ? "#fff" : C.txt}}>📆 טווח תאריכים</button>
          </div>
          {!form.isRange ? (
            <div>
              <div style={{fontSize:10,color:C.txtM,marginBottom:3,fontWeight:500}}>תאריך ביצוע</div>
              <input type="date" value={form.startDate} onChange={e => setForm({...form, startDate: e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff"}} />
            </div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div>
                <div style={{fontSize:10,color:C.txtM,marginBottom:3,fontWeight:500}}>התחלה</div>
