            <label style={{...lb,fontSize:13,color:C.org,fontWeight:700}}>{"💰 תוספות לחיוב"}</label>
            {extras.map((ex,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:5,padding:"6px 8px",background:"#fff7ed",borderRadius:8,border:"1px solid "+C.org}}>
              <button onClick={()=>remExtra(i)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit"}}>{"✕"}</button>
              <input value={ex.desc||""} onChange={e=>updExtra(i,"desc",e.target.value)} placeholder={"מה נעשה?"} style={{flex:2,padding:"7px 10px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:12,fontFamily:"inherit"}}/>
              <input value={ex.qty||""} onChange={e=>updExtra(i,"qty",e.target.value)} placeholder={"כמות (לא חובה)"} style={{flex:1,padding:"7px 10px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:12,fontFamily:"inherit"}}/>
            </div>)}
            <button onClick={addExtra} style={{width:"100%",padding:"8px",borderRadius:8,border:"1px dashed "+C.org,background:"#fff",color:C.org,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"+ תוספת לחיוב"}</button>
          </div>

          {/* 3. Reminders */}
          <div style={{marginBottom:14}}>
            <label style={{...lb,fontSize:13,color:C.blu,fontWeight:700}}>{"🔔 תזכורות לביקור הבא"}</label>
            {reminders.map((rm,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:5,padding:"6px 8px",background:C.bluB,borderRadius:8,border:"1px solid "+C.blu}}>
              <button onClick={()=>remRem(i)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:0,fontFamily:"inherit"}}>{"✕"}</button>
              <input value={rm.text||""} onChange={e=>updRem(i,e.target.value)} placeholder={"מה לבדוק / להביא בפעם הבאה?"} style={{flex:1,padding:"7px 10px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:12,fontFamily:"inherit"}}/>
            </div>)}
            <button onClick={addRem} style={{width:"100%",padding:"8px",borderRadius:8,border:"1px dashed "+C.blu,background:"#fff",color:C.blu,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"+ תזכורת"}</button>
          </div>

          <button onClick={saveLog} style={{width:"100%",padding:14,borderRadius:12,border:"none",background:C.grn,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"💾 שמור"}</button>
        </div>
      </div></div>;
    }


    // ─── ADD BULK ORDER (supermarket-style picker) ───
    if(modal==="addBulkOrder"){
      const items=form.bulkItems||[];
      const inv=data.inventory||[];
      // Group inventory by category
      const byCat={};
      INV_CATS.forEach(c=>{byCat[c.id]={cat:c,items:[]};});
      inv.forEach(it=>{if(byCat[it.category])byCat[it.category].items.push(it);});

      // Add or merge item to cart
      const addToCart=(invItem,size,qty)=>{
        qty=+qty||1;
        const desc=size?invItem.name+" - "+size:invItem.name;
        // Check if same item+size already in cart, merge quantities
        const existingIdx=items.findIndex(it=>it.invItemId===invItem.id && it.size===size);
        if(existingIdx>=0){
          const newItems=[...items];
          newItems[existingIdx]={...newItems[existingIdx],qty:(+newItems[existingIdx].qty||1)+qty};
          setForm({...form,bulkItems:newItems,sizeModalFor:null});
        } else {
          // If prelocked to a site, auto-assign
          const preAssign=form.bulkPrelocked?{assignType:form.bulkPrelockedType||"project",projectId:form.bulkPrelockedSiteId||"",freeText:""}:{assignType:"project",projectId:"",freeText:""};
          setForm({...form,bulkItems:[...items,{invItemId:invItem.id,name:invItem.name,size,qty,desc,amount:invItem.defaultPrice||"",...preAssign}],sizeModalFor:null});
        }
      };
      const removeFromCart=(idx)=>{setForm({...form,bulkItems:items.filter((_,i)=>i!==idx)});};
      const updateCartItem=(idx,field,val)=>{const newItems=[...items];newItems[idx]={...newItems[idx],[field]:val};setForm({...form,bulkItems:newItems});};
      const incQty=(idx,delta)=>{const newItems=[...items];const cur=+newItems[idx].qty||1;newItems[idx]={...newItems[idx],qty:Math.max(1,cur+delta)};setForm({...form,bulkItems:newItems});};
      const total=items.reduce((s,it)=>s+((+it.amount||0)*(+it.qty||1)),0);
      const totalQty=items.reduce((s,it)=>s+(+it.qty||1),0);
      const assignAllToProject=(targetType,targetId,targetText)=>{setForm({...form,bulkAssignAll:targetType+":"+(targetId||""),bulkAssignAllText:targetText||"",bulkItems:items.map(it=>({...it,assignType:targetType,projectId:targetId||"",freeText:targetText||""}))});};
      // Manual custom item add
      const addCustomItem=()=>{
        const preAssign=form.bulkPrelocked?{assignType:form.bulkPrelockedType||"project",projectId:form.bulkPrelockedSiteId||"",freeText:""}:{assignType:"project",projectId:"",freeText:""};
        setForm({...form,bulkItems:[...items,{name:"",size:"",qty:1,desc:"",amount:"",...preAssign,saveToInv:false,saveToCat:"shrubs"}],editingIdx:items.length});
      };
      // Save custom items to inventory (called before saving the order)
      const saveCustomItemsToInventory=(d)=>{
        if(!d.inventory)d.inventory=[];
        items.forEach(it=>{
          if(!it.invItemId && it.saveToInv && it.name && it.name.trim()){
            const exists=d.inventory.some(inv=>(inv.name||"").trim().toLowerCase()===it.name.trim().toLowerCase());
            if(!exists){
              d.inventory.push({id:uid(),name:it.name.trim(),category:it.saveToCat||"shrubs"});
            }
          }
        });
      };
      // Step: 1=pick items, 2=details (project/supplier/save)
      const step=form.bulkStep||1;
      const setStep=(s)=>setForm({...form,bulkStep:s});
      // Save handler
      const saveBulkOrderEnhanced=()=>{
        // Validate: each item must have a destination
        const validItems=items.filter(it=>{
          if(!(it.desc||it.name))return false;
          const t=it.assignType||"project";
          if(t==="project"||t==="maintenance")return !!it.projectId;
          if(t==="test")return true;
          if(t==="free")return !!(it.freeText||"").trim();
          return false;
        });
        if(validItems.length===0)return;
        const supplier=form.bulkSupplier||"";
        const status=form.bulkStatus||"ordered";
        const date=form.bulkDate||todayISO;
        const orderNote=(form.bulkOrderNote||"").trim();
        up(d=>{
          // First save any custom items to inventory if requested
          saveCustomItemsToInventory(d);
          if(!d.projectOrders)d.projectOrders={};
          validItems.forEach(it=>{
            const t=it.assignType||"project";
            // Build destination key: real project id, maintenance site id (m1, m2), or special keys
            let destKey;
            if(t==="project"||t==="maintenance"){destKey=it.projectId;}
            else if(t==="test"){destKey="__test__";}
            else if(t==="free"){destKey="__free__";}
            if(!d.projectOrders[destKey])d.projectOrders[destKey]=[];
            const qty=+it.qty||1;
            let desc=qty>1?qty+"× "+(it.desc||it.name+(it.size?" - "+it.size:"")):(it.desc||it.name+(it.size?" - "+it.size:""));
            // Build combined note: free text (if applicable) + order note
            const parts=[];
            if(t==="free" && it.freeText)parts.push(it.freeText);
            if(orderNote)parts.push(orderNote);
            const note=parts.join(" · ");
            d.projectOrders[destKey].push({id:uid(),desc,supplier,amount:(+it.amount||0)*qty,status,date,note,assignType:t});
          });
        });
        setModal(null);setForm({});
      };

      // Size picker mini-modal (when user clicks an inventory item)
      const sizeModalItem=form.sizeModalFor;
      if(sizeModalItem){
        const cat=INV_CATS.find(c=>c.id===sizeModalItem.category);
        // Item-specific sizes override category sizes
        const sizes=(sizeModalItem.sizes && sizeModalItem.sizes.length>0)?sizeModalItem.sizes:(cat?.sizes||[]);
        const selectedSize=form.tempSize||sizes[0]||"";
        const selectedQty=+form.tempQty||1;
        // Special handler: head-system assembly with config picker
        if(sizeModalItem.isHeadSystem){
          const valves=form.tempValves||"2";
          const irrType=form.tempIrrType||"drip";
          const fert=form.tempFert||"no";
          const irrLabels={drip:"💧 טפטוף",sprinkler:"💦 המטרה",mixed:"💧💦 משולב"};
          const buildDesc=()=>{
            return "ראש מערכת "+valves+" ברזים - "+(irrType==="drip"?"טפטוף":irrType==="sprinkler"?"המטרה":"משולב")+" - "+(fert==="yes"?"עם דישון":"בלי דישון");
          };
          return <div onClick={()=>setForm({...form,sizeModalFor:null})} style={{...ov,zIndex:1100}}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:440}}>
            <h3 style={{fontSize:18,color:C.grn,marginBottom:6,textAlign:"center"}}>{"🚰 "+sizeModalItem.name}</h3>
            <div style={{fontSize:11,color:C.txtM,textAlign:"center",marginBottom:14}}>{"בנה את התצורה המתאימה"}</div>
            {/* Number of valves */}
            <div style={{marginBottom:12}}>
              <label style={lb}>{"1️⃣  כמה ברזים?"}</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5, 1fr)",gap:6}}>
                {["1","2","3","4","6"].map(v=><button key={v} onClick={()=>setForm({...form,tempValves:v})} style={{padding:"12px 4px",borderRadius:8,border:"2px solid "+(valves===v?C.grn:C.bdr),background:valves===v?C.grnP:"#fff",color:valves===v?C.grn:C.txtM,fontSize:16,fontWeight:valves===v?700:500,cursor:"pointer",fontFamily:"inherit"}}>{v}</button>)}
              </div>
            </div>
            {/* Irrigation type */}
            <div style={{marginBottom:12}}>
              <label style={lb}>{"2️⃣  סוג השקיה?"}</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:6}}>
                {[{id:"drip",label:"💧 טפטוף"},{id:"sprinkler",label:"💦 המטרה"},{id:"mixed",label:"💧💦 משולב"}].map(opt=><button key={opt.id} onClick={()=>setForm({...form,tempIrrType:opt.id})} style={{padding:"10px 4px",borderRadius:8,border:"2px solid "+(irrType===opt.id?C.blu:C.bdr),background:irrType===opt.id?C.bluB:"#fff",color:irrType===opt.id?C.blu:C.txtM,fontSize:12,fontWeight:irrType===opt.id?700:500,cursor:"pointer",fontFamily:"inherit"}}>{opt.label}</button>)}
              </div>
            </div>
            {/* Fertilizer */}
            <div style={{marginBottom:14}}>
              <label style={lb}>{"3️⃣  עם דישון?"}</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:6}}>
                {[{id:"yes",label:"✅ עם דישון",col:C.grn},{id:"no",label:"❌ בלי דישון",col:C.txtM}].map(opt=><button key={opt.id} onClick={()=>setForm({...form,tempFert:opt.id})} style={{padding:"10px 4px",borderRadius:8,border:"2px solid "+(fert===opt.id?opt.col:C.bdr),background:fert===opt.id?(opt.id==="yes"?C.grnP:C.cardA):"#fff",color:fert===opt.id?opt.col:C.txtM,fontSize:13,fontWeight:fert===opt.id?700:500,cursor:"pointer",fontFamily:"inherit"}}>{opt.label}</button>)}
              </div>
            </div>
            {/* Quantity */}
            <div style={{marginBottom:14}}>
              <label style={lb}>{"כמות"}</label>
              <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
                <button onClick={()=>setForm({...form,tempQty:Math.max(1,selectedQty-1)})} style={{width:38,height:38,borderRadius:"50%",border:"1px solid "+C.bdr,background:C.wht,fontSize:20,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>−</button>
                <input type="number" min="1" value={selectedQty} onChange={e=>{const v=parseInt(e.target.value)||1;setForm({...form,tempQty:Math.max(1,v)});}} onFocus={e=>e.target.select()} style={{width:80,height:46,fontSize:22,fontWeight:700,textAlign:"center",border:"2px solid "+C.grn,borderRadius:10,fontFamily:"inherit",outline:"none",background:C.grnP,color:C.grn}}/>
                <button onClick={()=>setForm({...form,tempQty:selectedQty+1})} style={{width:38,height:38,borderRadius:"50%",border:"1px solid "+C.bdr,background:C.wht,fontSize:20,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>+</button>
              </div>
            </div>
            {/* Preview */}
            <div style={{background:C.cardA,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,fontWeight:600,color:C.txt,textAlign:"center",border:"1px dashed "+C.bdr}}>{"📋 "+buildDesc()}</div>
            <button onClick={()=>{
              const desc=buildDesc();
              const sizeStr=valves+" ברזים · "+(irrType==="drip"?"טפטוף":irrType==="sprinkler"?"המטרה":"משולב")+(fert==="yes"?" · דישון":"");
              addToCart({...sizeModalItem,name:desc},sizeStr,selectedQty);
              setForm(p=>({...p,sizeModalFor:null,tempSize:"",tempQty:1,tempValves:"2",tempIrrType:"drip",tempFert:"no"}));
            }} style={{...sb,background:C.grn}}>{"➕ הוסף לעגלה"}</button>
            <button onClick={()=>setForm({...form,sizeModalFor:null,tempSize:"",tempQty:1,tempValves:"2",tempIrrType:"drip",tempFert:"no"})} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginTop:6}}>{"ביטול"}</button>
          </div></div>;
        }
        return <div onClick={()=>setForm({...form,sizeModalFor:null})} style={{...ov,zIndex:1100}}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:400}}>
          <h3 style={{fontSize:18,color:C.grn,marginBottom:14,textAlign:"center"}}>{(cat?.icon||"")+" "+sizeModalItem.name}</h3>
          {sizes.length>0 && <div style={{marginBottom:14}}>
            <label style={lb}>{"גודל"}</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(sizes.length,5)+", 1fr)",gap:6}}>
              {sizes.map(sz=><button key={sz} onClick={()=>setForm({...form,tempSize:sz})} style={{padding:"12px 4px",borderRadius:8,border:"2px solid "+(selectedSize===sz?C.grn:C.bdr),background:selectedSize===sz?C.grnP:"#fff",color:selectedSize===sz?C.grn:C.txtM,fontSize:14,fontWeight:selectedSize===sz?700:500,cursor:"pointer",fontFamily:"inherit"}}>{sz}</button>)}
            </div>
          </div>}
          <div style={{marginBottom:14}}>
            <label style={lb}>{"כמות"}</label>
            <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginBottom:8}}>
              <button onClick={()=>setForm({...form,tempQty:Math.max(1,selectedQty-1)})} style={{width:42,height:42,borderRadius:"50%",border:"1px solid "+C.bdr,background:C.wht,fontSize:22,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>−</button>
              <input type="number" min="1" value={selectedQty} onChange={e=>{const v=parseInt(e.target.value)||1;setForm({...form,tempQty:Math.max(1,v)});}} onFocus={e=>e.target.select()} style={{width:90,height:50,fontSize:24,fontWeight:700,textAlign:"center",border:"2px solid "+C.grn,borderRadius:10,fontFamily:"inherit",outline:"none",background:C.grnP,color:C.grn}}/>
              <button onClick={()=>setForm({...form,tempQty:selectedQty+1})} style={{width:42,height:42,borderRadius:"50%",border:"1px solid "+C.bdr,background:C.wht,fontSize:22,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>+</button>
            </div>
            {/* Quick increment buttons for big quantities */}
            <div style={{display:"flex",gap:5,justifyContent:"center"}}>
              {[5,10,25,50,100].map(n=><button key={n} onClick={()=>setForm({...form,tempQty:selectedQty+n})} style={{flex:1,padding:"6px 4px",borderRadius:8,border:"1px solid "+C.bdr,background:C.cardA,color:C.grn,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"+"+n}</button>)}
            </div>
          </div>
          {/* Optional extra note */}
          <div style={{marginBottom:12}}>
            <label style={{...lb,fontSize:11,color:C.txtM}}>{"📝 פירוט נוסף (אופציונלי)"}</label>
            <input value={form.tempExtraNote||""} onChange={e=>setForm({...form,tempExtraNote:e.target.value})} placeholder={"הערה / מידה מיוחדת"} style={{...inp,fontSize:13,padding:"8px 12px"}}/>
          </div>
          <button onClick={()=>{
            const extraNote=(form.tempExtraNote||"").trim();
            const sizeWithNote=extraNote?(selectedSize?selectedSize+" ("+extraNote+")":extraNote):selectedSize;
            addToCart(sizeModalItem,sizeWithNote,selectedQty);
            setForm(p=>({...p,sizeModalFor:null,tempSize:"",tempQty:1,tempExtraNote:""}));
          }} style={{...sb,background:C.grn}}>{"➕ הוסף לעגלה"}</button>
          <button onClick={()=>setForm({...form,sizeModalFor:null,tempSize:"",tempQty:1,tempExtraNote:""})} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:13,cursor:"pointer",fontFamily:"inherit",marginTop:6}}>{"ביטול"}</button>
        </div></div>;
      }

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"94vh"}}>
        {/* Sticky header */}
        <div style={{background:C.org,color:"#fff",padding:"12px 16px",position:"sticky",top:0,zIndex:10,borderRadius:"16px 16px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={close} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:30,height:30,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
            <div style={{textAlign:"right",flex:1,marginInlineStart:10}}>
              <div style={{fontSize:17,fontWeight:700}}>{step===1?"🛒 בחר פריטים":"📋 פרטי הזמנה"}</div>
              <div style={{fontSize:11,opacity:0.85}}>{items.length>0?(totalQty+" פריטים"+(total>0?" · ₪"+total.toLocaleString():"")):"עגלה ריקה"}</div>
              {form.bulkPrelocked && form.bulkPrelockedSiteName && <div style={{fontSize:11,opacity:0.95,marginTop:3,padding:"2px 8px",background:"rgba(255,255,255,0.2)",borderRadius:8,display:"inline-block",fontWeight:700}}>{"🎯 ל"+form.bulkPrelockedSiteName}</div>}
            </div>
          </div>
          {/* Step tabs */}
          <div style={{display:"flex",gap:4,marginTop:10}}>
            <button onClick={()=>setStep(1)} style={{flex:1,padding:"6px",borderRadius:14,border:"none",background:step===1?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.1)",color:"#fff",fontSize:12,fontWeight:step===1?700:500,cursor:"pointer",fontFamily:"inherit"}}>{"1. פריטים"}</button>
            <button onClick={()=>{if(items.length>0)setStep(2);}} style={{flex:1,padding:"6px",borderRadius:14,border:"none",background:step===2?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.1)",color:"#fff",fontSize:12,fontWeight:step===2?700:500,cursor:items.length>0?"pointer":"not-allowed",fontFamily:"inherit",opacity:items.length>0?1:0.5}}>{"2. שמירה"}</button>
          </div>
        </div>

        <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(94vh - 110px)"}}>
          {/* STEP 1: Pick items */}
          {step===1 && <div>
            {/* Cart preview */}
            {items.length>0 && <div style={{background:C.grnP,borderRadius:10,padding:10,marginBottom:14,border:"1px solid "+C.grn}}>
              <div style={{fontSize:12,fontWeight:700,color:C.grn,marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                <span>{totalQty+" פריטים"}</span>
                <span>{"🛒 בעגלה"}</span>
              </div>
              {items.map((it,i)=><div key={i} style={{background:"#fff",borderRadius:6,padding:"6px 8px",marginBottom:4,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <span onClick={()=>removeFromCart(i)} style={{cursor:"pointer",color:C.red,fontSize:14,marginInlineEnd:4}}>{"✕"}</span>
                  <button onClick={()=>incQty(i,-1)} style={{width:24,height:24,borderRadius:"50%",border:"1px solid "+C.bdr,background:"#fff",fontSize:12,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>−</button>
                  <input type="number" min="1" value={it.qty||1} onChange={e=>{const v=parseInt(e.target.value)||1;updateCartItem(i,"qty",Math.max(1,v));}} onFocus={e=>e.target.select()} style={{width:50,height:26,fontSize:13,fontWeight:700,textAlign:"center",border:"1px solid "+C.grn,borderRadius:6,fontFamily:"inherit",outline:"none",background:C.grnP,color:C.grn}}/>
                  <button onClick={()=>incQty(i,1)} style={{width:24,height:24,borderRadius:"50%",border:"1px solid "+C.bdr,background:"#fff",fontSize:12,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>+</button>
                </div>
                <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                  <div style={{fontWeight:600}}>{it.name||it.desc}</div>
                  {it.size && <div style={{fontSize:10,color:C.txtM}}>{"גודל: "+it.size}</div>}
                </div>
              </div>)}
              <button onClick={()=>setStep(2)} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:C.grn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginTop:6}}>{"המשך לשמירה ← ("+totalQty+" פריטים)"}</button>
            </div>}

            {/* Quick category navigation */}
            <div style={{marginBottom:8,position:"sticky",top:0,zIndex:6,background:C.card,paddingBottom:6,paddingTop:2}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:4,marginBottom:6}}>
                {INV_CATS.map(cat=>{
                  const catItemsCount=(byCat[cat.id]?.items||[]).length;
                  const inCart=items.filter(it=>{
                    if(!it.invItemId)return false;
                    const inv=(data.inventory||[]).find(i=>i.id===it.invItemId);
                    return inv && inv.category===cat.id;
                  }).reduce((s,c)=>s+(+c.qty||1),0);
                  return <button key={cat.id} onClick={()=>{
                    setForm({...form,bulkSearch:"",connectorSubgroup:null});
                    // Scroll to category after a short delay (for re-render)
                    setTimeout(()=>{
                      const el=document.getElementById("bulkcat-"+cat.id);
                      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
                    },50);
                  }} style={{padding:"10px 4px",borderRadius:8,border:"1.5px solid "+(inCart>0?C.grn:C.bdr),background:inCart>0?C.grnP:"#fff",cursor:"pointer",fontFamily:"inherit",position:"relative",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    {inCart>0 && <span style={{position:"absolute",top:-6,right:-6,background:C.grn,color:"#fff",borderRadius:"50%",minWidth:20,height:20,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{inCart}</span>}
                    <span style={{fontSize:18,lineHeight:1}}>{cat.icon}</span>
                    <span style={{fontSize:10,fontWeight:700,color:inCart>0?C.grn:C.txt}}>{cat.label}</span>
                  </button>;
                })}
              </div>
            </div>

            {/* Search filter */}
            <div style={{marginBottom:12}}>
              <input value={form.bulkSearch||""} onChange={e=>setForm({...form,bulkSearch:e.target.value})} placeholder={"🔍 חפש פריט..."} style={{...inp,fontSize:13,padding:"10px 14px"}}/>
            </div>

            {/* Categories with items */}
            {INV_CATS.map(cat=>{
              const allCatItems=byCat[cat.id]?.items||[];
              const searchQ=(form.bulkSearch||"").trim().toLowerCase();
              const catItems=searchQ?allCatItems.filter(it=>(it.name||"").toLowerCase().includes(searchQ)):allCatItems;
              if(searchQ && catItems.length===0)return null;

              // Special: connectors use 2-step subgroup navigation (when not searching)
              const useSubgroups=cat.id==="connectors" && !searchQ && allCatItems.some(it=>it.subgroup);
              const activeSubgroup=form.connectorSubgroup;

              if(useSubgroups){
                // Build unique subgroups
                const subgroupsMap={};
                allCatItems.forEach(it=>{
                  const sg=it.subgroup||"אחר";
                  if(!subgroupsMap[sg])subgroupsMap[sg]={name:sg,items:[],inCartCount:0};
                  subgroupsMap[sg].items.push(it);
                });
                // Count items in cart per subgroup
                Object.values(subgroupsMap).forEach(sg=>{
                  sg.inCartCount=sg.items.reduce((sum,it)=>sum+items.filter(c=>c.invItemId===it.id).reduce((s,c)=>s+(+c.qty||1),0),0);
                });
                const subgroupsList=Object.values(subgroupsMap);
                const activeSg=activeSubgroup?subgroupsMap[activeSubgroup]:null;

                return <div key={cat.id} id={"bulkcat-"+cat.id} style={{marginBottom:14,scrollMarginTop:80}}>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:8,padding:"6px 10px",background:C.grnP,color:C.grn,borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    {activeSg && <button onClick={()=>setForm({...form,connectorSubgroup:null})} style={{background:"#fff",border:"1px solid "+C.grn,color:C.grn,fontSize:11,padding:"3px 8px",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{"← חזור"}</button>}
                    {!activeSg && <span style={{fontSize:11,opacity:0.7}}>{subgroupsList.length+" קבוצות"}</span>}
                    <span>{cat.icon+" "+cat.label+(activeSg?" / "+activeSg.name:"")}</span>
                  </div>
                  {!activeSg && <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:6}}>
                    {subgroupsList.map(sg=><button key={sg.name} onClick={()=>setForm({...form,connectorSubgroup:sg.name})} style={{padding:"14px 8px",borderRadius:10,border:"2px solid "+(sg.inCartCount>0?C.grn:C.bdr),background:sg.inCartCount>0?C.grnP:"#fff",cursor:"pointer",fontFamily:"inherit",textAlign:"center",position:"relative"}}>
                      {sg.inCartCount>0 && <span style={{position:"absolute",top:-6,right:-6,background:C.grn,color:"#fff",borderRadius:"50%",minWidth:22,height:22,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{sg.inCartCount}</span>}
                      <div style={{fontSize:14,fontWeight:700,color:sg.inCartCount>0?C.grn:C.txt,marginBottom:2}}>{sg.name}</div>
                      <div style={{fontSize:10,color:C.txtM}}>{sg.items.length+" פריטים"}</div>
                    </button>)}
                  </div>}
                  {activeSg && <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:6}}>
                    {activeSg.items.map(it=>{
                      const inCart=items.filter(c=>c.invItemId===it.id).reduce((s,c)=>s+(+c.qty||1),0);
                      return <div key={it.id} style={{padding:"12px 8px",borderRadius:10,border:"2px solid "+(inCart>0?C.grn:C.bdr),background:inCart>0?C.grnP:"#fff",fontFamily:"inherit",textAlign:"center",position:"relative",cursor:"pointer"}} onClick={()=>{
                        if(it.isFreeForm){addCustomItem();return;}
                        const itemSizes=(it.sizes&&it.sizes.length>0)?it.sizes:(cat.sizes||[]);
                        setForm({...form,sizeModalFor:it,tempSize:itemSizes[0]||"",tempQty:1,tempValves:"2",tempIrrType:"drip",tempFert:"no",tempExtraNote:""});
                      }}>
                        {!it.isHeadSystem && !it.isFreeForm && <button onClick={e=>{e.stopPropagation();if(confirm("למחוק את \""+it.name+"\" מהמאגר?\n(ההזמנות הקיימות לא יושפעו)"))delInvItem(it.id);}} style={{position:"absolute",top:-7,left:-7,background:"#fff",border:"1px solid "+C.bdr,color:C.txtL,width:20,height:20,borderRadius:"50%",cursor:"pointer",fontSize:11,fontFamily:"inherit",padding:0,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}} title={"מחק מהמאגר"}>{"🗑"}</button>}
                        {inCart>0 && <span style={{position:"absolute",top:-6,right:-6,background:C.grn,color:"#fff",borderRadius:"50%",minWidth:22,height:22,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{inCart}</span>}
                        <div style={{fontSize:13,fontWeight:600,color:inCart>0?C.grn:C.txt,lineHeight:1.3}}>{it.name}</div>
                      </div>;
                    })}
                  </div>}
                </div>;
              }

              return <div key={cat.id} id={"bulkcat-"+cat.id} style={{marginBottom:14,scrollMarginTop:80}}>
                <div style={{fontSize:14,fontWeight:700,marginBottom:8,padding:"6px 10px",background:C.grnP,color:C.grn,borderRadius:6,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,opacity:0.7}}>{catItems.length+(searchQ?"/"+allCatItems.length:"")}</span>
                  <span>{cat.icon+" "+cat.label}</span>
                </div>
                {allCatItems.length===0 && <div style={{textAlign:"center",color:C.txtL,fontSize:11,padding:10}}>{"אין פריטים. הוסף בהגדרות → מאגר ציוד"}</div>}
                <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:6}}>
                  {catItems.map(it=>{
                    const inCart=items.filter(c=>c.invItemId===it.id).reduce((s,c)=>s+(+c.qty||1),0);
                    return <div key={it.id} style={{padding:"12px 8px",borderRadius:10,border:"2px solid "+(inCart>0?C.grn:C.bdr),background:inCart>0?C.grnP:"#fff",fontFamily:"inherit",textAlign:"center",position:"relative",cursor:"pointer"}} onClick={()=>{
                      if(it.isFreeForm){addCustomItem();return;}
                      const itemSizes=(it.sizes&&it.sizes.length>0)?it.sizes:(cat.sizes||[]);
                      setForm({...form,sizeModalFor:it,tempSize:itemSizes[0]||"",tempQty:1,tempValves:"2",tempIrrType:"drip",tempFert:"no",tempExtraNote:""});
                    }}>
                      {/* Delete button (only for regular items, not special ones) */}
                      {!it.isHeadSystem && !it.isFreeForm && <button onClick={e=>{e.stopPropagation();if(confirm("למחוק את \""+it.name+"\" מהמאגר?\n(ההזמנות הקיימות לא יושפעו)"))delInvItem(it.id);}} style={{position:"absolute",top:-7,left:-7,background:"#fff",border:"1px solid "+C.bdr,color:C.txtL,width:20,height:20,borderRadius:"50%",cursor:"pointer",fontSize:11,fontFamily:"inherit",padding:0,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}} title={"מחק מהמאגר"}>{"🗑"}</button>}
                      {inCart>0 && <span style={{position:"absolute",top:-6,right:-6,background:C.grn,color:"#fff",borderRadius:"50%",minWidth:22,height:22,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{inCart}</span>}
                      <div style={{fontSize:13,fontWeight:600,color:inCart>0?C.grn:C.txt,lineHeight:1.3}}>{it.name}</div>
                    </div>;
                  })}
                </div>
              </div>;
            })}

            {/* Custom item button */}
            <button onClick={addCustomItem} style={{width:"100%",padding:"10px",borderRadius:10,border:"2px dashed "+C.bdr,background:C.cardA,color:C.txtM,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>{"+ פריט חופשי (לא במאגר)"}</button>

            {/* Custom items being edited */}
            {items.map((it,i)=>{
              if(it.invItemId)return null; // already shown in cart
              return <div key={i} style={{background:"#fff",border:"1px solid "+C.bdr,borderRadius:10,padding:10,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:C.txtM}}>{"פריט חופשי #"+(i+1)}</span>
                  <button onClick={()=>removeFromCart(i)} style={{background:"none",border:"none",color:C.red,fontSize:16,cursor:"pointer",padding:0,fontWeight:700}}>{"×"}</button>
                </div>
                <input value={it.name||""} onChange={e=>updateCartItem(i,"name",e.target.value)} placeholder={"שם הפריט"} style={{...inp,fontSize:13,padding:"8px 10px",marginBottom:6}}/>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <input value={it.size||""} onChange={e=>updateCartItem(i,"size",e.target.value)} placeholder={"גודל"} style={{...inp,fontSize:13,padding:"8px 10px",flex:1}}/>
                  <input type="number" value={it.qty||1} onChange={e=>{const v=parseInt(e.target.value)||1;updateCartItem(i,"qty",Math.max(1,v));}} placeholder={"כמות"} style={{...inp,fontSize:13,padding:"8px 10px",width:80,textAlign:"center"}}/>
                </div>
                {/* Save to inventory checkbox */}
                <div style={{background:C.grnP,borderRadius:8,padding:"8px 10px",border:"1px solid "+C.grn}}>
                  <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:12,fontWeight:600,color:C.grn}}>
                    <input type="checkbox" checked={!!it.saveToInv} onChange={e=>updateCartItem(i,"saveToInv",e.target.checked)} style={{width:18,height:18,cursor:"pointer",accentColor:C.grn}}/>
                    <span>{"💾 שמור במאגר לעתיד"}</span>
                  </label>
                  {it.saveToInv && it.name && <div style={{marginTop:8,display:"flex",gap:4}}>
                    {INV_CATS.map(cat=><button key={cat.id} onClick={()=>updateCartItem(i,"saveToCat",cat.id)} style={{flex:1,padding:"6px 4px",borderRadius:6,border:"1px solid "+((it.saveToCat||"shrubs")===cat.id?C.grn:C.bdr),background:(it.saveToCat||"shrubs")===cat.id?C.grn:"#fff",color:(it.saveToCat||"shrubs")===cat.id?"#fff":C.txtM,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{cat.icon+" "+cat.label}</button>)}
                  </div>}
                </div>
              </div>;
            })}
          </div>}

          {/* STEP 2: Details and save */}
          {step===2 && <div>
            {/* Prelocked notice OR bulk assign block */}
            {form.bulkPrelocked && form.bulkPrelockedSiteName ? <div style={{background:C.grnP,borderRadius:10,padding:12,marginBottom:10,border:"1px solid "+C.grn,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,color:C.grn,marginBottom:4}}>{"🎯 כל הפריטים משויכים אוטומטית"}</div>
              <div style={{fontSize:14,fontWeight:700,color:C.grn}}>{"🌱 "+form.bulkPrelockedSiteName}</div>
              <div style={{fontSize:10,color:C.txtM,marginTop:6}}>{"(אפשר לשנות שיוך לפריט מסוים למטה אם צריך)"}</div>
            </div> : <div style={{background:C.bluB,borderRadius:10,padding:12,marginBottom:10,border:"1px solid "+C.blu}}>
              <div style={{fontSize:12,fontWeight:700,color:C.blu,marginBottom:8}}>{"🎯 שייך את כל הקניות בלחיצה אחת:"}</div>
              {/* Type selector */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:3,marginBottom:8}}>
                {[
                  {id:"project",label:"🌱 פרויקט",color:C.grn},
                  {id:"maintenance",label:"🌳 תחזוקה",color:C.blu},
                  {id:"test",label:"🧪 טסט",color:C.purp},
                  {id:"free",label:"✏️ חופשי",color:C.org},
                ].map(opt=>{
                  const active=form.bulkAllType===opt.id;
                  return <button key={opt.id} onClick={()=>setForm({...form,bulkAllType:opt.id,bulkAllId:"",bulkAllText:""})} style={{padding:"6px 2px",borderRadius:6,border:"1.5px solid "+(active?opt.color:C.bdr),background:active?opt.color:"#fff",color:active?"#fff":C.txtM,fontSize:11,fontWeight:active?700:500,cursor:"pointer",fontFamily:"inherit"}}>{opt.label}</button>;
                })}
              </div>
              {/* Conditional input */}
              {form.bulkAllType==="project" && <select value={form.bulkAllId||""} onChange={e=>setForm({...form,bulkAllId:e.target.value})} style={{...inp,fontSize:13,padding:"8px 12px",marginBottom:6}}>
                <option value="">{"-- בחר פרויקט --"}</option>
                {(data.devSites||[]).filter(p=>p.status!=="done").map(p=><option key={p.id} value={p.id}>{"🌱 "+p.name}</option>)}
              </select>}
              {form.bulkAllType==="maintenance" && <select value={form.bulkAllId||""} onChange={e=>setForm({...form,bulkAllId:e.target.value})} style={{...inp,fontSize:13,padding:"8px 12px",marginBottom:6}}>
                <option value="">{"-- בחר אתר תחזוקה --"}</option>

              </select>}
              {form.bulkAllType==="free" && <input value={form.bulkAllText||""} onChange={e=>setForm({...form,bulkAllText:e.target.value})} placeholder={"טקסט חופשי - לאן זה הולך?"} style={{...inp,fontSize:13,padding:"8px 12px",marginBottom:6}}/>}
              {form.bulkAllType==="test" && <div style={{padding:"8px 12px",fontSize:12,color:C.purp,fontWeight:600,background:"#f3e8ff",borderRadius:8,border:"1px solid "+C.purp,textAlign:"center",marginBottom:6}}>{"🧪 ללא שיוך - לטסט / ניסיון"}</div>}
              {form.bulkAllType && (form.bulkAllType==="test"||form.bulkAllType==="project"||form.bulkAllType==="maintenance"||form.bulkAllType==="free") && <button onClick={()=>{
                const t=form.bulkAllType;
                if((t==="project"||t==="maintenance") && !form.bulkAllId)return;

              }} style={{width:"100%",padding:10,borderRadius:8,border:"none",background:C.blu,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"⚡ החל על כל ה-"+totalQty+" פריטים"}</button>}
            </div>}

            {/* Order note */}

              <input value={form.bulkOrderNote||""} onChange={e=>setForm({...form,bulkOrderNote:e.target.value})} placeholder={"למשל: הזמנת אביב לפרויקט הגן הקהילתי"} style={{...inp,fontSize:13,padding:"10px 12px"}}/>
            </div>

            {/* Items list with full assignment options */}
            <div style={{fontSize:12,fontWeight:700,marginBottom:8,color:C.org}}>{"📦 פריטים בהזמנה ("+totalQty+"):"}</div>
            {items.map((it,i)=>{
              const aType=it.assignType||"project";
              const isValid=(aType==="project"||aType==="maintenance")?!!it.projectId:(aType==="test"?true:!!(it.freeText||"").trim());
              return <div key={i} style={{background:"#fff",border:"1px solid "+C.bdr,borderRadius:10,padding:10,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <button onClick={()=>removeFromCart(i)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:0}}>{"✕"}</button>
                  <div style={{textAlign:"right",flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{(it.qty>1?it.qty+"× ":"")+(it.name||it.desc)}</div>
                    {it.size && <div style={{fontSize:10,color:C.txtM}}>{"גודל: "+it.size}</div>}
                  </div>
                </div>
                {/* Assignment type tabs */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:3,marginBottom:6}}>
                  {[
                    {id:"project",label:"🌱 פרויקט",color:C.grn},
                    {id:"maintenance",label:"🌳 תחזוקה",color:C.blu},
                    {id:"test",label:"🧪 טסט",color:C.purp},
                    {id:"free",label:"✏️ חופשי",color:C.org},
                  ].map(opt=>{
                    const active=aType===opt.id;
                    return <button key={opt.id} onClick={()=>{updateCartItem(i,"assignType",opt.id);if(opt.id!=="project"&&opt.id!=="maintenance")updateCartItem(i,"projectId","");}} style={{padding:"5px 2px",borderRadius:6,border:"1.5px solid "+(active?opt.color:C.bdr),background:active?opt.color:"#fff",color:active?"#fff":C.txtM,fontSize:10,fontWeight:active?700:500,cursor:"pointer",fontFamily:"inherit"}}>{opt.label}</button>;
                  })}
                </div>
                {/* Conditional input based on assignment type */}
                <div style={{display:"flex",gap:6}}>
                  {aType==="project" && <select value={it.projectId||""} onChange={e=>updateCartItem(i,"projectId",e.target.value)} style={{...inp,fontSize:12,padding:"7px 10px",flex:2,border:"1px solid "+(it.projectId?C.bdr:C.red)}}>
                    <option value="">{"-- בחר פרויקט --"}</option>
                    {(data.devSites||[]).filter(p=>p.status!=="done").map(p=><option key={p.id} value={p.id}>{"🌱 "+p.name}</option>)}
                  </select>}
                  {aType==="maintenance" && <select value={it.projectId||""} onChange={e=>updateCartItem(i,"projectId",e.target.value)} style={{...inp,fontSize:12,padding:"7px 10px",flex:2,border:"1px solid "+(it.projectId?C.bdr:C.red)}}>
                    <option value="">{"-- בחר אתר תחזוקה --"}</option>
                    {(data.maintenanceSites||[]).map(s=><option key={s.id} value={s.id}>{"🌳 "+s.name}</option>)}
                  </select>}
                  {aType==="test" && <div style={{flex:2,padding:"7px 10px",fontSize:12,color:C.purp,fontWeight:600,background:"#f3e8ff",borderRadius:8,border:"1px solid "+C.purp,textAlign:"center"}}>{"🧪 ללא שיוך - לטסט / ניסיון"}</div>}
                  {aType==="free" && <input value={it.freeText||""} onChange={e=>updateCartItem(i,"freeText",e.target.value)} placeholder={"לאן זה הולך? (טקסט חופשי)"} style={{...inp,fontSize:12,padding:"7px 10px",flex:2,border:"1px solid "+((it.freeText||"").trim()?C.bdr:C.red)}}/>}
                  <input type="number" value={it.amount||""} onChange={e=>updateCartItem(i,"amount",e.target.value)} placeholder={"₪/יח'"} style={{...inp,fontSize:12,padding:"7px 10px",flex:1,textAlign:"center"}}/>
                </div>
                {(+it.amount>0 && +it.qty>1) && <div style={{fontSize:10,color:C.txtM,marginTop:4,textAlign:"left"}}>{"סה״כ: ₪"+((+it.amount)*(+it.qty)).toLocaleString()}</div>}
              </div>;
            })}

            {total>0 && <div style={{background:C.grnP,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:15,fontWeight:700,color:C.grn,display:"flex",justifyContent:"space-between"}}>
              <span>{"₪"+total.toLocaleString()}</span>
              <span>{"💰 סה״כ ההזמנה:"}</span>
            </div>}

            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setStep(1)} style={{flex:1,padding:14,borderRadius:12,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"← חזור לפריטים"}</button>
              <button onClick={saveBulkOrderEnhanced} style={{flex:2,padding:14,borderRadius:12,border:"none",background:C.org,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"💾 שמור הזמנה"}</button>
            </div>
            {(()=>{const invalid=items.filter(it=>{const t=it.assignType||"project";if(t==="project"||t==="maintenance")return !it.projectId;if(t==="free")return !(it.freeText||"").trim();return false;}).length;return invalid>0?<div style={{fontSize:11,color:C.red,textAlign:"center",marginTop:6}}>{"⚠️ "+invalid+" פריטים חסרים שיוך"}</div>:null;})()}
          </div>}
        </div>
      </div></div>;
    }

    // ─── PICK FROM INVENTORY (legacy - now unused but kept for compatibility) ───
    if(modal==="pickInventory"){setModal("addBulkOrder");return null;}

    // ─── ALL ORDERS (centralized view) ───
    // ─── WAREHOUSE INVENTORY ───
    // ─── MORE ACTIONS MENU ───
    if(modal==="moreActions"){
      const pendingOrders=(()=>{const all=[];Object.values(data.projectOrders||{}).forEach(arr=>arr.forEach(o=>{if(o.status!=="received")all.push(o);}));return all.length;})();
      const lowStock=(data.inventory||[]).filter(it=>{
        if(!["connectors","pipes","sprinklers","headsys","spray","consumables"].includes(it.category))return false;
        const w=(data.warehouse||{})[it.id]||{};
        return (w.threshold||0)>0 && (w.qty||0)<=(w.threshold||0);
      }).length;

      const actions=[
        {icon:"📦",label:"הזמנות",sub:pendingOrders>0?pendingOrders+" פתוחות":"ניהול הזמנות",color:C.org,onClick:()=>{setOrdersFilter("all");setOrdersSearch("");setModal("allOrders");}},
        {icon:"📦",label:"מלאי מחסן",sub:lowStock>0?"⚠️ "+lowStock+" חסרים":"מעקב ציוד",color:C.hdr,onClick:()=>{setWhSearch("");setForm({});setModal("warehouse");}},
        {icon:"👷",label:"קבלן משנה",sub:"שיבוץ קבלן ליום",color:C.blu,onClick:()=>{setForm({subName:"",subSiteId:"",subNewSite:"",subWorkerCount:1,subFrom:dStart(),subTo:dEnd(),subDates:[todayISO],subNotes:""});setModal("quickSub");}}
      ];

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:420,padding:18}}>
        <h3 style={{textAlign:"right",marginBottom:14,fontSize:17}}>{"⚙️ עוד פעולות"}</h3>
        {actions.map((a,i)=><button key={i} onClick={a.onClick} style={{width:"100%",padding:"14px 16px",marginBottom:8,borderRadius:12,border:"1.5px solid "+a.color,background:"#fff",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:20}}>{"›"}</span>
          <div style={{textAlign:"right",flex:1,marginInlineStart:10}}>
            <div style={{fontSize:15,fontWeight:700,color:a.color}}>{a.icon+" "+a.label}</div>
            <div style={{fontSize:11,color:C.txtM,marginTop:2}}>{a.sub}</div>
          </div>
        </button>)}
        <button onClick={close} style={{...sb,background:C.cardA,color:C.txt,marginTop:6}}>{"סגור"}</button>
      </div></div>;
    }

    if(modal==="warehouse"){
      const whTab=form.whTab||"stock";
      // Only equipment categories (not plants)
      const equipItems=(data.inventory||[]).filter(it=>["connectors","pipes","sprinklers","headsys","spray","consumables"].includes(it.category));
      const catNames={connectors:"🔌 מחברים",pipes:"🚰 צינורות",sprinklers:"💦 ממטירים וטפטפות",headsys:"⚙️ ראשי מערכת",spray:"🧪 חומרי ריסוס",consumables:"🛠 חומרים וכלים"};
      const whCatOrder=["connectors","pipes","sprinklers","headsys","spray","consumables"];
      const wh=data.warehouse||{};
      const getQty=(id)=>(wh[id]||{}).qty||0;
      const getThr=(id)=>(wh[id]||{}).threshold||0;

      // ── TAKE EQUIPMENT VIEW ──
      if(whTab==="take"){
        const cart=form.whCart||{};
        const targetSite=form.whTargetSite||"";
        const allSites=[...(data.maintenanceSites||[]).map(s=>({...s,_m:true})),...(data.devSites||[]).filter(s=>s.status!=="done").map(s=>({...s,_m:false}))];

        let filtered=equipItems;
        if(whSearch.trim()){
          const q=whSearch.trim().toLowerCase();
          filtered=filtered.filter(it=>it.name.toLowerCase().includes(q)||(((wh[it.id]||{}).note||"").toLowerCase().includes(q)));
        }
        const cartCount=Object.values(cart).reduce((s,n)=>s+n,0);

        const doTake=()=>{
          const items=Object.entries(cart).filter(([_,n])=>n>0);
          if(items.length===0)return;
          up(d=>{
            if(!d.warehouse)d.warehouse={};
            if(!d.stockMovements)d.stockMovements=[];
            items.forEach(([itemId,qty])=>{
              const cur=(d.warehouse[itemId]||{}).qty||0;
              d.warehouse[itemId]={...(d.warehouse[itemId]||{}),qty:Math.max(0,cur-qty)};
            });
            const movId=uid();
            d.stockMovements.push({
              id:movId,
              type:"take",
              date:todayISO,
              siteId:targetSite||"",
              items:items.map(([itemId,qty])=>({itemId,qty,name:(equipItems.find(x=>x.id===itemId)||{}).name||""}))
            });
            // If assigned to a site - add billing entries (one per item)
            if(targetSite){
              if(!d.billingExtras)d.billingExtras=[];
              items.forEach(([itemId,qty])=>{
                const nm=(equipItems.find(x=>x.id===itemId)||{}).name||"";
                d.billingExtras.push({
                  id:uid(),
                  siteId:targetSite,
                  date:todayISO,
                  amount:0,
                  qty:qty,
                  desc:nm,
                  invoiced:false,
                  fromWarehouse:true,
                  movId:movId
                });
              });
            }
          });
          setForm({whTab:"stock"});
        };

        return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"95vh"}}>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <button onClick={()=>setForm({whTab:"stock"})} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:17,fontWeight:700}}>{"🛒 לקיחת ציוד"}</div>
                <div style={{fontSize:11,opacity:0.85}}>{cartCount>0?cartCount+" פריטים נבחרו":"בחר מה לקחת"}</div>

            </div>
            {/* Site selector */}
            <select value={targetSite} onChange={e=>setForm({...form,whTargetSite:e.target.value})} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"none",fontSize:13,fontFamily:"inherit",direction:"rtl",marginBottom:8}}>
              <option value="">{"-- לאיזה אתר? (אופציונלי) --"}</option>
              {allSites.map(s=><option key={s.id} value={s.id}>{(s._m?"🔧 ":"🌱 ")+s.name}</option>)}
            </select>
            <input value={whSearch} onChange={e=>setWhSearch(e.target.value)} placeholder={"🔍 חפש פריט..."} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"none",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none",boxSizing:"border-box"}}/>
          </div>

          <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(95vh - 200px)"}}>

              const items=filtered.filter(it=>it.category===cat);

              return <div key={cat} style={{marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,color:C.hdr,marginBottom:6,textAlign:"right"}}>{catNames[cat]}</div>

                  const inStock=getQty(it.id);
                  const taking=cart[it.id]||0;
                  return <div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:taking>0?C.grnP:C.cardA,borderRadius:8,marginBottom:4,border:"1px solid "+(taking>0?C.grn:C.bdr)}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={()=>{const n=Math.max(0,taking-1);setForm({...form,whCart:{...cart,[it.id]:n}});}} style={{width:28,height:28,borderRadius:"50%",border:"1px solid "+C.bdr,background:"#fff",color:C.txt,fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"−"}</button>
                      <input type="number" value={taking||""} onChange={e=>{const n=Math.max(0,+e.target.value||0);setForm({...form,whCart:{...cart,[it.id]:n}});}} placeholder="0" style={{width:48,padding:"5px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:15,fontWeight:700,textAlign:"center",fontFamily:"inherit",color:taking>0?C.grn:C.txtL}}/>

                    </div>
                    <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                      <div style={{fontSize:13,fontWeight:600}}>{it.name}</div>

                      <div style={{fontSize:10,color:inStock>0?C.txtM:C.red}}>{"במלאי: "+inStock}</div>

          </div>
        </div></div>;

      // ── RECEIVE STOCK VIEW ──
      if(whTab==="receive"){
        const cart=form.whCart||{};
        let filtered=equipItems;
        if(whSearch.trim()){
          const q=whSearch.trim().toLowerCase();
          filtered=filtered.filter(it=>it.name.toLowerCase().includes(q)||(((wh[it.id]||{}).note||"").toLowerCase().includes(q)));
        }
        const cartCount=Object.values(cart).reduce((s,n)=>s+n,0);

        const doReceive=()=>{
          const items=Object.entries(cart).filter(([_,n])=>n>0);
          if(items.length===0)return;
          up(d=>{
            if(!d.warehouse)d.warehouse={};
            if(!d.stockMovements)d.stockMovements=[];
            items.forEach(([itemId,qty])=>{
              const cur=(d.warehouse[itemId]||{}).qty||0;
              d.warehouse[itemId]={...(d.warehouse[itemId]||{}),qty:cur+qty};
            });
            d.stockMovements.push({
              id:uid(),
              type:"receive",
              date:todayISO,
              items:items.map(([itemId,qty])=>({itemId,qty,name:(equipItems.find(x=>x.id===itemId)||{}).name||""}))
            });
          });
          setForm({whTab:"stock"});
        };

        return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"95vh"}}>
          <div style={{background:C.grn,color:"#fff",padding:"12px 16px",position:"sticky",top:0,borderRadius:"16px 16px 0 0",zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <button onClick={()=>setForm({whTab:"stock"})} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:17,fontWeight:700}}>{"📥 קבלת סחורה"}</div>
                <div style={{fontSize:11,opacity:0.85}}>{cartCount>0?cartCount+" פריטים":"כמה הגיע למחסן?"}</div>
              </div>
            </div>
            <input value={whSearch} onChange={e=>setWhSearch(e.target.value)} placeholder={"🔍 חפש פריט..."} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"none",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none",boxSizing:"border-box"}}/>
          </div>

          <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(95vh - 170px)"}}>
            {whCatOrder.map(cat=>{
              const items=filtered.filter(it=>it.category===cat);
              if(items.length===0)return null;
              return <div key={cat} style={{marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,color:C.grn,marginBottom:6,textAlign:"right"}}>{catNames[cat]}</div>
                {items.map(it=>{
                  const inStock=getQty(it.id);
                  const adding=cart[it.id]||0;
                  return <div key={it.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:adding>0?C.grnP:C.cardA,borderRadius:8,marginBottom:4,border:"1px solid "+(adding>0?C.grn:C.bdr)}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={()=>{const n=Math.max(0,adding-1);setForm({...form,whCart:{...cart,[it.id]:n}});}} style={{width:28,height:28,borderRadius:"50%",border:"1px solid "+C.bdr,background:"#fff",color:C.txt,fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"−"}</button>
                      <input type="number" value={adding||""} onChange={e=>{const n=Math.max(0,+e.target.value||0);setForm({...form,whCart:{...cart,[it.id]:n}});}} placeholder="0" style={{width:48,padding:"5px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:15,fontWeight:700,textAlign:"center",fontFamily:"inherit",color:adding>0?C.grn:C.txtL}}/>
                      <button onClick={()=>{setForm({...form,whCart:{...cart,[it.id]:adding+1}});}} style={{width:28,height:28,borderRadius:"50%",border:"1px solid "+C.grn,background:C.grn,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"+"}</button>
                    </div>
                    <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                      <div style={{fontSize:13,fontWeight:600}}>{it.name}</div>
                      {(wh[it.id]||{}).note && <div style={{fontSize:10,color:C.org,fontWeight:600}}>{"📝 "+(wh[it.id]||{}).note}</div>}
                      <div style={{fontSize:10,color:C.txtM}}>{"במלאי: "+inStock+(adding>0?" → "+(inStock+adding):"")}</div>
                    </div>
                  </div>;
                })}
              </div>;
            })}
          </div>

          <div style={{padding:"10px 16px",borderTop:"1px solid "+C.bdr,background:"#fff",position:"sticky",bottom:0}}>

            {movements.map(m=>{
              const isTake=m.type==="take";
              return <div key={m.id} style={{background:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+(isTake?C.org:C.grn)}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:10,color:C.txtL}}>{fmtFull(new Date(m.date))}</span>
                  <span style={{fontSize:12,fontWeight:700,color:isTake?C.org:C.grn}}>{isTake?"🛒 לקיחה":"📥 קבלה"}{m.siteId?" · "+sn(m.siteId):""}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>

                </div>
              </div>;
            })}
          </div>
        </div></div>;
      }

      // ── ADD NEW ITEM VIEW ──
      if(whTab==="addItem"){
        const newName=form.newItemName||"";
        const newCat=form.newItemCat||"consumables";
        const addableCats=[
          {id:"connectors",label:"🔌 מחברים"},
          {id:"pipes",label:"🚰 צינורות"},
          {id:"sprinklers",label:"💦 ממטירים וטפטפות"},
          {id:"spray",label:"🧪 חומרי ריסוס"},
          {id:"consumables",label:"🛠 חומרים וכלים"}
        ];
        const doAddItem=()=>{
          if(!newName.trim())return;
          const nm=newName.trim();
          const sg=guessSubgroup(nm,newCat);
          up(d=>{
            if(!d.inventory)d.inventory=[];
            d.inventory.push({id:uid(),name:nm,category:newCat,subgroup:sg,userAdded:true});
          });
          setForm({whTab:"stock"});
        };
        return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:440,width:"100%",padding:0,maxHeight:"92vh"}}>
          <div style={{background:C.grn,color:"#fff",padding:"12px 16px",borderRadius:"16px 16px 0 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <button onClick={()=>setForm({whTab:"stock"})} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
              <div style={{fontSize:17,fontWeight:700}}>{"➕ הוסף פריט חדש"}</div>
            </div>

          <div style={{padding:"16px"}}>

            <input value={newName} onChange={e=>setForm({...form,newItemName:e.target.value})} placeholder={"לדוגמה: ברז כדורי 1 צול"} autoFocus style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+C.bdr,fontSize:14,fontFamily:"inherit",direction:"rtl",boxSizing:"border-box",marginBottom:14}}/>

            <label style={{fontSize:12,color:C.txtM,display:"block",marginBottom:6,textAlign:"right"}}>{"קטגוריה:"}</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:18}}>
              {addableCats.map(c=>{const sel=newCat===c.id;return <button key={c.id} onClick={()=>setForm({...form,newItemCat:c.id})} style={{padding:"8px 12px",borderRadius:14,border:"1.5px solid "+(sel?C.grn:C.bdr),background:sel?C.grn:"#fff",color:sel?"#fff":C.txt,fontSize:12,fontWeight:sel?700:500,cursor:"pointer",fontFamily:"inherit"}}>{c.label}</button>;})}
            </div>

            <button onClick={doAddItem} disabled={!newName.trim()} style={{width:"100%",padding:13,borderRadius:10,border:"none",background:newName.trim()?C.grn:C.bdr,color:"#fff",fontSize:14,fontWeight:700,cursor:newName.trim()?"pointer":"not-allowed",fontFamily:"inherit",opacity:newName.trim()?1:0.5}}>{"✓ הוסף למלאי"}</button>
            <button onClick={()=>setForm({whTab:"stock"})} style={{width:"100%",padding:11,borderRadius:10,border:"none",background:C.cardA,color:C.txt,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginTop:8}}>{"ביטול"}</button>
          </div>
        </div></div>;

      // ── MAIN STOCK VIEW ──
      let filtered=equipItems;
      if(whSearch.trim()){
        const q=whSearch.trim().toLowerCase();
        filtered=filtered.filter(it=>it.name.toLowerCase().includes(q)||(((wh[it.id]||{}).note||"").toLowerCase().includes(q)));
      }
      const lowCount=equipItems.filter(it=>{const t=getThr(it.id);return t>0 && getQty(it.id)<=t;}).length;
      const totalItems=equipItems.length;
      const editMode=form.whEdit||false;

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"95vh"}}>
        <div style={{background:C.hdr,color:"#fff",padding:"12px 16px",position:"sticky",top:0,borderRadius:"16px 16px 0 0",zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={close} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:17,fontWeight:700}}>{"📦 מלאי מחסן"}</div>
              <div style={{fontSize:11,opacity:0.85}}>{totalItems+" פריטים"+(lowCount>0?" · ⚠️ "+lowCount+" חסרים":"")}</div>

          <input value={whSearch} onChange={e=>setWhSearch(e.target.value)} placeholder={"🔍 חפש פריט..."} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"none",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none",boxSizing:"border-box"}}/>

            <button onClick={()=>{setWhSearch("");setForm({whTab:"take",whCart:{},whTargetSite:""});}} style={{padding:"14px",borderRadius:10,border:"none",background:C.org,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"🛒 לקחתי ציוד"}</button>
            <button onClick={()=>{setWhSearch("");setForm({whTab:"receive",whCart:{}});}} style={{padding:"14px",borderRadius:10,border:"none",background:C.grn,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"📥 קיבלתי סחורה"}</button>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>setForm({...form,whTab:"history"})} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"📜 היסטוריה"}</button>
            <button onClick={()=>setForm({...form,whEdit:!editMode})} style={{flex:1,padding:"9px",borderRadius:8,border:"1px solid "+(editMode?C.blu:C.bdr),background:editMode?C.bluB:"#fff",color:editMode?C.blu:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{editMode?"✓ סיום עריכה":"✏️ עריכת מלאי"}</button>
            <button onClick={()=>setForm({...form,whTab:"addItem",newItemName:"",newItemCat:"consumables"})} style={{flex:1,padding:"9px",borderRadius:8,border:"1px dashed "+C.grn,background:"#fff",color:C.grn,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"➕ פריט חדש"}</button>
          </div>
