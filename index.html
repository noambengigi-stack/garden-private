// PROJECT DAY CARD - כרטיס פרויקט בתוך יום
// ═══════════════════════════════════════════════════════════════════
function ProjectDayCard({ project: p, client, isExpanded, onToggleExpand, onToggleDone, onDelete, onUpdate, onAddExpense, onRemoveExpense }) {
  const [showExpenseForm, setShowExpenseForm] = useState(false);
  const [showExtendModal, setShowExtendModal] = useState(false);
  const isDone = p.status === "done";

  const cc = p.city ? CITY_COLORS[p.city] : null;

  const expensesTotal = (p.expenses || []).reduce((s, e) => s + (e.amount || 0), 0);
  const profit = (p.totalPrice || 0) - expensesTotal;

  return (
    <div style={{background:C.card,borderRadius:12,border:`2px solid ${isDone ? C.grnL : C.prp}`,padding:12,marginBottom:8,opacity:isDone ? 0.7 : 1}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <button onClick={onToggleDone} style={{
          width:40,height:40,borderRadius:"50%",
          border:`2px solid ${isDone ? C.grn : C.prp}`,
          background:isDone ? C.grn : "#fff",
          color:isDone ? "#fff" : C.prp,
          cursor:"pointer",fontSize:20,fontWeight:700,
          flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"
        }}>✓</button>

        <div onClick={onToggleExpand} style={{flex:1,minWidth:0,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
            <span style={{fontSize:10,background:C.prpB,color:C.prp,padding:"2px 8px",borderRadius:10,fontWeight:700}}>🚧 פרויקט</span>
            <span style={{fontSize:15,fontWeight:700,color:C.txt,textDecoration:isDone ? "line-through" : "none"}}>{p.title}</span>
          </div>
          {(p.clientName || client) && (
            <div style={{fontSize:12,color:C.txtM,marginBottom:2}}>
              👤 {client ? client.name : p.clientName}
              {cc && <span style={{fontSize:10,background:cc.bg,color:cc.text,padding:"1px 6px",borderRadius:8,marginRight:6}}>{p.city}</span>}
            </div>
          )}
          <div style={{fontSize:11,color:C.txtM}}>
            {p.isRange ? `📆 ${fmtDM(p.startDate)}–${fmtDM(p.endDate)}` : `📅 ${fmtDM(p.startDate)}`}
            {p.totalPrice > 0 && <span> · ₪{p.totalPrice.toLocaleString()}</span>}
            {expensesTotal > 0 && <span style={{color:C.red}}> · הוצאות ₪{expensesTotal.toLocaleString()}</span>}
          </div>
        </div>

        <button onClick={onDelete} style={{background:"none",border:"none",color:C.red,fontSize:20,cursor:"pointer",padding:4,flexShrink:0}}>×</button>
      </div>

      {/* תיאור */}
      {p.description && (
        <div style={{marginTop:8,background:C.prpB,border:`1px solid ${C.prp}`,borderRight:`3px solid ${C.prp}`,borderRadius:6,padding:"6px 10px"}}>
          <div style={{fontSize:13,color:C.txt,whiteSpace:"pre-wrap"}}>{p.description}</div>
        </div>
      )}

      {/* תצוגה מורחבת */}
      {isExpanded && (
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px dashed ${C.bdr}`}}>
          {/* הוצאות */}
          <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:6}}>💸 הוצאות ({(p.expenses || []).length})</div>
          {(p.expenses || []).map(e => (
            <div key={e.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",background:C.redB,borderRadius:6,marginBottom:4}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:C.txt}}>{e.desc}</div>
                <div style={{fontSize:10,color:C.txtM}}>{fmtDM(e.date)}</div>
              </div>
              <span style={{fontSize:13,fontWeight:700,color:C.red}}>₪{e.amount}</span>
              <button onClick={() => onRemoveExpense(e.id)} style={{background:"none",border:"none",color:C.red,fontSize:14,cursor:"pointer",padding:0}}>×</button>
            </div>
          ))}

          {showExpenseForm ? (
            <ExpenseForm onSave={(desc, amount, date) => { onAddExpense(desc, amount, date); setShowExpenseForm(false); }} onCancel={() => setShowExpenseForm(false)} />
          ) : (
            <button onClick={() => setShowExpenseForm(true)} style={{width:"100%",marginTop:4,background:C.redB,color:C.red,border:`1px dashed ${C.red}`,borderRadius:8,padding:10,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ הוסף הוצאה</button>
          )}

          {/* סיכום רווח */}
          {p.totalPrice > 0 && (
            <div style={{marginTop:10,padding:10,background:profit >= 0 ? C.grnP : C.redB,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:C.txtM,fontWeight:600}}>רווח נקי:</span>
              <span style={{fontSize:15,fontWeight:700,color:profit >= 0 ? C.grn : C.red}}>₪{profit.toLocaleString()}</span>
            </div>
          )}

          {/* כפתור הארכת פרויקט */}
          {!isDone && (
            <button
              onClick={() => setShowExtendModal(true)}
              style={{width:"100%",marginTop:8,background:C.bluB,color:C.blu,border:`1px solid ${C.blu}`,borderRadius:8,padding:10,fontSize:12,fontWeight:600,cursor:"pointer"}}
            >📅 הארך פרויקט (הוסף ימים)</button>
          )}

          <button onClick={onToggleExpand} style={{width:"100%",marginTop:8,background:"none",color:C.txtM,border:"none",padding:6,fontSize:11,cursor:"pointer"}}>סגור</button>
        </div>
      )}

      {/* מודל הארכת פרויקט */}
      {showExtendModal && (
        <ExtendProjectModal
          project={p}
          onConfirm={(updates) => { onUpdate(updates); setShowExtendModal(false); }}
          onCancel={() => setShowExtendModal(false)}
        />
      )}
    </div>
  );
}

// מודל הארכת פרויקט
function ExtendProjectModal({ project, onConfirm, onCancel }) {
  // אם זה פרויקט יום יחיד - נהפוך לטווח
  const initialEndDate = project.isRange ? project.endDate : project.startDate;
  const initialStartDate = project.startDate;

  const [newStartDate, setNewStartDate] = useState(initialStartDate);
  const [newEndDate, setNewEndDate] = useState(initialEndDate);

  const startDate = new Date(initialStartDate);
  const endDate = new Date(initialEndDate);

  // הוסף יום בסוף
  const addDayEnd = () => {
    const d = new Date(newEndDate);
    d.setDate(d.getDate() + 1);
    setNewEndDate(iso(d));
  };

  // הסר יום בסוף
  const removeDayEnd = () => {
    const d = new Date(newEndDate);
    if (iso(d) <= newStartDate) return; // לא לרדת מתחת ל-startDate
    d.setDate(d.getDate() - 1);
    setNewEndDate(iso(d));
  };

  // הוסף יום בהתחלה (אחורה)
  const addDayStart = () => {
    const d = new Date(newStartDate);
    d.setDate(d.getDate() - 1);
    setNewStartDate(iso(d));
  };

  // הסר יום בהתחלה
  const removeDayStart = () => {
    const d = new Date(newStartDate);
    if (iso(d) >= newEndDate) return; // לא לעלות מעל ל-endDate
    d.setDate(d.getDate() + 1);
    setNewStartDate(iso(d));
  };

  // חישוב מספר ימים בסה"כ
  const totalDays = Math.round((new Date(newEndDate) - new Date(newStartDate)) / (1000 * 60 * 60 * 24)) + 1;
  const isChanged = newStartDate !== initialStartDate || newEndDate !== initialEndDate;

  const handleSave = () => {
    onConfirm({
      startDate: newStartDate,
      endDate: newEndDate,
      isRange: newStartDate !== newEndDate,
    });
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:C.card,borderRadius:16,padding:20,maxWidth:420,width:"100%",border:`2px solid ${C.blu}`}}>
        <div style={{fontSize:18,fontWeight:700,color:C.blu,marginBottom:6,textAlign:"center"}}>📅 הארך פרויקט</div>
        <div style={{fontSize:13,color:C.txtM,textAlign:"center",marginBottom:14}}>
          <strong style={{color:C.txt}}>{project.title}</strong>
        </div>

        {/* תאריך התחלה */}
        <div style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6}}>📅 תאריך התחלה:</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={addDayStart} style={{background:C.bluB,color:C.blu,border:`1px solid ${C.blu}`,borderRadius:6,padding:"6px 10px",fontSize:14,fontWeight:700,cursor:"pointer"}} title="הקדם יום אחד">−1</button>
            <input
              type="date"
              value={newStartDate}
              onChange={e => setNewStartDate(e.target.value)}
              max={newEndDate}
              style={{flex:1,padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff",textAlign:"center"}}
            />
            <button onClick={removeDayStart} style={{background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:6,padding:"6px 10px",fontSize:14,fontWeight:700,cursor:"pointer"}} title="דחה יום אחד">+1</button>
          </div>
          <div style={{fontSize:11,color:C.txtM,marginTop:4,textAlign:"center"}}>
            {DAYNAMES[new Date(newStartDate).getDay()]} · {fmtDM(newStartDate)}
          </div>
        </div>

        {/* תאריך סיום */}
        <div style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6}}>🏁 תאריך סיום:</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={removeDayEnd} style={{background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:6,padding:"6px 10px",fontSize:14,fontWeight:700,cursor:"pointer"}} title="קצר יום אחד">−1</button>
            <input
              type="date"
              value={newEndDate}
              onChange={e => setNewEndDate(e.target.value)}
              min={newStartDate}
              style={{flex:1,padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff",textAlign:"center"}}
            />
            <button onClick={addDayEnd} style={{background:C.bluB,color:C.blu,border:`1px solid ${C.blu}`,borderRadius:6,padding:"6px 10px",fontSize:14,fontWeight:700,cursor:"pointer"}} title="הארך יום אחד">+1</button>
          </div>
          <div style={{fontSize:11,color:C.txtM,marginTop:4,textAlign:"center"}}>
            {DAYNAMES[new Date(newEndDate).getDay()]} · {fmtDM(newEndDate)}
          </div>
        </div>

        {/* סיכום */}
        <div style={{background:isChanged ? C.grnP : C.cardA,borderRadius:8,padding:10,marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:700,color:isChanged ? C.grn : C.txtM}}>
            {totalDays} ימים בסה"כ
            {isChanged && (
              <span style={{fontSize:11,color:C.grn,fontWeight:600,marginRight:6}}>
                ({totalDays > 1 ? "טווח" : "יום יחיד"})
              </span>
            )}
          </div>
        </div>

        {/* כפתורי פעולה */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={handleSave} disabled={!isChanged} style={{flex:1,background:isChanged ? C.blu : C.cardA,color:isChanged ? "#fff" : C.txtL,border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:isChanged ? "pointer" : "not-allowed",opacity:isChanged ? 1 : 0.5}}>💾 שמור</button>
          <button onClick={onCancel} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"12px",fontSize:14,cursor:"pointer"}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

// טופס הוספת הוצאה לפרויקט
function ExpenseForm({ onSave, onCancel }) {
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState(iso(new Date()));

  const save = () => {
    if (!desc.trim()) { alert("נא הכנס תיאור"); return; }

  return (
    <div style={{marginTop:6,background:C.redB,border:`1px solid ${C.red}`,borderRadius:8,padding:10}}>
      <div style={{fontSize:11,color:C.red,fontWeight:700,marginBottom:6}}>💸 הוצאה חדשה</div>
      <input type="text" value={desc} onChange={e => setDesc(e.target.value)} placeholder="תיאור (חומרים, קבלן משנה...)" style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,marginBottom:6,background:"#fff"}} autoFocus />

        <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff"}} />
      </div>
      <div style={{display:"flex",gap:6}}>

  );
}

// ADD CLIENT TO DAY
// ═══════════════════════════════════════════════════════════════════
function AddClientToDay({ availableClients, onAdd, onClose }) {
  const [search, setSearch] = useState("");
  const [cityFilter, setCityFilter] = useState("all");
  const [recurring, setRecurring] = useState(true);  // ברירת מחדל: כן לסדרה
  const [selected, setSelected] = useState(new Set()); // בחירה מרובה

  const filtered = availableClients.filter(c => {
    if (cityFilter !== "all" && c.city !== cityFilter) return false;
    if (search && !c.name.includes(search)) return false;
    return true;
  });

  // קבץ לפי עיר + מיון א-ב
  const byCity = {};
  filtered.forEach(c => {
    if (!byCity[c.city]) byCity[c.city] = [];
    byCity[c.city].push(c);
  });
  // מיון א-ב בתוך כל עיר
  Object.keys(byCity).forEach(city => {
    byCity[city].sort((a, b) => a.name.localeCompare(b.name, "he"));
  });

  const toggleSelect = (clientId) => {
    const newSet = new Set(selected);
    if (newSet.has(clientId)) newSet.delete(clientId);
    else newSet.add(clientId);
    setSelected(newSet);
  };

  const handleAddAll = () => {
    if (selected.size === 0) return;
    // הוסף את כל הנבחרים
    selected.forEach(clientId => {
      onAdd(clientId, recurring);
    });
    setSelected(new Set());
    onClose();
  };

  return (
    <div style={{background:C.card,borderRadius:14,border:`2px solid ${C.grn}`,padding:14,marginTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:700,color:C.grn}}>בחר לקוחות להוספה</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:C.txtM,cursor:"pointer"}}>×</button>
      </div>

      {/* טוגל שיבוץ חוזר */}
      <div onClick={() => setRecurring(!recurring)} style={{
        display:"flex",
        alignItems:"center",
        gap:8,
        padding:"8px 12px",
        background:recurring ? C.grnP : C.cardA,
        border:`1.5px solid ${recurring ? C.grn : C.bdr}`,
        borderRadius:10,
        marginBottom:10,
        cursor:"pointer"
      }}>
        <div style={{
          width:20,height:20,
          borderRadius:4,
          border:`2px solid ${recurring ? C.grn : C.bdr}`,
          background:recurring ? C.grn : "#fff",
          color:"#fff",
          fontSize:14,fontWeight:700,
          display:"flex",alignItems:"center",justifyContent:"center",
          flexShrink:0
        }}>{recurring ? "✓" : ""}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:C.txt}}>🔁 שבץ אוטומטית 3 חודשים קדימה</div>
          <div style={{fontSize:10,color:C.txtM,marginTop:1}}>לפי תדירות הלקוח (שבועי = 4 בחודש, חודשי = 1 וכו')</div>
        </div>
      </div>

      <input
        type="text"
        placeholder="🔍 חיפוש לקוח..."
        value={search}
        onChange={e => setSearch(e.target.value)}
        style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff",marginBottom:8}}
      />
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {["all","ירושלים","בית שמש"].map(city => (
          <button key={city}
                  onClick={() => setCityFilter(city)}
                  style={{
                    flex:1,padding:"6px",borderRadius:8,border:"none",cursor:"pointer",
                    fontSize:12,fontWeight:600,
                    background:cityFilter === city ? (city === "ירושלים" ? CITY_COLORS["ירושלים"].border : city === "בית שמש" ? CITY_COLORS["בית שמש"].border : C.grn) : C.cardA,
                    color:cityFilter === city ? "#fff" : C.txtM
                  }}>
            {city === "all" ? "הכל" : city}
          </button>
        ))}
      </div>

      {/* כפתור שיבוץ של הנבחרים - מופיע רק אם נבחר משהו */}
      {selected.size > 0 && (
        <div style={{
          position:"sticky",top:0,zIndex:10,
          background:C.grn,color:"#fff",
          borderRadius:10,padding:"10px 12px",marginBottom:10,
          display:"flex",justifyContent:"space-between",alignItems:"center"
        }}>
          <div style={{fontSize:13,fontWeight:700}}>נבחרו {selected.size} לקוחות</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={() => setSelected(new Set())} style={{
              background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",
              borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:600,cursor:"pointer"
            }}>נקה</button>
            <button onClick={handleAddAll} style={{
              background:"#fff",color:C.grn,border:"none",
              borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"
            }}>✓ שבץ ({selected.size})</button>
          </div>
        </div>
      )}

      <div style={{fontSize:11,color:C.txtM,marginBottom:8,textAlign:"center"}}>
        💡 לחץ על לקוח כדי לבחור/לבטל בחירה. ניתן לבחור כמה.
      </div>

      <div style={{maxHeight:400,overflowY:"auto"}}>
        {Object.entries(byCity).map(([city, clients]) => {
          const cc = CITY_COLORS[city];
          return (
            <div key={city} style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:cc.text,marginBottom:6,paddingRight:4}}>
                <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:cc.border,marginLeft:6}}></span>
                {city} ({clients.length})
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {clients.map(c => {
                  const isSelected = selected.has(c.id);
                  return (
                    <button key={c.id} onClick={() => toggleSelect(c.id)} style={{
                      background:isSelected ? cc.border : cc.bg,
                      color:isSelected ? "#fff" : cc.text,
                      border:`1.5px solid ${cc.border}`,
                      borderRadius:10,padding:"8px 12px",fontSize:12,
                      fontWeight:isSelected ? 700 : 500,cursor:"pointer",
                      display:"flex",alignItems:"center",gap:4
                    }}>
                      {isSelected ? "✓" : "+"} {c.name} <span style={{opacity:0.7,marginRight:4}}>₪{c.price}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{textAlign:"center",color:C.txtL,padding:20,fontSize:13}}>לא נמצאו לקוחות</div>
        )}
      </div>
    </div>
  );
}

// CLIENTS VIEW - ניהול לקוחות
// ═══════════════════════════════════════════════════════════════════
function ClientsView({ data, setModal, editClient, deleteClient }) {
  const [search, setSearch] = useState("");
  const [cityFilter, setCityFilter] = useState("all");

  // סדר ערים: ירושלים קודם, בית שמש אחרי
  const cityOrder = { "ירושלים": 0, "בית שמש": 1 };

  const filtered = data.clients
    .filter(c => {
      if (cityFilter !== "all" && c.city !== cityFilter) return false;
      if (search && !c.name.includes(search)) return false;
      return true;
    })
    .sort((a, b) => {
      // קודם לפי עיר
      const ca = cityOrder[a.city] ?? 99;
      const cb = cityOrder[b.city] ?? 99;
      if (ca !== cb) return ca - cb;
      // אח"כ לפי שם בעברית (א-ב-ג...)
      return a.name.localeCompare(b.name, "he");
    });

  return (
    <div style={{padding:12,paddingBottom:80}}>
      {/* חיפוש וסינון */}
      <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:12,marginBottom:10}}>
        <input
          type="text"
          placeholder="🔍 חיפוש לקוח..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff",marginBottom:8}}
        />
        <div style={{display:"flex",gap:6}}>
          {["all","ירושלים","בית שמש"].map(city => (
            <button key={city}
                    onClick={() => setCityFilter(city)}
                    style={{
                      flex:1,padding:"8px",borderRadius:8,border:"none",cursor:"pointer",
                      fontSize:12,fontWeight:600,
                      background:cityFilter === city ? (city === "ירושלים" ? CITY_COLORS["ירושלים"].border : city === "בית שמש" ? CITY_COLORS["בית שמש"].border : C.grn) : C.cardA,
                      color:cityFilter === city ? "#fff" : C.txtM
                    }}>
              {city === "all" ? `הכל (${data.clients.length})` : `${city} (${data.clients.filter(c => c.city === city).length})`}
            </button>
          ))}
        </div>
      </div>

      {/* כפתור הוספה */}
      <button onClick={() => setModal({type:"addClient"})} style={{width:"100%",background:C.grn,color:"#fff",border:"none",borderRadius:12,padding:12,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:10}}>+ לקוח חדש</button>

      {/* רשימה */}
      <div>
        {filtered.map((c, idx) => {
          const cc = CITY_COLORS[c.city];
          // הצג כותרת של עיר כשמתחיל בלוק חדש
          const prevCity = idx > 0 ? filtered[idx-1].city : null;
          const showCityHeader = c.city !== prevCity;
          const cityClientCount = filtered.filter(x => x.city === c.city).length;

          return (
            <React.Fragment key={c.id}>
              {showCityHeader && cityFilter === "all" && (
                <div style={{display:"flex",alignItems:"center",gap:6,margin:"12px 4px 6px",paddingRight:2}}>
                  <span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:cc.border}}></span>
                  <span style={{fontSize:13,fontWeight:700,color:cc.text}}>{c.city}</span>
                  <span style={{fontSize:11,color:C.txtL}}>({cityClientCount})</span>
                  <div style={{flex:1,height:1,background:C.bdrL,marginRight:6}}></div>
                </div>
              )}
              <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.bdr}`,padding:12,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:15,fontWeight:700,color:C.txt}}>{c.name}</span>
                      <span style={{fontSize:10,background:cc.bg,color:cc.text,padding:"2px 8px",borderRadius:10,fontWeight:600}}>{c.city}</span>
                      {c.area && <span style={{fontSize:10,color:C.txtM}}>· {c.area}</span>}
                    </div>
                    <div style={{fontSize:12,color:C.txtM}}>₪{c.price} · {freqLabel(c.frequency)}</div>
                    {c.note && <div style={{fontSize:11,color:C.org,marginTop:4}}>📌 {c.note}</div>}
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={() => setModal({type:"editClient",data:c})} style={{background:C.bluB,color:C.blu,border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>✏️</button>
                    <button onClick={() => { if (confirm(`למחוק את ${c.name}?`)) deleteClient(c.id); }} style={{background:C.redB,color:C.red,border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:14}}>🗑️</button>
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        })}
        {filtered.length === 0 && <div style={{textAlign:"center",color:C.txtL,padding:20,fontSize:13}}>לא נמצאו לקוחות</div>}
      </div>
    </div>
  );
}

// SUMMARY VIEW - סיכום חודשי
// ═══════════════════════════════════════════════════════════════════
function SummaryView({ data, monthView, setMonthView, togglePaid }) {
  const mk = monthKey(monthView);
  const mStatus = data.monthlyStatus[mk] || {};

  const changeMonth = delta => {
    const n = new Date(monthView);
    n.setMonth(n.getMonth() + delta);
    setMonthView(n);
  };

  // סדר: ירושלים קודם, בית שמש אחרי, ובתוך כל עיר אלף-בית
  const cityOrderSummary = { "ירושלים": 0, "בית שמש": 1 };
  const byCity = {};
  data.clients.forEach(c => {
    if (!byCity[c.city]) byCity[c.city] = [];
    byCity[c.city].push(c);
  });
  // מיון א-ב בתוך כל עיר
  Object.keys(byCity).forEach(city => {
    byCity[city].sort((a, b) => a.name.localeCompare(b.name, "he"));
  });
  // סדר הערים (ירושלים קודם)
  const orderedCities = Object.keys(byCity).sort((a, b) =>
    (cityOrderSummary[a] ?? 99) - (cityOrderSummary[b] ?? 99)
  );

  return (
    <div style={{padding:12,paddingBottom:80}}>
      {/* ניווט חודשי */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:"10px 12px",marginBottom:12}}>
        <button onClick={() => changeMonth(-1)} style={{background:"none",border:"none",fontSize:22,color:C.grn,cursor:"pointer"}}>→</button>
        <div style={{fontSize:16,fontWeight:700,color:C.grn}}>{MONTHS[monthView.getMonth()]} {monthView.getFullYear()}</div>
        <button onClick={() => changeMonth(1)} style={{background:"none",border:"none",fontSize:22,color:C.grn,cursor:"pointer"}}>←</button>
      </div>

      {orderedCities.map(city => {
        const clients = byCity[city];
        const cc = CITY_COLORS[city];
        const expected = clients.reduce((s, c) => s + c.price * freqCount(c.frequency), 0);
        const paid = clients.reduce((s, c) => {
          const st = mStatus[c.id] || {};
          return st.paid ? s + c.price * freqCount(c.frequency) : s;
        }, 0);
        return (
          <div key={city} style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:14,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
              <div style={{fontSize:17,fontWeight:700,color:cc.text}}>
                <span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:cc.border,marginLeft:6}}></span>
                {city}
              </div>
              <div style={{display:"flex",gap:6,fontSize:11}}>
                <span style={{background:C.grnP,color:C.grn,padding:"3px 10px",borderRadius:10,fontWeight:600}}>נגבה: ₪{paid.toLocaleString()}</span>
                <span style={{background:C.orgB,color:C.org,padding:"3px 10px",borderRadius:10,fontWeight:600}}>חוב: ₪{(expected-paid).toLocaleString()}</span>
              </div>
            </div>
            <div>
              {clients.map(c => {
                const st = mStatus[c.id] || { paid:false, visitsDone:0 };
                const exp = freqCount(c.frequency);
                return (
                  <div key={c.id} style={{display:"flex",alignItems:"center",padding:"8px 4px",borderBottom:`1px solid ${C.bdrL}`,gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:C.txt}}>{c.name}</div>
                      <div style={{fontSize:10,color:C.txtM}}>₪{c.price} × {exp} = ₪{(c.price*exp).toLocaleString()} · {st.visitsDone}/{exp} בוצעו</div>
                    </div>
                    <button onClick={() => togglePaid(mk, c.id)} style={{
                      background:st.paid ? C.grn : C.cardA,
                      color:st.paid ? "#fff" : C.txtM,
                      border:`1px solid ${st.paid ? C.grn : C.bdr}`,
                      borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",
                      minWidth:70
                    }}>
                      {st.paid ? "✓ שולם" : "○ ממתין"}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// MODAL - הוספת/עריכת לקוח + רשימת לא שובצו
// ═══════════════════════════════════════════════════════════════════
function Modal({ modal, setModal, data, addClient, editClient, addOneTimeJob, onClose }) {
  if (modal.type === "unscheduled") {
    return <UnscheduledModal data={data} onClose={onClose} />;
  }
  if (modal.type === "addOneTimeJob") {
    return <OneTimeJobModal data={data} onSave={addOneTimeJob} onClose={onClose} />;
  }

  const isEdit = modal.type === "editClient";
  const [form, setForm] = useState(isEdit ? modal.data : {
    name:"", price:"", frequency:"monthly", city:"ירושלים", area:"", note:"", permanentNote:""
  });

  const save = () => {
    if (!form.name || !form.price) { alert("שם ומחיר חובה"); return; }
    const client = { ...form, price:Number(form.price) };
    if (isEdit) editClient(client);
    else addClient(client);
    onClose();
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,padding:0}}>
      <div onClick={e => e.stopPropagation()} style={{background:C.card,borderTopLeftRadius:20,borderTopRightRadius:20,padding:16,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:C.grn}}>{isEdit ? "עריכת לקוח" : "לקוח חדש"}</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:C.txtM,cursor:"pointer"}}>×</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Field label="שם הלקוח *" value={form.name} onChange={v => setForm({...form,name:v})} />
          <Field label="מחיר לביקור ₪ *" value={form.price} onChange={v => setForm({...form,price:v})} type="number" />
          <SelectField label="עיר" value={form.city} options={["ירושלים","בית שמש"]} onChange={v => setForm({...form,city:v})} />
          <SelectField label="תדירות" value={form.frequency} options={[
            ["monthly","פעם בחודש"],["twice","פעמיים בחודש"],["three","3 פעמים"],["four","4 פעמים"],["weekly","שבועי (4 ביקורים)"]
          ]} onChange={v => setForm({...form,frequency:v})} />
          <Field label="אזור / שכונה (אופציונלי)" value={form.area} onChange={v => setForm({...form,area:v})} />
          <Field label="הערה מנהלית (לא נראית לעובדים)" value={form.note} onChange={v => setForm({...form,note:v})} />
          <div>
            <div style={{fontSize:11,color:C.blu,marginBottom:4,fontWeight:700}}>📌 הערה קבועה (תופיע בכל ביקור)</div>
            <textarea value={form.permanentNote || ""} onChange={e => setForm({...form,permanentNote:e.target.value})} rows={2} placeholder="לדוגמה: מפתח תחת העציץ, הכלב נושך, דלת אחורית פתוחה..." style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff",resize:"vertical"}} />
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={save} style={{flex:1,background:C.grn,color:"#fff",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>{isEdit ? "עדכן" : "הוסף"}</button>
          <button onClick={onClose} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:10,padding:12,fontSize:14,cursor:"pointer"}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

function OneTimeJobModal({ data, onSave, onClose }) {
  const [form, setForm] = useState({
    clientName: "",
    city: "ירושלים",
    price: "",
    date: iso(new Date()),
    note: ""
  });
  const [linkToExisting, setLinkToExisting] = useState(false);
  const [existingClientId, setExistingClientId] = useState("");

  const save = () => {
    const name = linkToExisting
      ? (data.clients.find(c => c.id === existingClientId)?.name || "")
      : form.clientName.trim();
    if (!name) { alert("נא הכנס שם לקוח"); return; }
    if (!form.price) { alert("נא הכנס מחיר"); return; }
    const city = linkToExisting
      ? (data.clients.find(c => c.id === existingClientId)?.city || "ירושלים")
      : form.city;
    onSave({
      clientName: name,
      city,
      price: Number(form.price),
      date: form.date,
      note: form.note,
      linkedClientId: linkToExisting ? existingClientId : null
    });
    onClose();
  };

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div onClick={e => e.stopPropagation()} style={{background:C.card,borderTopLeftRadius:20,borderTopRightRadius:20,padding:16,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:C.prp}}>🔨 עבודה חד-פעמית</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:C.txtM,cursor:"pointer"}}>×</button>
        </div>

        <div style={{background:C.prpB,border:`1px solid ${C.prp}`,borderRadius:8,padding:10,marginBottom:12,fontSize:12,color:C.prp}}>
          💡 לעבודה חד-פעמית - לא תחזוקה רגילה (שתילה חדשה, ניקוי מיוחד, קטיף וכו')
        </div>

        <div style={{display:"flex",gap:6,marginBottom:12}}>
          <button onClick={() => setLinkToExisting(false)} style={{flex:1,padding:8,borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:!linkToExisting ? C.prp : C.cardA,color:!linkToExisting ? "#fff" : C.txtM}}>לקוח חדש</button>
          <button onClick={() => setLinkToExisting(true)} style={{flex:1,padding:8,borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:linkToExisting ? C.prp : C.cardA,color:linkToExisting ? "#fff" : C.txtM}}>לקוח קיים</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {linkToExisting ? (
            <div>
              <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>בחר לקוח קיים</div>
              <select value={existingClientId} onChange={e => setExistingClientId(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}}>
                <option value="">-- בחר --</option>
                {data.clients.map(c => <option key={c.id} value={c.id}>{c.name} ({c.city})</option>)}
              </select>
            </div>
          ) : (
            <>
              <Field label="שם הלקוח *" value={form.clientName} onChange={v => setForm({...form,clientName:v})} />
              <SelectField label="עיר" value={form.city} options={["ירושלים","בית שמש"]} onChange={v => setForm({...form,city:v})} />
            </>
          )}
          <Field label="מחיר ₪ *" value={form.price} onChange={v => setForm({...form,price:v})} type="number" />
          <div>
            <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>תאריך מתוכנן</div>
            <input type="date" value={form.date} onChange={e => setForm({...form,date:e.target.value})} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}} />
          </div>
          <div>
            <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>תיאור / הערה</div>
            <textarea value={form.note} onChange={e => setForm({...form,note:e.target.value})} rows={2} placeholder="לדוגמה: שתילת עץ זית, ניקוי חצר אחרי סופה..." style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff",resize:"vertical"}} />
          </div>
        </div>

        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={save} style={{flex:1,background:C.prp,color:"#fff",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,cursor:"pointer"}}>הוסף עבודה</button>
          <button onClick={onClose} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:10,padding:12,fontSize:14,cursor:"pointer"}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

function UnscheduledModal({ data, onClose }) {
  // חשב לקוחות לא שובצו החודש הנוכחי
  const mk = monthKey(new Date());
  const scheduledCount = {};
  Object.entries(data.schedule || {}).forEach(([k, items]) => {
    if (k.startsWith(mk)) {
      (items || []).forEach(item => {
        scheduledCount[item.clientId] = (scheduledCount[item.clientId] || 0) + 1;
      });
    }
  });

  const unscheduled = data.clients.filter(c => {
    const needed = freqCount(c.frequency);
    return (scheduledCount[c.id] || 0) < needed;
  });

  const byCity = {};
  unscheduled.forEach(c => {
    if (!byCity[c.city]) byCity[c.city] = [];
    byCity[c.city].push(c);
  });

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
      <div onClick={e => e.stopPropagation()} style={{background:C.card,borderTopLeftRadius:20,borderTopRightRadius:20,padding:16,width:"100%",maxWidth:500,maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:700,color:C.org}}>📌 לא שובצו החודש ({unscheduled.length})</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:C.txtM,cursor:"pointer"}}>×</button>
        </div>
        {Object.entries(byCity).map(([city, clients]) => {
          const cc = CITY_COLORS[city];
          return (
            <div key={city} style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:cc.text,marginBottom:6}}>
                <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:cc.border,marginLeft:6}}></span>
                {city} ({clients.length})
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {clients.map(c => {
                  const needed = freqCount(c.frequency);
                  const sched = scheduledCount[c.id] || 0;
                  const remaining = needed - sched;
                  return (
                    <div key={c.id} style={{background:cc.bg,color:cc.text,border:`1px solid ${cc.border}`,borderRadius:10,padding:"6px 10px",fontSize:12,fontWeight:500}}>
                      {c.name} {remaining > 1 && <span style={{opacity:0.7}}>×{remaining}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <div style={{fontSize:11,color:C.txtM,marginTop:10,textAlign:"center"}}>לחץ על יום ביומן כדי לשבץ</div>
      </div>
    </div>
  );
}

// Form fields
function Field({ label, value, onChange, type="text" }) {
  return (
    <div>
      <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>{label}</div>
      <input type={type} value={value || ""} onChange={e => onChange(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}} />
    </div>
  );
}

function SelectField({ label, value, onChange, options }) {
  const opts = options.map(o => Array.isArray(o) ? o : [o, o]);
  return (
    <div>
      <div style={{fontSize:11,color:C.txtM,marginBottom:4,fontWeight:500}}>{label}</div>
      <select value={value} onChange={e => onChange(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}}>
        {opts.map(([val,lbl]) => <option key={val} value={val}>{lbl}</option>)}
      </select>
    </div>
  );
}
