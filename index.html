function stripSid(d){ if(!d||typeof d!=="object")return d; const {_sid,...rest}=d; return rest; }

async function load(){
  if (USE_CLOUD) {
    try {
      const { data, error } = await sb.from("app_data").select("data").eq("id", ROW_ID).maybeSingle();
      if (error) throw error;
      if (data && data.data) {
        const clean = stripSid(data.data);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(clean)); } catch(_) {}
        return clean;
      }
      return null;
    } catch (e) {
      console.warn("Cloud load failed, using cache:", e);
    }
  }
  try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : null; } catch(_) { return null; }
}

async function save(v){
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(v)); } catch(_) {}
  if (USE_CLOUD) {
    try {
      const payload = { ...v, _sid: MY_SID };
      const { error } = await sb.from("app_data").upsert({ id: ROW_ID, data: payload, updated_at: new Date().toISOString() });
      if (error) throw error;
      return true;
    } catch (e) {
      console.warn("Cloud save failed:", e);
      return false;
    }
  }
  return true;
}

  clients: INITIAL_CLIENTS,

// ═══════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [data, setData] = useState(EMPTY);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("home"); // home | day | clients | summary
  const [selectedDay, setSelectedDay] = useState(iso(new Date()));
  const [monthView, setMonthView] = useState(new Date());
  const [modal, setModal] = useState(null); // {type, data}
  const [syncStatus, setSyncStatus] = useState("saved");
  const saveTimer = useRef(null);

  // Load data on mount
  useEffect(() => {
    (async () => {
      const d = await load();
      if (d && d.clients) setData({ ...EMPTY, ...d });
      else setData(EMPTY);
      setLoaded(true);
    })();
  }, []);

  // Debounced save on change
  useEffect(() => {
    if (!loaded) return;
    setSyncStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const ok = await save(data);
      setSyncStatus(ok ? "saved" : "error");
    }, 400);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [data, loaded]);

  // Realtime sync from other devices
  useEffect(() => {
    if (!loaded || !USE_CLOUD) return;
    const channel = sb.channel("app_data_" + ROW_ID)
      .on("postgres_changes",
          { event: "*", schema: "public", table: "app_data", filter: "id=eq." + ROW_ID },
          (payload) => {
            const incoming = payload.new && payload.new.data;
            if (!incoming) return;
            if (incoming._sid === MY_SID) return;
            const clean = stripSid(incoming);
            setData(p => JSON.stringify(p) === JSON.stringify(clean) ? p : { ...EMPTY, ...clean });
          })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [loaded]);

  const update = fn => setData(p => { const n = JSON.parse(JSON.stringify(p)); fn(n); return n; });

  // Helpers
  const todayISO = iso(new Date());
  const clientById = id => data.clients.find(c => c.id === id);

  // מוצא את כל הלקוחות שיש להם תזכורת פתוחה (לא שובצו עדיין החודש) - נחשב בדף הבית
  const getUnscheduledThisMonth = () => {
    const mk = monthKey(monthView);
    const scheduledInMonth = {};
    Object.entries(data.schedule || {}).forEach(([dayKey, items]) => {
      if (dayKey.startsWith(mk)) {
        (items || []).forEach(item => {
          scheduledInMonth[item.clientId] = (scheduledInMonth[item.clientId] || 0) + 1;
        });
      }
    });
    return data.clients.filter(c => {
      const needed = freqCount(c.frequency);
      const sched = scheduledInMonth[c.id] || 0;
      return sched < needed;
    });
  };

  // Actions
  const toggleVisitDone = (dayKey, visitId) => {
    update(d => {
      if (!d.schedule[dayKey]) return;
      const item = d.schedule[dayKey].find(x => x.id === visitId);
      if (!item) return;
      item.done = !item.done;
      item.doneAt = item.done ? new Date().toISOString() : null;
      // Update monthly visits count
      const mk = dayKey.slice(0, 7);
      if (!d.monthlyStatus[mk]) d.monthlyStatus[mk] = {};
      if (!d.monthlyStatus[mk][item.clientId]) d.monthlyStatus[mk][item.clientId] = { paid: false, visitsDone: 0 };
      const count = Object.entries(d.schedule).reduce((sum, [k, items]) => {
        if (k.startsWith(mk)) {
          return sum + (items || []).filter(x => x.clientId === item.clientId && x.done).length;
        }
        return sum;
      }, 0);
      d.monthlyStatus[mk][item.clientId].visitsDone = count;
    });
  };

  // סימון שהערה מביקור קודם טופלה
  const markLastNoteHandled = (dayKey, visitId) => {
    update(d => {
      const item = (d.schedule[dayKey] || []).find(x => x.id === visitId);
      if (item) item.lastVisitNoteHandled = true;
    });
  };

  // עדכון הערה חדשה שהעובד רושם
  const updateNewNote = (dayKey, visitId, note) => {
    update(d => {
      const item = (d.schedule[dayKey] || []).find(x => x.id === visitId);
      if (item) {
        item.newNote = note;
        item.newNoteForwarded = false;
      }
    });
  };

  // הוספת תוספת (תוספת לביקור קיים)
  const addExtra = (dayKey, visitId, desc, amount) => {
    update(d => {
      const item = (d.schedule[dayKey] || []).find(x => x.id === visitId);
      if (item) {
        if (!item.extras) item.extras = [];
        item.extras.push({ id: uid(), desc, amount: Number(amount) || 0 });
      }
    });
  };

  const removeExtra = (dayKey, visitId, extraId) => {
    update(d => {
      const item = (d.schedule[dayKey] || []).find(x => x.id === visitId);
      if (item && item.extras) {
        item.extras = item.extras.filter(e => e.id !== extraId);
      }
    });
  };

  // עדכון הערה קבועה של לקוח
  const updatePermanentNote = (clientId, note) => {
    update(d => {
      const c = d.clients.find(cl => cl.id === clientId);
      if (c) c.permanentNote = note;
    });
  };

  // עבודות חד-פעמיות
  const addOneTimeJob = (job) => {
    update(d => {
      if (!d.oneTimeJobs) d.oneTimeJobs = [];
      d.oneTimeJobs.push({ ...job, id: uid(), done: false, doneAt: null });
    });
  };

  const toggleOneTimeJob = (jobId) => {
    update(d => {
      const j = (d.oneTimeJobs || []).find(x => x.id === jobId);
      if (j) {
        j.done = !j.done;
        j.doneAt = j.done ? new Date().toISOString() : null;
      }
    });
  };

  const deleteOneTimeJob = (jobId) => {
    update(d => {
      d.oneTimeJobs = (d.oneTimeJobs || []).filter(x => x.id !== jobId);
    });
  };

  // תזכורות - Reminders
  const addReminder = (text, dueDate = null) => {
    update(d => {
      if (!d.reminders) d.reminders = [];
      d.reminders.push({
        id: uid(),
        text,
        dueDate: dueDate || null,
        done: false,
        doneAt: null,
        createdAt: new Date().toISOString()
      });
    });
  };

  const toggleReminder = (id) => {
    update(d => {
      const r = (d.reminders || []).find(x => x.id === id);
      if (r) {
        r.done = !r.done;
        r.doneAt = r.done ? new Date().toISOString() : null;
      }
    });
  };

  const deleteReminder = (id) => {
    update(d => {
      d.reminders = (d.reminders || []).filter(x => x.id !== id);
    });
  };

  const editReminder = (id, text, dueDate) => {
    update(d => {
      const r = (d.reminders || []).find(x => x.id === id);
      if (r) {
        r.text = text;
        r.dueDate = dueDate || null;
      }
    });
  };

  const updateSetting = (key, value) => {
    update(d => {
      if (!d.settings) d.settings = {};
      d.settings[key] = value;
    });
  };

  // פרויקטים
  const addProject = (project) => {
    update(d => {
      if (!d.projects) d.projects = [];
      d.projects.push({
        ...project,
        id: uid(),
        expenses: project.expenses || [],
        photos: project.photos || [],
        status: "active",
        doneAt: null,
        createdAt: new Date().toISOString()
      });
    });
  };

  const updateProject = (id, updates) => {
    update(d => {
      const p = (d.projects || []).find(x => x.id === id);
      if (p) Object.assign(p, updates);
    });
  };

  const deleteProject = (id) => {
    update(d => {
      d.projects = (d.projects || []).filter(x => x.id !== id);
    });
  };

  const toggleProjectDone = (id) => {
    update(d => {
      const p = (d.projects || []).find(x => x.id === id);
      if (p) {
        p.status = p.status === "done" ? "active" : "done";
        p.doneAt = p.status === "done" ? new Date().toISOString() : null;
      }
    });
  };

  const addProjectExpense = (projectId, desc, amount, date) => {
    update(d => {
      const p = (d.projects || []).find(x => x.id === projectId);
      if (p) {
        if (!p.expenses) p.expenses = [];
        p.expenses.push({
          id: uid(),
          desc,
          amount: Number(amount) || 0,
          date: date || iso(new Date())
        });
      }
    });
  };

  const removeProjectExpense = (projectId, expenseId) => {
    update(d => {
      const p = (d.projects || []).find(x => x.id === projectId);
      if (p && p.expenses) {
        p.expenses = p.expenses.filter(e => e.id !== expenseId);
      }
    });
  };

  const addProjectPhoto = (projectId, photoData) => {
    update(d => {
      const p = (d.projects || []).find(x => x.id === projectId);
      if (p) {
        if (!p.photos) p.photos = [];
        p.photos.push({
          id: uid(),
          data: photoData,
          date: new Date().toISOString()
        });
      }
    });
  };

  const removeProjectPhoto = (projectId, photoId) => {
    update(d => {
      const p = (d.projects || []).find(x => x.id === projectId);
      if (p && p.photos) {
        p.photos = p.photos.filter(ph => ph.id !== photoId);
      }
    });
  };

  // ════════════════ הוצאות ════════════════
  const addExpense = (exp) => {
    update(d => {
      if (!d.expenses) d.expenses = [];
      d.expenses.push({
        ...exp,
        id: uid(),
        amount: Number(exp.amount) || 0,
        photos: exp.photos || [],
        createdAt: new Date().toISOString(),
        addedBy: exp.addedBy || (IS_WORKER ? "worker" : "admin"),
      });
    });
  };

  const updateExpense = (id, updates) => {
    update(d => {
      const e = (d.expenses || []).find(x => x.id === id);
      if (e) {
        Object.assign(e, updates);
        if (updates.amount !== undefined) e.amount = Number(updates.amount) || 0;
      }
    });
  };

  const deleteExpense = (id) => {
    update(d => {
      d.expenses = (d.expenses || []).filter(x => x.id !== id);
    });
  };

  const togglePaid = (mk, clientId) => {
    update(d => {
      if (!d.monthlyStatus[mk]) d.monthlyStatus[mk] = {};
      if (!d.monthlyStatus[mk][clientId]) d.monthlyStatus[mk][clientId] = { paid: false, visitsDone: 0 };
      d.monthlyStatus[mk][clientId].paid = !d.monthlyStatus[mk][clientId].paid;
    });
  };

  // חשב את התאריך הבא לפי תדירות - עם דחייה ליום עבודה קרוב
  // עבור בית שמש: מעדיף ראשון (0) או חמישי (4)
  // דולג על חגים, ערבי חג, וחול המועד אוטומטית
  const computeNextDate = (baseDate, frequency, city = null) => {
    const base = new Date(baseDate);
    let next = new Date(base);

    switch (frequency) {
      case "weekly": next.setDate(next.getDate() + 7); break;
      case "twice": next.setDate(next.getDate() + 15); break;
      case "three": next.setDate(next.getDate() + 10); break;
      case "four": next.setDate(next.getDate() + 7); break;
      case "monthly":
      default: next.setMonth(next.getMonth() + 1); break;
    }

    // דחה משישי/שבת ליום עבודה
    const dow = next.getDay();
    if (!WORK_DAYS.includes(dow)) {
      if (dow === 5) next.setDate(next.getDate() + 2);      // שישי → ראשון
      else if (dow === 6) next.setDate(next.getDate() + 1); // שבת → ראשון
    }

    // עבור בית שמש: העדף ראשון (0) או חמישי (4)
    if (city === "בית שמש") {
      const targetDow = next.getDay();
      if (targetDow !== 0 && targetDow !== 4) {
        const distToSun = targetDow > 4 ? 7 - targetDow : -targetDow;
        const distToThu = 4 - targetDow;
        const bestDist = Math.abs(distToSun) <= Math.abs(distToThu) ? distToSun : distToThu;
        if (Math.abs(bestDist) <= 3) {
          next.setDate(next.getDate() + bestDist);
        }
      }
    }

    // דלג על חגים, ערבי חג וחול המועד - לדחות לאחר החג
    let safetyCount = 30;
    while (isBlockedDay(iso(next)) && safetyCount-- > 0) {
      next.setDate(next.getDate() + 1);
      // אחרי דחייה, ודא שזה יום עבודה
      const newDow = next.getDay();
      if (!WORK_DAYS.includes(newDow)) {
        if (newDow === 5) next.setDate(next.getDate() + 2);
        else if (newDow === 6) next.setDate(next.getDate() + 1);
      }
    }

    return iso(next);
  };

  const addClientToDay = (dayKey, clientId, dayNote = "", createRecurring = false) => {
    // בדיקת כפילות - האם הלקוח כבר משובץ ליום הזה?
    const client = data.clients.find(c => c.id === clientId);
    if (client && data.schedule[dayKey] && data.schedule[dayKey].find(x => x.clientId === clientId)) {
      alert(`⚠️ ${client.name} כבר משובץ ליום ${dayKey}.\n\nלא ניתן לשבץ פעמיים את אותו לקוח באותו יום.`);
      return;
    }

    // בדיקת חג/ערב חג
    const holiday = getHoliday(dayKey);
    if (holiday) {
      const typeLabel = holiday.type === "holiday" ? "חג" : holiday.type === "eve" ? "ערב חג" : "חול המועד";
      const confirmMsg = `⚠️ שים לב!\n\n${dayKey} הוא ${typeLabel} (${holiday.name})\n\nהאם בכל זאת לשבץ?`;
      if (!confirm(confirmMsg)) return;
    }

    // בדיקת ערבוב ערים באותו יום
    if (client && data.schedule[dayKey] && data.schedule[dayKey].length > 0) {
      const existingItems = data.schedule[dayKey];
      const existingCities = new Set();
      existingItems.forEach(item => {
        const c = data.clients.find(cl => cl.id === item.clientId);
        if (c) existingCities.add(c.city);
      });

      // אם יש לקוחות מעיר אחרת - התרעה
      if (existingCities.size > 0 && !existingCities.has(client.city)) {
        const otherCities = Array.from(existingCities).join(", ");
        const otherCount = existingItems.length;
        const confirmCity = `⚠️ ערבוב ערים?\n\nאתה מנסה לשבץ לקוח מ${client.city}, אבל היום הזה יש כבר ${otherCount} לקוחות מ-${otherCities}.\n\nהאם בכל זאת לשבץ?`;
        if (!confirm(confirmCity)) return;
      }
    }

    update(d => {
      if (!d.schedule[dayKey]) d.schedule[dayKey] = [];

      // אם הלקוח כבר קיים באותו יום - לא להוסיף שוב
      if (d.schedule[dayKey].find(x => x.clientId === clientId)) return;

      // מצא הערה מהביקור האחרון
      let lastVisitNote = "";
      const sortedDays = Object.keys(d.schedule).filter(k => k < dayKey).sort().reverse();
      for (const prevDay of sortedDays) {
        const prev = (d.schedule[prevDay] || []).find(x => x.clientId === clientId);
        if (prev && prev.newNote && !prev.newNoteForwarded) {
          lastVisitNote = prev.newNote;
          prev.newNoteForwarded = true;
          break;
        }
        if (prev && prev.lastVisitNote && !prev.lastVisitNoteHandled) {
          lastVisitNote = prev.lastVisitNote;
          break;
        }
      }

      d.schedule[dayKey].push({
        id: uid(),
        clientId,
        dayNote: dayNote || "",
        lastVisitNote,
        lastVisitNoteHandled: !lastVisitNote,
        newNote: "",
        extras: [],
        done: false,
        doneAt: null,
        isRecurring: createRecurring  // סמן שהשיבוץ הוא חלק מסדרה חוזרת
      });

      // אם createRecurring=true - צור חזרות שמכסות 3 חודשים מלאים מתאריך ההתחלה
      // כך שאם יש 5 ימי חמישי בחודש - הם כולם יכוסו (לא מוגבל ל-4)
      if (createRecurring) {
        const client = d.clients.find(c => c.id === clientId);
        if (!client) return;

        // חשב את תאריך הסיום: 3 חודשים בדיוק מהשיבוץ הראשון
        const startDate = new Date(dayKey);
        const endDate = new Date(startDate);
        endDate.setMonth(endDate.getMonth() + 3);
        const endKey = iso(endDate);

        let currentDateKey = dayKey;
        let safetyLimit = 60; // גבול בטיחות - עד 60 חזרות (יותר מספיק ל-3 חודשים בתדירות שבועית = ~13)

        while (safetyLimit-- > 0) {
          const nextKey = computeNextDate(currentDateKey, client.frequency || "monthly", client.city);

          // עצור כשעוברים את תאריך הסיום
          if (nextKey > endKey) break;

          if (!d.schedule[nextKey]) d.schedule[nextKey] = [];

          // רק אם לא קיים כבר
          if (!d.schedule[nextKey].find(x => x.clientId === clientId)) {
            d.schedule[nextKey].push({
              id: uid(),
              clientId,
              dayNote: "",
              lastVisitNote: "",
              lastVisitNoteHandled: true,
              newNote: "",
              extras: [],
              done: false,
              doneAt: null,
              isRecurring: true
            });
          }

          currentDateKey = nextKey;
        }
      }
    });
  };

  // ביטול סדרה חוזרת - מוחק את כל השיבוצים העתידיים של לקוח זה
  const cancelRecurring = (clientId, fromDayKey) => {
    update(d => {
      Object.keys(d.schedule).forEach(k => {
        if (k > fromDayKey) {
          d.schedule[k] = d.schedule[k].filter(x => {
            // שמור רק אם הוא לא ביקור חוזר, או אם זה לא הלקוח שאנחנו מבטלים
            if (x.clientId !== clientId) return true;
            return !x.isRecurring;
          });
          if (d.schedule[k].length === 0) delete d.schedule[k];
        }
      });
    });
  };

  const removeClientFromDay = (dayKey, visitId) => {
    update(d => {
      if (!d.schedule[dayKey]) return;
      const visit = d.schedule[dayKey].find(x => x.id === visitId);
      if (!visit) return;

      const clientId = visit.clientId;
      const dayNote = visit.dayNote;

      // הסר את הביקור הנוכחי
      d.schedule[dayKey] = d.schedule[dayKey].filter(x => x.id !== visitId);
      if (d.schedule[dayKey].length === 0) delete d.schedule[dayKey];

      // אם יש הערה ליום, מצא ביקור עתידי של אותו לקוח ונסה להעביר את ההערה
      if (dayNote && dayNote.trim()) {
        const futureKeys = Object.keys(d.schedule)
          .filter(k => k > dayKey)
          .sort();

        let foundFutureVisit = false;
        for (const k of futureKeys) {
          const futureVisit = (d.schedule[k] || []).find(x => x.clientId === clientId && !x.done);
          if (futureVisit) {
            // העבר את ההערה - אם כבר יש הערה ביעד, צרף
            if (futureVisit.dayNote && futureVisit.dayNote.trim()) {
              futureVisit.dayNote = futureVisit.dayNote + " | " + dayNote;
            } else {
              futureVisit.dayNote = dayNote;
            }
            foundFutureVisit = true;
            break;
          }
        }

        // אם אין ביקור עתידי - צור אחד בשבוע הבא
        if (!foundFutureVisit) {
          const nextDate = new Date(dayKey);
          nextDate.setDate(nextDate.getDate() + 7);
          // ודא יום עבודה
          while (!WORK_DAYS.includes(nextDate.getDay())) {
            nextDate.setDate(nextDate.getDate() + 1);
          }
          // דלג חגים
          let safety = 30;
          while (isBlockedDay(iso(nextDate)) && safety-- > 0) {
            nextDate.setDate(nextDate.getDate() + 1);
            while (!WORK_DAYS.includes(nextDate.getDay())) {
              nextDate.setDate(nextDate.getDate() + 1);
            }
          }
          const newKey = iso(nextDate);
          if (!d.schedule[newKey]) d.schedule[newKey] = [];
          d.schedule[newKey].push({
            id: uid(),
            clientId: clientId,
            dayNote: dayNote,
            done: false,
            isRecurring: false,
            extras: [],
          });
        }
      }
    });
  };

  // העבר ביקור ליום אחר + דחה את כל השיבוצים העתידיים של אותו לקוח באותה דחייה
  const moveVisitToDay = (oldDayKey, visitId, newDayKey) => {
    if (oldDayKey === newDayKey) return;

    // חישוב הפרש בימים בין התאריך החדש לישן
    const oldDate = new Date(oldDayKey);
    const newDate = new Date(newDayKey);
    const diffDays = Math.round((newDate - oldDate) / (1000 * 60 * 60 * 24));

    update(d => {
      // מצא את הביקור הנוכחי
      const visit = (d.schedule[oldDayKey] || []).find(x => x.id === visitId);
      if (!visit) return;

      const clientId = visit.clientId;

      // מצא את כל השיבוצים העתידיים של אותו לקוח (כולל זה)
      const futureKeys = Object.keys(d.schedule)
        .filter(k => k >= oldDayKey)
        .sort();

      // לכל יום עתידי - העבר את הלקוח
      futureKeys.forEach(k => {
        const idx = (d.schedule[k] || []).findIndex(x => x.clientId === clientId && !x.done);
        if (idx === -1) return;

        const item = d.schedule[k][idx];

        // חשב יום חדש
        const oldKDate = new Date(k);
        oldKDate.setDate(oldKDate.getDate() + diffDays);
        let newK = iso(oldKDate);

        // ודא שזה יום עבודה
        const newKDate = new Date(newK);
        let dow = newKDate.getDay();
        while (!WORK_DAYS.includes(dow)) {
          newKDate.setDate(newKDate.getDate() + 1);
          dow = newKDate.getDay();
        }
        // דלג חגים
        let safety = 30;
        while (isBlockedDay(iso(newKDate)) && safety-- > 0) {
          newKDate.setDate(newKDate.getDate() + 1);
          dow = newKDate.getDay();
          while (!WORK_DAYS.includes(dow)) {
            newKDate.setDate(newKDate.getDate() + 1);
            dow = newKDate.getDay();
          }
        }
        newK = iso(newKDate);

        // הסר מהיום הישן
        d.schedule[k].splice(idx, 1);
        if (d.schedule[k].length === 0) delete d.schedule[k];

        // הוסף ליום החדש
        if (!d.schedule[newK]) d.schedule[newK] = [];
        d.schedule[newK].push(item);
      });
    });
  };

  // העברת יום שלם - כל הביקורים של יום אחד מועברים ליום אחר
  // includeDone: האם להעביר גם ביקורים שכבר סומנו כבוצעו
  const moveDayToDay = (oldDayKey, newDayKey, includeDone = false) => {
    if (oldDayKey === newDayKey) return;

    update(d => {
      const items = (d.schedule[oldDayKey] || []).slice(); // עותק
      if (items.length === 0) return;

      const toMove = includeDone ? items : items.filter(x => !x.done);
      const toKeep = includeDone ? [] : items.filter(x => x.done);

      // ודא שהיום החדש קיים
      if (!d.schedule[newDayKey]) d.schedule[newDayKey] = [];

      // העבר את כל הביקורים הרצויים
      toMove.forEach(item => {
        d.schedule[newDayKey].push(item);
      });

      // עדכן את היום הישן - השאר רק את המבוצעים (אם לא לכלול)
      if (toKeep.length === 0) {
        delete d.schedule[oldDayKey];
      } else {
        d.schedule[oldDayKey] = toKeep;
      }
    });
  };

  const updateDayNote = (dayKey, visitId, note) => {
    update(d => {
      const item = (d.schedule[dayKey] || []).find(x => x.id === visitId);
      if (item) item.dayNote = note;
    });
  };

  const addClient = (client) => {
    update(d => { d.clients.push({ ...client, id: uid() }); });
  };

  const editClient = (client) => {
    update(d => {
      const idx = d.clients.findIndex(c => c.id === client.id);
      if (idx >= 0) d.clients[idx] = client;
    });
  };

  const deleteClient = (id) => {
    update(d => {
      d.clients = d.clients.filter(c => c.id !== id);
      Object.keys(d.schedule).forEach(k => {
        d.schedule[k] = d.schedule[k].filter(x => x.clientId !== id);
        if (d.schedule[k].length === 0) delete d.schedule[k];
      });
    });
  };

  if (!loaded) {
    return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.grn,fontSize:18}}>טוען... 🌳</div>;
  }

  // ═══════════════════════════════════════════════════════════════════
  // HEADER
  // ═══════════════════════════════════════════════════════════════════
  const inSubView = view !== "home";
  const Header = () => (
    <div style={{background:`linear-gradient(135deg, ${C.hdr} 0%, ${C.hdrL} 100%)`,color:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {inSubView && (
          <button onClick={() => setView("home")} style={{background:"rgba(255,255,255,0.18)",border:"none",color:"#fff",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        )}
        <div style={{fontSize:18,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
          <span>🌳</span>
          <span>{view === "home" ? "מעקב גינות" : view === "day" ? "יום" : view === "clients" ? "לקוחות" : view === "expenses" ? "הוצאות" : "סיכום חודשי"}</span>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {/* סטטוס סנכרון */}
        <div style={{fontSize:11,opacity:0.8,display:"flex",alignItems:"center",gap:4}}>
          {syncStatus === "saving" && <><span style={{width:8,height:8,borderRadius:"50%",background:"#ffc857"}}></span>שומר...</>}
          {syncStatus === "saved" && <><span style={{width:8,height:8,borderRadius:"50%",background:"#b7e4c7"}}></span>{USE_CLOUD ? "מסונכרן" : "נשמר"}</>}
          {syncStatus === "error" && <><span style={{width:8,height:8,borderRadius:"50%",background:"#ff6b6b"}}></span>שגיאה</>}
        </div>
      </div>
    </div>
  );

  // ═══════════════════════════════════════════════════════════════════
  // HOME VIEW - המסך הראשי
  // ═══════════════════════════════════════════════════════════════════
  const renderHome = () => {
    const mk = monthKey(monthView);
    const mStatus = data.monthlyStatus[mk] || {};

    // התראות
    const unpaidCount = data.clients.filter(c => {
      const st = mStatus[c.id] || {};
      return !st.paid;
    }).length;

    const totalExpectedClients = data.clients.reduce((s, c) => s + (c.price * freqCount(c.frequency)), 0);
    const totalPaidClients = data.clients.reduce((s, c) => {
      const st = mStatus[c.id] || {};
      return st.paid ? s + (c.price * freqCount(c.frequency)) : s;
    }, 0);

    // חישוב פרויקטים של החודש הנוכחי
    const currentMonthKey = monthKey(monthView);
    const monthProjects = (data.projects || []).filter(p => {
      // הפרויקט נמצא בחודש הזה אם תאריך ההתחלה נמצא בחודש
      return (p.startDate || "").startsWith(currentMonthKey);
    });
    const projectsExpected = monthProjects.reduce((s, p) => s + (p.totalPrice || 0), 0);
    const projectsPaid = monthProjects.reduce((s, p) => p.status === "done" ? s + (p.totalPrice || 0) : s, 0);

    // סה"כ צפי ונגבה כולל פרויקטים
    const totalExpected = totalExpectedClients + projectsExpected;
    const totalPaid = totalPaidClients + projectsPaid;

    const unscheduled = getUnscheduledThisMonth();

    // לקוחות של היום
    const todaySchedule = data.schedule[todayISO] || [];
    const todayClients = todaySchedule.map(item => ({
      ...item,
      client: clientById(item.clientId)
    })).filter(x => x.client);
    const todayPending = todayClients.filter(x => !x.done);
    const todayDone = todayClients.filter(x => x.done);
    const todayRevenue = todayClients.reduce((s, x) => s + x.client.price, 0);

    // פרויקטים פעילים היום
    const todayProjects = (data.projects || []).filter(p => {
      if (p.status === "done") return false;
      if (!p.startDate) return false;
      if (p.isRange && p.endDate) {
        return p.startDate <= todayISO && p.endDate >= todayISO;
      }
      return p.startDate === todayISO;
    });

    return (
      <div style={{padding:12,paddingBottom:80}}>
        {/* כרטיס היום - קומפקטי ומוביל ליום */}
        <button
          onClick={() => { setSelectedDay(todayISO); setView("day"); }}
          style={{
            width:"100%",
            background:(todayClients.length > 0 || todayProjects.length > 0) ? `linear-gradient(135deg, ${C.hdr} 0%, ${C.hdrL} 100%)` : C.card,
            color:(todayClients.length > 0 || todayProjects.length > 0) ? "#fff" : C.txt,
            border:(todayClients.length > 0 || todayProjects.length > 0) ? "none" : `1px solid ${C.bdr}`,
            borderRadius:14,
            padding:"14px 16px",
            marginBottom:12,
            cursor:"pointer",
            display:"flex",
            justifyContent:"space-between",
            alignItems:"center",
            textAlign:"right",
            boxShadow:(todayClients.length > 0 || todayProjects.length > 0) ? "0 3px 10px rgba(45,106,79,0.2)" : "none"
          }}
        >
          <div>
            <div style={{fontSize:11,opacity:0.9,fontWeight:600,marginBottom:2}}>📅 היום · {DAYNAMES[new Date().getDay()]}</div>
            {todayClients.length > 0 || todayProjects.length > 0 ? (
              <>
                <div style={{fontSize:17,fontWeight:700}}>
                  {todayPending.length > 0 && `${todayPending.length} לקוחות ממתינים`}
                  {todayPending.length > 0 && todayProjects.length > 0 && " · "}
                  {todayProjects.length > 0 && `${todayProjects.length} פרויקטים`}
                </div>
                <div style={{fontSize:11,opacity:0.85,marginTop:2}}>
                  {todayDone.length}/{todayClients.length} בוצעו · ₪{todayRevenue.toLocaleString()}
                </div>
              </>
            ) : (
              <div style={{fontSize:14,color:C.txtM}}>אין ביקורים להיום</div>
            )}
          </div>
          <div style={{fontSize:22,opacity:0.9}}>←</div>
        </button>

        {/* 📝 יומן תזכורות - חדש */}
        <RemindersSection
          reminders={data.reminders || []}
          settings={data.settings || {}}
          unscheduledCount={unscheduled.length}
          onOpenUnscheduled={() => setModal({type:"unscheduled"})}
          onAdd={(text, dueDate) => addReminder(text, dueDate)}
          onToggle={toggleReminder}
          onDelete={deleteReminder}
          onEdit={editReminder}
          onUpdateSetting={updateSetting}
        />

        {/* 🎯 מרכז תזמון חכם - לקוחות מוכנים לתזמון הבא */}
        <SmartScheduleSection
          data={data}
          onSchedule={(clientId, dayKey, recurring) => addClientToDay(dayKey, clientId, "", recurring)}
          onOpenDay={(dayKey) => { setSelectedDay(dayKey); setView("day"); }}
        />



        {/* סטטיסטיקות כלליות */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.bdr}`,padding:12}}>
            <div style={{fontSize:11,color:C.txtM,marginBottom:4}}>צפוי החודש</div>
            <div style={{fontSize:20,fontWeight:700,color:C.grn}}>₪{totalExpected.toLocaleString()}</div>
            {projectsExpected > 0 && (
              <div style={{fontSize:10,color:C.prp,marginTop:2,fontWeight:600}}>🚧 כולל ₪{projectsExpected.toLocaleString()} פרויקטים</div>
            )}
          </div>
          <div style={{background:C.card,borderRadius:12,border:`1px solid ${C.bdr}`,padding:12}}>
            <div style={{fontSize:11,color:C.txtM,marginBottom:4}}>נגבה</div>
            <div style={{fontSize:20,fontWeight:700,color:C.org}}>₪{totalPaid.toLocaleString()}</div>
            <div style={{fontSize:10,color:C.txtL,marginTop:2}}>{Math.round((totalPaid/(totalExpected||1))*100)}% גביה</div>
          </div>
        </div>

        {/* יומן חודשי */}
        <MonthlyCalendar
          monthView={monthView}
          setMonthView={setMonthView}
          data={data}
          onDayClick={(dayKey) => { setSelectedDay(dayKey); setView("day"); }}
        />

        {/* פעולות מהירות */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:8,marginTop:12}}>
          <button onClick={() => setView("clients")} style={{padding:"14px 6px",borderRadius:12,border:"none",background:C.hdr,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:22}}>👥</span>
            לקוחות
          </button>
          <button onClick={() => setView("summary")} style={{padding:"14px 6px",borderRadius:12,border:"none",background:C.grn,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:22}}>📊</span>
            סיכום חודשי
          </button>
          <button onClick={() => setView("expenses")} style={{padding:"14px 6px",borderRadius:12,border:"none",background:C.red,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:22}}>💸</span>
            הוצאות
          </button>
          <button onClick={() => setModal({type:"addClient"})} style={{padding:"14px 6px",borderRadius:12,border:"none",background:C.blu,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:22}}>➕</span>
            לקוח חדש
          </button>
        </div>

        {/* עבודות חד-פעמיות */}
        <OneTimeJobsSection data={data} setModal={setModal} toggleOneTimeJob={toggleOneTimeJob} deleteOneTimeJob={deleteOneTimeJob} />

        {/* קישור לעובדים */}
        <div style={{marginTop:12,padding:12,background:C.hdr,borderRadius:12,color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:13,fontWeight:700}}>🧑‍🌾 קישור לעובדים</div>
            <button onClick={() => {
              const url = window.location.origin + window.location.pathname + "?role=worker";
              navigator.clipboard.writeText(url).then(() => alert("הקישור הועתק!"));
            }} style={{background:"#fff",color:C.hdr,border:"none",borderRadius:16,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>העתק ←</button>
          </div>
          <div style={{fontSize:11,opacity:0.9,lineHeight:1.5}}>שלח לעובדים את הקישור עם <code style={{background:"rgba(255,255,255,0.2)",padding:"1px 4px",borderRadius:3}}>?role=worker</code> - הם יראו רק את הלקוחות של היום עם הערות</div>
        </div>

        {/* הערה אם אין סנכרון ענן */}
        {!USE_CLOUD && (
          <div style={{marginTop:10,padding:10,background:C.bluB,borderRadius:10,border:`1px solid ${C.blu}`,fontSize:11,color:C.blu,textAlign:"center"}}>
            💡 להפעלת סנכרון בין מכשירים - ערוך את הקובץ והוסף מפתחות Supabase
          </div>
        )}
      </div>
    );
  };

  // תצוגת עובד - מסך מלא ונפרד
  if (IS_WORKER) {
    return <WorkerApp data={data} toggleVisitDone={toggleVisitDone} updateNewNote={updateNewNote} markLastNoteHandled={markLastNoteHandled} addExpense={addExpense} toggleProjectDone={toggleProjectDone} syncStatus={syncStatus} />;
  }

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      <Header />
      {view === "home" && renderHome()}
      {view === "day" && <DayView selectedDay={selectedDay} setSelectedDay={setSelectedDay} data={data} toggleVisitDone={toggleVisitDone} addClientToDay={addClientToDay} removeClientFromDay={removeClientFromDay} updateDayNote={updateDayNote} updateNewNote={updateNewNote} markLastNoteHandled={markLastNoteHandled} addExtra={addExtra} removeExtra={removeExtra} updatePermanentNote={updatePermanentNote} addProject={addProject} toggleProjectDone={toggleProjectDone} deleteProject={deleteProject} updateProject={updateProject} addProjectExpense={addProjectExpense} removeProjectExpense={removeProjectExpense} addExpense={addExpense} deleteExpense={deleteExpense} moveVisitToDay={moveVisitToDay} moveDayToDay={moveDayToDay} />}
      {view === "clients" && <ClientsView data={data} setModal={setModal} editClient={editClient} deleteClient={deleteClient} />}
      {view === "summary" && <SummaryView data={data} monthView={monthView} setMonthView={setMonthView} togglePaid={togglePaid} />}
      {view === "expenses" && <ExpensesView data={data} monthView={monthView} setMonthView={setMonthView} addExpense={addExpense} updateExpense={updateExpense} deleteExpense={deleteExpense} />}

      {/* Modals */}
      {modal && <Modal modal={modal} setModal={setModal} data={data} addClient={addClient} editClient={editClient} addOneTimeJob={addOneTimeJob} onClose={() => setModal(null)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// WORKER APP - תצוגה נפרדת לעובדים
// ═══════════════════════════════════════════════════════════════════
function WorkerApp({ data, toggleVisitDone, updateNewNote, markLastNoteHandled, addExpense, toggleProjectDone, syncStatus }) {
  const [selectedDay, setSelectedDay] = useState(iso(new Date()));
  const [expandedVisit, setExpandedVisit] = useState(null);
  const [showExpenseForm, setShowExpenseForm] = useState(null);
  const [showGlobalExpenseForm, setShowGlobalExpenseForm] = useState(false);

  const date = new Date(selectedDay);
  const dayName = DAYNAMES[date.getDay()];
  const items = data.schedule[selectedDay] || [];
  const oneTimeJobsToday = (data.oneTimeJobs || []).filter(j => j.date === selectedDay && !j.done);

  // פרויקטים של היום (כולל טווח תאריכים)
  const dayProjects = (data.projects || []).filter(p => {
    if (p.status === "done") return false;  // לא להציג פרויקטים שכבר סומנו כבוצעו
    if (p.isRange) {
      return p.startDate <= selectedDay && selectedDay <= (p.endDate || p.startDate);
    }
    return p.startDate === selectedDay;
  });

  const clientsWithData = items.map(item => ({
    ...item,
    client: data.clients.find(c => c.id === item.clientId)
  })).filter(x => x.client);

  const pendingVisits = clientsWithData.filter(x => !x.done);
  const doneVisits = clientsWithData.filter(x => x.done);

  const changeDay = delta => {
    const d = new Date(selectedDay);
    d.setDate(d.getDate() + delta);
    while (!WORK_DAYS.includes(d.getDay())) {
      d.setDate(d.getDate() + (delta > 0 ? 1 : -1));
    }
    setSelectedDay(iso(d));
  };

  const isToday = selectedDay === iso(new Date());

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg, ${C.hdr} 0%, ${C.hdrL} 100%)`,color:"#fff",padding:"14px 16px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.1)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:17,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
            <span>🌳</span>
            <span>ביקורים להיום</span>
          </div>
          <div style={{fontSize:10,opacity:0.9,display:"flex",alignItems:"center",gap:4}}>
            {syncStatus === "saving" && <><span style={{width:7,height:7,borderRadius:"50%",background:"#ffc857"}}></span>שומר</>}
            {syncStatus === "saved" && <><span style={{width:7,height:7,borderRadius:"50%",background:"#b7e4c7"}}></span>מסונכרן</>}
            {syncStatus === "error" && <><span style={{width:7,height:7,borderRadius:"50%",background:"#ff6b6b"}}></span>שגיאה</>}
          </div>
        </div>
        {/* ניווט יום */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 12px"}}>
          <button onClick={() => changeDay(-1)} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>→</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700}}>{isToday ? "היום · " : ""}{dayName}</div>
            <div style={{fontSize:11,opacity:0.9}}>{fmtHeb(date)}</div>
          </div>
          <button onClick={() => changeDay(1)} style={{background:"none",border:"none",color:"#fff",fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
        </div>
      </div>

      <div style={{padding:12,paddingBottom:80}}>
        {/* סיכום מהיר */}
        {clientsWithData.length > 0 && (
          <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:12,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                <div style={{fontSize:22,fontWeight:700,color:C.grn}}>{pendingVisits.length}</div>
                <div style={{fontSize:11,color:C.txtM}}>ממתינים</div>
              </div>
              <div style={{height:40,width:1,background:C.bdr}}></div>
              <div>
                <div style={{fontSize:22,fontWeight:700,color:C.hdrL}}>{doneVisits.length}</div>
                <div style={{fontSize:11,color:C.txtM}}>בוצעו</div>
              </div>
              <div style={{height:40,width:1,background:C.bdr}}></div>
              <div>
                <div style={{fontSize:22,fontWeight:700,color:C.txt}}>{clientsWithData.length}</div>
                <div style={{fontSize:11,color:C.txtM}}>סה"כ</div>
              </div>
            </div>
            <div style={{height:6,background:C.bdrL,borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:`linear-gradient(to left, ${C.hdrL}, ${C.grn})`,width:`${clientsWithData.length ? (doneVisits.length/clientsWithData.length)*100 : 0}%`,transition:"width 0.4s"}}></div>
            </div>
          </div>
        )}

        {/* כפתור הוצאה כללית */}
        {!showGlobalExpenseForm ? (
          <button
            onClick={() => setShowGlobalExpenseForm(true)}
            style={{
              width:"100%",
              background:C.redB,
              color:C.red,
              border:`2px solid ${C.red}`,
              borderRadius:12,
              padding:"12px",
              fontSize:14,
              fontWeight:700,
              cursor:"pointer",
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:6,
              marginBottom:10
            }}
          >
            <span style={{fontSize:18}}>💸</span>
            <span>רשום הוצאה (דלק, חומרים, ציוד...)</span>
          </button>
        ) : (
          <div style={{marginBottom:10}}>
            <WorkerExpenseForm
              defaultLink={{ linkType: "none" }}
              data={data}
              selectedDay={selectedDay}
              allowChangeLink={true}
              onSave={(exp) => { addExpense(exp); setShowGlobalExpenseForm(false); }}
              onCancel={() => setShowGlobalExpenseForm(false)}
            />
          </div>
        )}

        {/* אם אין כלום */}
        {clientsWithData.length === 0 && oneTimeJobsToday.length === 0 && dayProjects.length === 0 && (
          <div style={{background:C.card,borderRadius:14,border:`1px dashed ${C.bdr}`,padding:30,textAlign:"center"}}>
            <div style={{fontSize:50,marginBottom:10}}>☀️</div>
            <div style={{fontSize:16,fontWeight:700,color:C.grn,marginBottom:4}}>אין עבודות היום</div>
            <div style={{fontSize:12,color:C.txtM}}>חופש מגיע 🌱</div>
          </div>
        )}

        {/* פרויקטים להיום */}
        {dayProjects.length > 0 && (
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.prp,fontWeight:700,marginBottom:6,padding:"0 4px"}}>🚧 פרויקטים להיום</div>
            {dayProjects.map(p => {
              const linkedClient = p.linkedClientId ? data.clients.find(c => c.id === p.linkedClientId) : null;
              const cc = p.city ? CITY_COLORS[p.city] : null;
              return (
                <div key={p.id} style={{background:C.card,borderRadius:12,border:`2px solid ${C.prp}`,padding:12,marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    <button onClick={() => {
                      if (confirm(`לסמן את הפרויקט "${p.title}" כבוצע?`)) toggleProjectDone(p.id);
                    }} style={{
                      width:44,height:44,borderRadius:"50%",
                      border:`3px solid ${C.prp}`,
                      background:"#fff",color:C.prp,
                      cursor:"pointer",fontSize:22,fontWeight:700,
                      flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"
                    }}>✓</button>

                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,background:C.prpB,color:C.prp,padding:"2px 8px",borderRadius:10,fontWeight:700}}>🚧 פרויקט</span>
                        <span style={{fontSize:16,fontWeight:700,color:C.txt}}>{p.title}</span>
                      </div>
                      {(linkedClient || p.clientName) && (
                        <div style={{fontSize:13,color:C.txtM,marginBottom:3}}>
                          👤 {linkedClient ? linkedClient.name : p.clientName}
                          {cc && <span style={{fontSize:10,background:cc.bg,color:cc.text,padding:"1px 6px",borderRadius:8,marginRight:6}}>{p.city}</span>}
                        </div>
                      )}
                      {p.area && <div style={{fontSize:12,color:C.txtM}}>📍 {p.area}</div>}
                      <div style={{fontSize:11,color:C.txtL,marginTop:2}}>
                        {p.isRange ? `📆 ${fmtDM(p.startDate)}–${fmtDM(p.endDate)}` : `📅 ${fmtDM(p.startDate)}`}
                      </div>
                    </div>
                  </div>

                  {/* תיאור הפרויקט */}
                  {p.description && (
                    <div style={{marginTop:10,background:C.prpB,border:`1px solid ${C.prp}`,borderRight:`3px solid ${C.prp}`,borderRadius:8,padding:"10px 12px"}}>
                      <div style={{fontSize:10,color:C.prp,fontWeight:700,marginBottom:4}}>📝 פרטי הפרויקט</div>
                      <div style={{fontSize:14,color:C.txt,lineHeight:1.4,whiteSpace:"pre-wrap"}}>{p.description}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* עבודות חד-פעמיות להיום */}
        {oneTimeJobsToday.length > 0 && (
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.prp,fontWeight:700,marginBottom:6,padding:"0 4px"}}>🔨 עבודות חד-פעמיות להיום</div>
            {oneTimeJobsToday.map(j => {
              const cc = CITY_COLORS[j.city] || CITY_COLORS["ירושלים"];
              return (
                <div key={j.id} style={{background:C.card,borderRadius:12,border:`2px solid ${C.prp}`,padding:12,marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,background:C.prpB,color:C.prp,padding:"2px 8px",borderRadius:10,fontWeight:700}}>חד-פעמי</span>
                    <span style={{fontSize:16,fontWeight:700,color:C.txt}}>{j.clientName}</span>
                    <span style={{fontSize:10,background:cc.bg,color:cc.text,padding:"2px 8px",borderRadius:10,fontWeight:600}}>{j.city}</span>
                  </div>
                  {j.note && <div style={{fontSize:13,color:C.txt,background:C.prpB,padding:"8px 10px",borderRadius:6,marginTop:6}}>{j.note}</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* לקוחות ממתינים */}
        {pendingVisits.length > 0 && (
          <div style={{marginBottom:12}}>
            {pendingVisits.map(item => (
              <WorkerVisitCard
                key={item.id}
                item={item}
                dayKey={selectedDay}
                isExpanded={expandedVisit === item.id}
                onExpand={() => setExpandedVisit(expandedVisit === item.id ? null : item.id)}
                toggleVisitDone={toggleVisitDone}
                updateNewNote={updateNewNote}
                markLastNoteHandled={markLastNoteHandled}
                addExpense={addExpense}
                showExpenseForm={showExpenseForm === item.id}
                setShowExpenseForm={v => setShowExpenseForm(v ? item.id : null)}
              />
            ))}
          </div>
        )}

        {/* בוצעו - מכווץ כברירת מחדל */}
        {doneVisits.length > 0 && (
          <DoneSection
            doneVisits={doneVisits}
            dayKey={selectedDay}
            toggleVisitDone={toggleVisitDone}
          />
        )}

        {/* פוטר */}
        <div style={{textAlign:"center",fontSize:10,color:C.txtL,marginTop:20}}>
          🌳 תצוגת עובדים · המנהל רואה הכל
        </div>
      </div>
    </div>
  );
}

// כרטיס ביקור - לעובד
function WorkerVisitCard({ item, dayKey, isExpanded, onExpand, toggleVisitDone, updateNewNote, markLastNoteHandled, addExpense, showExpenseForm, setShowExpenseForm }) {
  const c = item.client;
  const cc = CITY_COLORS[c.city];
  const extrasTotal = (item.extras || []).reduce((s, e) => s + (e.amount || 0), 0);
  const hasLastNote = item.lastVisitNote && !item.lastVisitNoteHandled;
  const hasAnyImportant = c.permanentNote || hasLastNote || item.dayNote || (item.extras && item.extras.length > 0);

  return (
    <div style={{background:C.card,borderRadius:14,border:`2px solid ${hasLastNote ? C.org : cc.border}`,padding:12,marginBottom:10,boxShadow:hasLastNote ? "0 2px 6px rgba(224,159,62,0.15)" : "none"}}>
      {/* שורה ראשונה */}
      <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:hasAnyImportant ? 10 : 0}}>
        <button onClick={() => toggleVisitDone(dayKey, item.id)} style={{
          width:48,height:48,borderRadius:"50%",
          border:`3px solid ${C.bdr}`,
          background:"#fff",
          color:C.bdr,
          cursor:"pointer",fontSize:24,fontWeight:700,
          flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"
        }}>✓</button>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
            <span style={{fontSize:18,fontWeight:700,color:C.txt}}>{c.name}</span>
            <span style={{fontSize:10,background:cc.bg,color:cc.text,padding:"2px 8px",borderRadius:10,fontWeight:600}}>{c.city}</span>
          </div>
          <div style={{fontSize:12,color:C.txtM}}>
            {c.area && <span>📍 {c.area}</span>}
            {c.area && extrasTotal > 0 && <span> · </span>}
            {extrasTotal > 0 && <span style={{color:C.prp,fontWeight:600}}>+₪{extrasTotal} תוספות</span>}
          </div>
        </div>
      </div>

      {/* הערה מביקור קודם - הכי חשוב */}
      {hasLastNote && (
        <div style={{background:C.orgB,border:`2px solid ${C.org}`,borderRight:`4px solid ${C.org}`,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6,gap:8}}>
            <div style={{fontSize:11,color:C.org,fontWeight:700}}>⚠️ מביקור קודם - לטפל!</div>
            <button onClick={() => markLastNoteHandled(dayKey, item.id)} style={{background:C.org,color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>✓ טופל</button>
          </div>
          <div style={{fontSize:14,color:C.txt,lineHeight:1.4}}>{item.lastVisitNote}</div>
        </div>
      )}

      {/* הערה קבועה */}
      {c.permanentNote && (
        <div style={{background:C.bluB,border:`1px solid ${C.blu}`,borderRight:`3px solid ${C.blu}`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
          <div style={{fontSize:10,color:C.blu,fontWeight:700,marginBottom:4}}>📌 הערה קבועה</div>
          <div style={{fontSize:13,color:C.txt,lineHeight:1.4}}>{c.permanentNote}</div>
        </div>
      )}

      {/* הערת יום */}
      {item.dayNote && (
        <div style={{background:C.grnP,border:`1px solid ${C.grn}`,borderRight:`3px solid ${C.grn}`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
          <div style={{fontSize:10,color:C.grn,fontWeight:700,marginBottom:4}}>📝 הערת יום</div>
          <div style={{fontSize:13,color:C.txt,lineHeight:1.4}}>{item.dayNote}</div>
        </div>
      )}

      {/* תוספות */}
      {item.extras && item.extras.length > 0 && (
        <div style={{background:C.prpB,border:`1px solid ${C.prp}`,borderRight:`3px solid ${C.prp}`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
          <div style={{fontSize:10,color:C.prp,fontWeight:700,marginBottom:4}}>➕ תוספות לביקור</div>
          {item.extras.map(e => (
            <div key={e.id} style={{fontSize:13,color:C.txt,padding:"2px 0"}}>• {e.desc} <span style={{color:C.prp,fontWeight:600}}>(₪{e.amount})</span></div>
          ))}
        </div>
      )}

      {/* הערה לביקור הבא - אם כבר נכתבה */}
      {item.newNote && !isExpanded && (
        <div style={{background:"#e7f5e9",border:`1px solid ${C.hdrL}`,borderRight:`3px solid ${C.hdrL}`,borderRadius:8,padding:"8px 12px",marginBottom:8}}>
          <div style={{fontSize:10,color:C.hdrL,fontWeight:700,marginBottom:4}}>💬 נכתב לביקור הבא</div>
          <div style={{fontSize:13,color:C.txt,lineHeight:1.4}}>{item.newNote}</div>
        </div>
      )}

      {/* כפתורי פעולה גדולים - תמיד בולטים */}
      {!isExpanded && (
        <div style={{display:"flex",gap:6,marginTop:hasAnyImportant ? 6 : 4}}>
          <button
            onClick={onExpand}
            style={{
              flex:1,
              background:item.newNote ? C.hdrL : C.card,
              color:item.newNote ? "#fff" : C.hdr,
              border:`2px solid ${C.hdrL}`,
              borderRadius:10,
              padding:"12px",
              fontSize:14,
              fontWeight:700,
              cursor:"pointer",
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:6
            }}
          >
            <span style={{fontSize:18}}>💬</span>
            <span>{item.newNote ? "ערוך הערה" : "הוסף הערה"}</span>
          </button>
          <button
            onClick={() => { onExpand(); setShowExpenseForm(true); }}
            style={{
              background:C.redB,
              color:C.red,
              border:`2px solid ${C.red}`,
              borderRadius:10,
              padding:"12px 16px",
              fontSize:14,
              fontWeight:700,
              cursor:"pointer",
              whiteSpace:"nowrap"
            }}
          >
            💸 הוצאה
          </button>
        </div>
      )}

      {/* תצוגה מורחבת */}
      {isExpanded && (
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px dashed ${C.bdr}`}}>
          <WorkerNoteField
            value={item.newNote || ""}
            onSave={(val) => updateNewNote(dayKey, item.id, val)}
            onCancel={onExpand}
          />

          {/* הוספת הוצאה לביקור הזה */}
          {showExpenseForm ? (
            <WorkerExpenseForm
              defaultLink={{ linkType: "client_day", clientId: c.id, dayKey, clientName: c.name }}
              onSave={(exp) => { addExpense(exp); setShowExpenseForm(false); }}
              onCancel={() => setShowExpenseForm(false)}
            />
          ) : (
            <button onClick={() => setShowExpenseForm(true)} style={{width:"100%",marginTop:10,background:C.redB,color:C.red,border:`1px dashed ${C.red}`,borderRadius:8,padding:12,fontSize:13,fontWeight:600,cursor:"pointer"}}>
              💸 הוסף הוצאה לביקור
            </button>
          )}

          <button onClick={onExpand} style={{width:"100%",marginTop:8,background:"none",color:C.txtM,border:"none",padding:6,fontSize:11,cursor:"pointer"}}>סגור</button>
        </div>
      )}
    </div>
  );
}

// שדה הערה גדול לעובד (יותר ידידותי)
function WorkerNoteField({ value, onSave, onCancel }) {
  const [text, setText] = useState(value);
  const [saved, setSaved] = useState(false);

  useEffect(() => { setText(value); }, [value]);

  const save = () => {
    onSave(text);
    setSaved(true);
    setTimeout(() => setSaved(false), 1500);
  };

  return (
    <div style={{marginBottom:8}}>
      <div style={{fontSize:12,color:C.hdrL,fontWeight:700,marginBottom:6}}>💬 הערה לביקור הבא</div>
      <textarea
        value={text}
        onChange={e => setText(e.target.value)}
        placeholder="מה צריך לטפל בפעם הבאה? (למשל: להביא מזמרה, השקיה לא עובדת, לקוח ביקש...)"
        rows={4}
        style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`2px solid ${C.hdrL}`,fontSize:14,resize:"vertical",background:"#fff"}}
      />
      <button onClick={save} style={{width:"100%",marginTop:8,background:saved ? C.grn : C.hdrL,color:"#fff",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",transition:"background 0.2s"}}>
        {saved ? "✓ נשמר!" : "💾 שמור הערה"}
      </button>
    </div>
  );
}

// טופס הוצאה לעובד - גמיש לפי linkType
function WorkerExpenseForm({ defaultLink, data, selectedDay, allowChangeLink, onSave, onCancel }) {
  const [desc, setDesc] = useState("");
  const [amount, setAmount] = useState("");
  const [linkType, setLinkType] = useState(defaultLink?.linkType || "none");
  const [clientId, setClientId] = useState(defaultLink?.clientId || "");
  const [projectId, setProjectId] = useState(defaultLink?.projectId || "");
  const [date, setDate] = useState(defaultLink?.dayKey || iso(new Date()));
  const [photos, setPhotos] = useState([]); // [{id, data, name}]

  const cameraRef = React.useRef(null);
  const galleryRef = React.useRef(null);

  // העלאת תמונה - מצלמה או גלריה
  const handleFiles = (files) => {
    const remaining = 3 - photos.length;
    if (remaining <= 0) {
      alert("ניתן להעלות עד 3 תמונות בלבד");
      return;
    }
    const filesArr = Array.from(files).slice(0, remaining);

    filesArr.forEach(file => {
      // דחיסה ל-base64 בגודל סביר
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          // הגבלת ממדים מקסימליים: 1280px
          const MAX = 1280;
          let { width, height } = img;
          if (width > MAX || height > MAX) {
            if (width > height) {
              height = Math.round(height * MAX / width);
              width = MAX;
            } else {
              width = Math.round(width * MAX / height);
              height = MAX;
            }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          // שמירה כ-JPEG באיכות 80% - חיסכון משמעותי במקום
          const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
          setPhotos(prev => [...prev, { id: uid(), data: dataUrl, name: file.name }]);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

  const removePhoto = (id) => {
    setPhotos(prev => prev.filter(p => p.id !== id));
  };

  const save = () => {
    if (!desc.trim()) { alert("נא הכנס תיאור"); return; }
    if (!amount || Number(amount) <= 0) { alert("נא הכנס סכום"); return; }

    const exp = {
      desc: desc.trim(),
      amount,
      date,
      linkType,
      clientId: (linkType === "client" || linkType === "client_day") ? clientId : null,
      dayKey: linkType === "client_day" ? date : null,
      projectId: linkType === "project" ? projectId : null,
      photos,
      addedBy: IS_WORKER ? "worker" : "admin",
    };
    onSave(exp);
  };

  const projects = (data && data.projects ? data.projects : []).filter(p => p.status !== "done");
  const clients = (data && data.clients ? data.clients : []);

  return (
    <div style={{background:C.redB,border:`2px solid ${C.red}`,borderRadius:12,padding:12}}>
      <div style={{fontSize:13,color:C.red,fontWeight:700,marginBottom:8}}>💸 הוצאה חדשה</div>

      <input
        type="text"
        value={desc}
        onChange={e => setDesc(e.target.value)}
        placeholder="תיאור (דלק, דשן, חומרים...)"
        autoFocus
        style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff",marginBottom:8}}
      />

      <div style={{display:"grid",gridTemplateColumns:"1fr 1.3fr",gap:6,marginBottom:8}}>
        <input
          type="number"
          value={amount}
          onChange={e => setAmount(e.target.value)}
          placeholder="₪"
          style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}}
        />
        <input
          type="date"
          value={date}
          onChange={e => setDate(e.target.value)}
          style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,fontSize:14,background:"#fff"}}
        />
      </div>

      {/* תמונות - חשבוניות/תעודות משלוח */}
      <div style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:8,padding:10,marginBottom:8}}>
        <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>📸 חשבונית / תעודת משלוח (אופציונלי)</span>
          <span style={{fontSize:10,color:C.txtL}}>{photos.length}/3</span>
        </div>

        {/* תצוגת תמונות שהועלו */}
        {photos.length > 0 && (
          <div style={{display:"flex",gap:6,marginBottom:8,overflowX:"auto"}}>
            {photos.map(p => (
              <div key={p.id} style={{position:"relative",flexShrink:0}}>
                <img src={p.data} style={{width:70,height:70,objectFit:"cover",borderRadius:6,border:`1px solid ${C.bdr}`}} />
                <button onClick={() => removePhoto(p.id)} style={{position:"absolute",top:-6,right:-6,background:C.red,color:"#fff",border:"2px solid #fff",borderRadius:"50%",width:22,height:22,fontSize:14,cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        )}

        {/* כפתורי העלאה */}
        {photos.length < 3 && (
          <div style={{display:"flex",gap:6}}>
            <input
              ref={cameraRef}
              type="file"
              accept="image/*"
              capture="environment"
              onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }}
              style={{display:"none"}}
            />
            <input
              ref={galleryRef}
              type="file"
              accept="image/*"
              multiple
              onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }}
              style={{display:"none"}}
            />
            <button onClick={() => cameraRef.current?.click()} style={{flex:1,background:C.cardA,color:C.txt,border:`1px dashed ${C.bdr}`,borderRadius:6,padding:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>📷 צלם</button>
            <button onClick={() => galleryRef.current?.click()} style={{flex:1,background:C.cardA,color:C.txt,border:`1px dashed ${C.bdr}`,borderRadius:6,padding:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>🖼️ גלריה</button>
          </div>
        )}
      </div>

      {/* שיוך - רק אם מותר לשנות */}
      {allowChangeLink && (
        <div style={{background:"#fff",border:`1px solid ${C.bdr}`,borderRadius:8,padding:10,marginBottom:8}}>
          <div style={{fontSize:11,color:C.txtM,fontWeight:600,marginBottom:6}}>📎 שייך הוצאה (אופציונלי)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:6}}>
            <button onClick={() => setLinkType("none")} style={{padding:6,borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:linkType === "none" ? C.red : C.cardA,color:linkType === "none" ? "#fff" : C.txtM}}>בלי שיוך</button>
            <button onClick={() => setLinkType("client_day")} style={{padding:6,borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:linkType === "client_day" ? C.red : C.cardA,color:linkType === "client_day" ? "#fff" : C.txtM}}>לקוח+יום</button>
            <button onClick={() => setLinkType("client")} style={{padding:6,borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:linkType === "client" ? C.red : C.cardA,color:linkType === "client" ? "#fff" : C.txtM}}>לקוח</button>
            <button onClick={() => setLinkType("project")} style={{padding:6,borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:linkType === "project" ? C.red : C.cardA,color:linkType === "project" ? "#fff" : C.txtM}}>פרויקט</button>
          </div>

          {(linkType === "client" || linkType === "client_day") && (
            <select value={clientId} onChange={e => setClientId(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff"}}>
              <option value="">בחר לקוח...</option>
              {clients.map(c => <option key={c.id} value={c.id}>{c.name} ({c.city})</option>)}
            </select>
          )}

          {linkType === "project" && (
            <select value={projectId} onChange={e => setProjectId(e.target.value)} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,background:"#fff"}}>
              <option value="">בחר פרויקט...</option>
              {projects.map(p => <option key={p.id} value={p.id}>{p.title}</option>)}
            </select>
          )}
        </div>
      )}

      {/* תצוגת השיוך כשלא ניתן לשנות */}
      {!allowChangeLink && defaultLink?.clientName && (
        <div style={{fontSize:11,color:C.txtM,padding:"6px 8px",background:"#fff",borderRadius:6,marginBottom:8}}>
          📎 משויך אוטומטית ל: <strong>{defaultLink.clientName}</strong> ביום זה
        </div>
      )}

      <div style={{display:"flex",gap:6}}>
        <button onClick={save} style={{flex:1,background:C.red,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:14,fontWeight:700,cursor:"pointer"}}>💾 שמור הוצאה</button>
        <button onClick={onCancel} style={{flex:1,background:C.cardA,color:C.txtM,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"10px",fontSize:14,cursor:"pointer"}}>ביטול</button>
      </div>
    </div>
  );
}

// ONE TIME JOBS SECTION - עבודות חד-פעמיות

  const jobs = data.oneTimeJobs || [];
  const openJobs = jobs.filter(j => !j.done);
  const doneJobs = jobs.filter(j => j.done);
  const [showDone, setShowDone] = useState(false);

  return (
    <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.bdr}`,padding:14,marginTop:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:15,fontWeight:700,color:C.prp,display:"flex",alignItems:"center",gap:6}}>
          🔨 עבודות חד-פעמיות
          {openJobs.length > 0 && <span style={{background:C.prp,color:"#fff",padding:"2px 8px",borderRadius:10,fontSize:11}}>{openJobs.length}</span>}
        </div>
        <button onClick={() => setModal({type:"addOneTimeJob"})} style={{background:C.prp,color:"#fff",border:"none",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ עבודה חדשה</button>
      </div>

      {openJobs.length === 0 && doneJobs.length === 0 && (
        <div style={{textAlign:"center",color:C.txtL,fontSize:12,padding:"10px 0"}}>אין עבודות חד-פעמיות — עבודה כמו ניקוי חצר, שתילת עץ, נסיעה מיוחדת</div>
      )}

      {openJobs.map(j => (
        <OneTimeJobItem key={j.id} job={j} onToggle={() => toggleOneTimeJob(j.id)} onDelete={() => { if (confirm(`למחוק עבודה: ${j.clientName}?`)) deleteOneTimeJob(j.id); }} />
      ))}

      {doneJobs.length > 0 && (
        <div style={{marginTop:8,paddingTop:8,borderTop:`1px dashed ${C.bdr}`}}>
          <button onClick={() => setShowDone(!showDone)} style={{background:"none",border:"none",color:C.txtM,fontSize:11,cursor:"pointer",padding:0,marginBottom:6}}>
            {showDone ? "▼" : "◀"} בוצעו ({doneJobs.length})
          </button>
          {showDone && doneJobs.map(j => (
            <OneTimeJobItem key={j.id} job={j} onToggle={() => toggleOneTimeJob(j.id)} onDelete={() => { if (confirm(`למחוק עבודה: ${j.clientName}?`)) deleteOneTimeJob(j.id); }} />
          ))}
        </div>
      )}
    </div>
  );
}

  );
}
