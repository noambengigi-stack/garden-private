          {(()=>{
            // If searching - show flat results across all categories
            if(whSearch.trim()){
              return <div>
                <div style={{fontSize:12,color:C.txtM,marginBottom:8,textAlign:"right"}}>{filtered.length+" תוצאות עבור \""+whSearch+"\""}</div>
                {filtered.map(it=>{
                  const qty=getQty(it.id),thr=getThr(it.id);
                  const isLow=thr>0&&qty<=thr,isZero=qty===0;
                  return <div key={it.id} style={{background:isZero?"#fee":isLow?"#fff7ed":"#fff",borderRadius:8,padding:"9px 11px",marginBottom:4,border:"1px solid "+(isZero?C.red:isLow?C.org:C.bdr)}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:20,fontWeight:700,color:isZero?C.red:isLow?C.org:C.grn,minWidth:36,textAlign:"center"}}>{qty}</span>
                      <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                        <span style={{fontSize:14,fontWeight:600}}>{it.name}</span>
                        <div style={{fontSize:10,color:C.txtL}}>{catNames[it.category]||""}</div>
                      </div>
                    </div>
                  </div>;
                })}
                {filtered.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:30,fontSize:13}}>{"לא נמצאו תוצאות"}</div>}
              </div>;
            }

            // Category tabs
            const activeCat=form.whActiveCat||whCatOrder.find(c=>equipItems.some(it=>it.category===c))||"connectors";
            const activeSub=form.whActiveSub||"__all__";
            const catItems=equipItems.filter(it=>it.category===activeCat);
            // Subgroups of active category
            const subsMap={};
            catItems.forEach(it=>{const sg=it.subgroup||"כללי";if(!subsMap[sg])subsMap[sg]=[];subsMap[sg].push(it);});
            const subList=Object.keys(subsMap);
            // Items to show
            const shownItems=activeSub==="__all__"?catItems:catItems.filter(it=>(it.subgroup||"כללי")===activeSub);

            return <div>
              {/* Category tabs */}
              <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:4,marginBottom:8}}>
                {whCatOrder.map(cat=>{
                  const cnt=equipItems.filter(it=>it.category===cat).length;
                  if(cnt===0)return null;
                  const low=equipItems.filter(it=>{if(it.category!==cat)return false;const t=getThr(it.id);return t>0&&getQty(it.id)<=t;}).length;
                  const sel=activeCat===cat;
                  return <button key={cat} onClick={()=>setForm({...form,whActiveCat:cat,whActiveSub:"__all__"})} style={{flex:"0 0 auto",padding:"8px 12px",borderRadius:10,border:"none",background:sel?C.hdr:C.cardA,color:sel?"#fff":C.txt,fontSize:12,fontWeight:sel?700:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{catNames[cat]+(low>0?" ⚠️"+low:"")}</button>;
                })}
              </div>

              {/* Subgroup chips */}
              {subList.length>1 && <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10,paddingBottom:8,borderBottom:"1px solid "+C.bdr}}>
                <button onClick={()=>setForm({...form,whActiveSub:"__all__"})} style={{padding:"5px 11px",borderRadius:14,border:"1.5px solid "+(activeSub==="__all__"?C.hdr:C.bdr),background:activeSub==="__all__"?C.hdr:"#fff",color:activeSub==="__all__"?"#fff":C.txt,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"הכל ("+catItems.length+")"}</button>
                {subList.map(sg=>{
                  const sel=activeSub===sg;
                  const low=subsMap[sg].filter(it=>{const t=getThr(it.id);return t>0&&getQty(it.id)<=t;}).length;
                  return <button key={sg} onClick={()=>setForm({...form,whActiveSub:sg})} style={{padding:"5px 11px",borderRadius:14,border:"1.5px solid "+(sel?C.hdr:C.bdr),background:sel?C.hdr:"#fff",color:sel?"#fff":C.txt,fontSize:11,fontWeight:sel?700:500,cursor:"pointer",fontFamily:"inherit"}}>{sg+" ("+subsMap[sg].length+")"+(low>0?" ⚠️":"")}</button>;
                })}
              </div>}

              {/* Items list */}
              {shownItems.map(it=>{
                const qty=getQty(it.id);
                const thr=getThr(it.id);
                const isLow=thr>0 && qty<=thr;
                const isZero=qty===0;
                return <div key={it.id} style={{background:isZero?"#fee":isLow?"#fff7ed":"#fff",borderRadius:8,padding:"10px 12px",marginBottom:5,border:"1px solid "+(isZero?C.red:isLow?C.org:C.bdr)}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    {editMode ? <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <button onClick={()=>up(d=>{if(!d.warehouse)d.warehouse={};const c=(d.warehouse[it.id]||{}).qty||0;d.warehouse[it.id]={...(d.warehouse[it.id]||{}),qty:Math.max(0,c-1)};})} style={{width:26,height:26,borderRadius:"50%",border:"1px solid "+C.bdr,background:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"−"}</button>
                      <input type="number" value={qty} onChange={e=>up(d=>{if(!d.warehouse)d.warehouse={};d.warehouse[it.id]={...(d.warehouse[it.id]||{}),qty:Math.max(0,+e.target.value||0)};})} style={{width:48,padding:"4px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:14,fontWeight:700,textAlign:"center",fontFamily:"inherit"}}/>
                      <button onClick={()=>up(d=>{if(!d.warehouse)d.warehouse={};const c=(d.warehouse[it.id]||{}).qty||0;d.warehouse[it.id]={...(d.warehouse[it.id]||{}),qty:c+1};})} style={{width:26,height:26,borderRadius:"50%",border:"1px solid "+C.grn,background:C.grn,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"+"}</button>
                    </div> : <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:20,fontWeight:700,color:isZero?C.red:isLow?C.org:C.grn,minWidth:36,textAlign:"center"}}>{qty}</span>
                      {isZero && <span style={{fontSize:14}}>🔴</span>}
                      {!isZero && isLow && <span style={{fontSize:14}}>⚠️</span>}
                    </div>}
                    <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                      <span style={{fontSize:14,fontWeight:600}}>{it.name}</span>
                      {(wh[it.id]||{}).note && <div style={{fontSize:11,color:C.org,fontWeight:600,marginTop:2}}>{"📝 "+(wh[it.id]||{}).note}</div>}
                    </div>
                  </div>
                  {editMode && <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid "+C.bdr}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                      <input value={(wh[it.id]||{}).note||""} onChange={e=>up(d=>{if(!d.warehouse)d.warehouse={};d.warehouse[it.id]={...(d.warehouse[it.id]||{}),note:e.target.value};})} placeholder="כינוי / שם בשטח..." style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:12,fontFamily:"inherit",direction:"rtl"}}/>
                      <span style={{fontSize:11,color:C.txtM,whiteSpace:"nowrap"}}>{"📝 הערה:"}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                      <input type="number" value={thr||""} onChange={e=>up(d=>{if(!d.warehouse)d.warehouse={};d.warehouse[it.id]={...(d.warehouse[it.id]||{}),threshold:Math.max(0,+e.target.value||0)};})} placeholder="0" style={{width:48,padding:"4px",borderRadius:6,border:"1px solid "+C.bdr,fontSize:12,textAlign:"center",fontFamily:"inherit"}}/>
                      <span style={{fontSize:11,color:C.txtM,whiteSpace:"nowrap"}}>{"🔔 התראה כשמתחת ל:"}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                      <select value={it.category} onChange={e=>{const nc=e.target.value;up(d=>{const item=(d.inventory||[]).find(x=>x.id===it.id);if(item)item.category=nc;});}} style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+C.blu,fontSize:12,fontFamily:"inherit",direction:"rtl",color:C.blu,fontWeight:600}}>
                        {whCatOrder.map(c2=><option key={c2} value={c2}>{catNames[c2]}</option>)}
                      </select>
                      <span style={{fontSize:11,color:C.blu,whiteSpace:"nowrap"}}>{"📂 קטגוריה:"}</span>
                    </div>
                    {(()=>{
                      // Subgroups available in this item's category
                      const catSubs=[...new Set(equipItems.filter(x=>x.category===it.category).map(x=>x.subgroup||"כללי"))];
                      const cur=it.subgroup||"כללי";
                      if(!catSubs.includes(cur))catSubs.push(cur);
                      return <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                        <select value={cur} onChange={e=>{const ns=e.target.value;up(d=>{const item=(d.inventory||[]).find(x=>x.id===it.id);if(item)item.subgroup=ns;});}} style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1px solid "+C.purp,fontSize:12,fontFamily:"inherit",direction:"rtl",color:C.purp,fontWeight:600}}>
                          {catSubs.map(s2=><option key={s2} value={s2}>{s2}</option>)}
                        </select>
                        <span style={{fontSize:11,color:C.purp,whiteSpace:"nowrap"}}>{"🗂 תת-קבוצה:"}</span>
                      </div>;
                    })()}
                    {it.userAdded && <button onClick={()=>confirmDel(it.name,()=>up(d=>{d.inventory=(d.inventory||[]).filter(x=>x.id!==it.id);if(d.warehouse)delete d.warehouse[it.id];}))} style={{width:"100%",padding:"6px",borderRadius:6,border:"1px solid "+C.red,background:"#fff",color:C.red,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"🗑 מחק פריט"}</button>}
                  </div>}
                </div>;
              })}
              {shownItems.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:30,fontSize:13}}>{"אין פריטים"}</div>}
            </div>;
          })()}
        </div>
      </div></div>;
    }

    if(modal==="allOrders"){
      const getDestInfo=(pid,o)=>{
        if(pid==="__test__")return {label:"🧪 טסט / ניסיון",color:C.purp,icon:"🧪"};
        if(pid==="__free__")return {label:"✏️ "+(o&&o.note||"חופשי"),color:C.org,icon:"✏️"};
        const mSite=(data.maintenanceSites||[]).find(s=>s.id===pid);
        if(mSite)return {label:"🌳 "+mSite.name,color:C.blu,icon:"🌳",name:mSite.name};
        const dSite=(data.devSites||[]).find(s=>s.id===pid);
        if(dSite)return {label:"🌱 "+dSite.name,color:C.grn,icon:"🌱",name:dSite.name};
        return {label:"❓ "+sn(pid),color:C.txtM,icon:"❓"};
      };

      // Selected location to drill into
      const selectedPid=form.ordersSelectedPid||null;

      // ───── DETAIL VIEW (selected location) ─────
      if(selectedPid){
        const orders=(data.projectOrders||{})[selectedPid]||[];
        const sortedOrders=[...orders].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
        const di=getDestInfo(selectedPid,orders[0]);
        // Build summary by item desc
        const itemSummary={};
        orders.forEach(o=>{
          const key=(o.desc||"").trim();
          if(!key)return;
          if(!itemSummary[key])itemSummary[key]={count:0,totalAmount:0};
          itemSummary[key].count++;
          itemSummary[key].totalAmount+=(+o.amount||0);
        });
        const summaryItems=Object.entries(itemSummary).sort((a,b)=>b[1].count-a[1].count);
        const totalAmount=orders.reduce((s,o)=>s+(+o.amount||0),0);

        return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"92vh"}}>
          <div style={{background:di.color,color:"#fff",padding:"14px 18px",position:"sticky",top:0,borderRadius:"16px 16px 0 0",zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <button onClick={close} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:18,fontWeight:700}}>{di.label}</div>
                <div style={{fontSize:11,opacity:0.85}}>{orders.length+" הזמנות · ₪"+totalAmount.toLocaleString()}</div>
              </div>
            </div>
          </div>

          <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(92vh - 70px)"}}>
            <button onClick={()=>setForm({...form,ordersSelectedPid:null})} style={{padding:"7px 12px",borderRadius:8,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>{"← חזור לרשימת מקומות"}</button>

            {/* Summary - all items totaled */}
            {summaryItems.length>0 && <div style={{background:C.cardA,borderRadius:12,padding:12,marginBottom:14,border:"1px solid "+C.bdr}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:8,textAlign:"right",color:di.color}}>{"📊 סיכום כולל"}</div>
              {summaryItems.map(([name,info],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 8px",background:"#fff",borderRadius:6,marginBottom:4,border:"1px solid "+C.bdr}}>
                <div style={{fontSize:11,color:C.txtM}}>
                  <span style={{padding:"2px 6px",borderRadius:6,background:di.color+"22",color:di.color,fontWeight:700,marginInlineStart:4}}>{"×"+info.count}</span>
                  {info.totalAmount>0 && <span style={{fontWeight:700,color:C.txt}}>{"₪"+info.totalAmount.toLocaleString()}</span>}
                </div>
                <div style={{flex:1,textAlign:"right",fontSize:13,fontWeight:600}}>{name}</div>
              </div>)}
            </div>}

            {/* Orders timeline */}
            <div style={{fontSize:13,fontWeight:700,marginBottom:8,textAlign:"right",color:di.color}}>{"📅 היסטוריית הזמנות"}</div>
            {sortedOrders.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:20,fontSize:12}}>{"אין הזמנות"}</div>}
            {sortedOrders.map(o=>{
              const statusColors={ordered:{bg:"#fff3cd",bdr:C.org,clr:C.org,label:"📞 הוזמן"},onway:{bg:C.bluB,bdr:C.blu,clr:C.blu,label:"🚛 בדרך"},received:{bg:C.grnP,bdr:C.grn,clr:C.grn,label:"✅ התקבל"}};
              const sc=statusColors[o.status]||statusColors.ordered;
              return <div key={o.id} style={{background:"#fff",borderRadius:10,border:"1px solid "+C.bdr,padding:10,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <span style={{padding:"3px 8px",borderRadius:10,fontSize:10,fontWeight:700,background:sc.bg,color:sc.clr,border:"1px solid "+sc.bdr}}>{sc.label}</span>
                  <div style={{textAlign:"right",flex:1,marginInlineStart:8}}>
                    <div style={{fontSize:13,fontWeight:700}}>{o.desc}</div>
                    {o.date && <div style={{fontSize:11,color:C.txtM}}>{fmtFull(o.date)}</div>}
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:C.txtM,paddingTop:4}}>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {o.supplier && <span>{"🏪 "+o.supplier}</span>}
                    {o.amount>0 && <span style={{fontWeight:700,color:C.txt}}>{"₪"+(+o.amount).toLocaleString()}</span>}
                  </div>
                </div>
                {o.note && <div style={{fontSize:11,color:C.txtM,padding:"4px 8px",background:C.cardA,borderRadius:6,marginTop:4}}>{"📝 "+o.note}</div>}
                {/* Quick status update */}
                <div style={{display:"flex",gap:4,marginTop:6}}>
                  {["ordered","onway","received"].map(st=>{const _sc=statusColors[st];return <button key={st} onClick={()=>upOrderStatus(selectedPid,o.id,st)} style={{flex:1,padding:"5px 4px",borderRadius:6,border:"1px solid "+(o.status===st?_sc.bdr:C.bdr),background:o.status===st?_sc.bg:"#fff",color:o.status===st?_sc.clr:C.txtM,fontSize:10,fontWeight:o.status===st?700:500,cursor:"pointer",fontFamily:"inherit"}}>{_sc.label}</button>;})}
                </div>
                <div style={{display:"flex",gap:4,marginTop:5}}>
                  <button onClick={()=>{setForm({editOrderPid:selectedPid,editOrderOid:o.id,orderDesc:o.desc,orderSupplier:o.supplier,orderAmount:o.amount,orderStatus:o.status,orderNote:o.note});setModal("editOrder");}} style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid "+C.blu,background:"#fff",color:C.blu,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"✏️ ערוך"}</button>
                  <button onClick={()=>confirmDel(o.desc||"הזמנה זו",()=>delOrder(selectedPid,o.id))} style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid "+C.red,background:"#fff",color:C.red,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"🗑 מחק"}</button>
                </div>
              </div>;
            })}
          </div>
        </div></div>;
      }

      // ───── LIST VIEW (locations) ─────
      // Group orders by location
      const locations={};
      Object.keys(data.projectOrders||{}).forEach(pid=>{
        const orders=data.projectOrders[pid]||[];
        if(orders.length===0)return;
        const di=getDestInfo(pid,orders[0]);
        const totalAmount=orders.reduce((s,o)=>s+(+o.amount||0),0);
        const counts={ordered:0,onway:0,received:0};
        orders.forEach(o=>{counts[o.status||"ordered"]=(counts[o.status||"ordered"]||0)+1;});
        let lastDate="";
        orders.forEach(o=>{if(o.date && o.date>lastDate)lastDate=o.date;});
        locations[pid]={...di,pid,orderCount:orders.length,totalAmount,counts,lastDate};
      });
      // Filter by search
      let locArr=Object.values(locations);
      if(ordersSearch.trim()){
        const q=ordersSearch.trim().toLowerCase();
        locArr=locArr.filter(loc=>(loc.name||loc.label).toLowerCase().includes(q));
      }
      // Sort by most recent
      locArr.sort((a,b)=>(b.lastDate||"").localeCompare(a.lastDate||""));
      const totalAllOrders=Object.values(data.projectOrders||{}).reduce((s,arr)=>s+arr.length,0);
      const totalAllAmount=Object.values(data.projectOrders||{}).reduce((s,arr)=>s+arr.reduce((s2,o)=>s2+(+o.amount||0),0),0);

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"92vh"}}>
        <div style={{background:C.org,color:"#fff",padding:"14px 18px",position:"sticky",top:0,borderRadius:"16px 16px 0 0",zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={close} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:18,fontWeight:700}}>{"📦 הזמנות לפי מקום"}</div>
              <div style={{fontSize:11,opacity:0.85}}>{locArr.length+" מקומות · "+totalAllOrders+" הזמנות · ₪"+totalAllAmount.toLocaleString()}</div>
            </div>
          </div>
          {/* Search */}
          <input value={ordersSearch} onChange={e=>setOrdersSearch(e.target.value)} placeholder={"🔍 חפש מקום..."} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"none",fontSize:13,fontFamily:"inherit",direction:"rtl",outline:"none",boxSizing:"border-box"}}/>
        </div>

        <div style={{padding:"14px 16px",overflowY:"auto",maxHeight:"calc(92vh - 110px)"}}>
          <button onClick={()=>{setForm({bulkSupplier:"",bulkStatus:"ordered",bulkDate:todayISO,bulkNote:"",bulkItems:[],bulkStep:1});setModal("addBulkOrder");}} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:C.org,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>{"🛒 + הזמנה משולבת חדשה"}</button>

          {locArr.length===0 && <div style={{textAlign:"center",color:C.txtL,padding:30,fontSize:13}}>{ordersSearch?"לא נמצאו תוצאות":"אין הזמנות עדיין"}</div>}

          {locArr.map(loc=>{
            const daysSince=loc.lastDate?Math.floor((new Date(todayISO)-new Date(loc.lastDate))/(1000*60*60*24)):null;
            return <div key={loc.pid} onClick={()=>setForm({...form,ordersSelectedPid:loc.pid})} style={{background:"#fff",borderRadius:12,border:"2px solid "+loc.color,padding:14,marginBottom:10,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:18,color:loc.color}}>{"›"}</span>
                <div style={{textAlign:"right",flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:loc.color}}>{loc.label}</div>
                  {loc.lastDate && <div style={{fontSize:10,color:C.txtL,marginTop:2}}>{daysSince===0?"הזמנה אחרונה: היום":daysSince===1?"הזמנה אחרונה: אתמול":"הזמנה אחרונה: לפני "+daysSince+" ימים"}</div>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",fontSize:11}}>
                <span style={{padding:"3px 8px",borderRadius:10,background:loc.color+"22",color:loc.color,fontWeight:700}}>{loc.orderCount+" הזמנות"}</span>
                {loc.totalAmount>0 && <span style={{padding:"3px 8px",borderRadius:10,background:C.cardA,color:C.txt,fontWeight:700}}>{"₪"+loc.totalAmount.toLocaleString()}</span>}
                {loc.counts.ordered>0 && <span style={{padding:"3px 8px",borderRadius:10,background:"#fff3cd",color:C.org,fontWeight:600}}>{"📞 "+loc.counts.ordered}</span>}
                {loc.counts.onway>0 && <span style={{padding:"3px 8px",borderRadius:10,background:C.bluB,color:C.blu,fontWeight:600}}>{"🚛 "+loc.counts.onway}</span>}
                {loc.counts.received>0 && <span style={{padding:"3px 8px",borderRadius:10,background:C.grnP,color:C.grn,fontWeight:600}}>{"✅ "+loc.counts.received}</span>}
              </div>
            </div>;
          })}
        </div>
      </div></div>;
    }

    // ─── ADD BILLING EXTRA ───
    if(modal==="addBillingExtra")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.org,marginBottom:14,textAlign:"center"}}>{"💰 תוספת לחיוב"}</h3>
      <div style={{marginBottom:10}}><label style={lb}>{"לקוח / אתר"}</label>
        <select value={form.extraSiteId||""} onChange={e=>setForm({...form,extraSiteId:e.target.value})} style={inp}>
          <option value="">{"-- בחר --"}</option>{allSites.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
      </div>
      <div style={{marginBottom:10}}><label style={lb}>{"סכום (₪)"}</label><input type="number" value={form.extraAmount||""} onChange={e=>setForm({...form,extraAmount:e.target.value})} style={inp}/></div>
      <div style={{marginBottom:10}}><label style={lb}>{"תיאור"}</label><input value={form.extraDesc||""} onChange={e=>setForm({...form,extraDesc:e.target.value})} placeholder={"דשן נוסף, שתילי בוקסוס..."} style={inp}/></div>
      <div style={{marginBottom:14}}><label style={lb}>{"תאריך"}</label><input type="date" value={form.extraDate||todayISO} onChange={e=>setForm({...form,extraDate:e.target.value})} style={inp}/></div>
      <button onClick={addBillingExtra} style={{...sb,background:C.org}}>{"הוסף תוספת"}</button>
    </div></div>;

    // ─── SITE DETAIL ───
    if(modal==="siteDetail"){
      const site=allSites.find(s=>s.id===form.siteId);
      if(!site)return null;
      const isDev=site.type==="d";
      const accent=isDev?C.blu:C.org;
      const accentBg=isDev?C.bluB:C.orgB;
      const siteTasks=[];
      Object.keys(data.dailyTasks||{}).forEach(d=>{(data.dailyTasks[d]||[]).forEach(t=>{if(t.siteId===site.id)siteTasks.push({...t,date:d});});});
      siteTasks.sort((a,b)=>b.date.localeCompare(a.date));
      const sitePhotos=(data.photos?.[site.id]||[]).slice().reverse();
      const siteOrders=(data.projectOrders?.[site.id]||[]);
      const siteExtras=(data.billingExtras||[]).filter(e=>e.siteId===site.id);
      const siteInvoices=(data.invoices||[]).filter(iv=>iv.siteId===site.id);
      const siteMeetings=(data.meetings||[]).filter(m=>m.siteId===site.id).sort((a,b)=>b.date.localeCompare(a.date));
      const nextNotes=(data.nextVisitNotes?.[site.id]||[]);
      const billPending=siteTasks.filter(t=>t.billable==="ready").length;
      const billInvoiced=siteTasks.filter(t=>t.billable==="invoiced").length;
      const updateSite=(patch)=>{up(d=>{const arr=isDev?"devSites":"maintenanceSites";const idx=d[arr].findIndex(x=>x.id===site.id);if(idx>=0)d[arr][idx]={...d[arr][idx],...patch};});};

      const detailTabs=[
        {key:"overview",label:"סקירה",icon:"📊"},
        {key:"photos",label:"גלריה",icon:"📷"},
        {key:"edit",label:"עריכה",icon:"⚙️"},
      ];

      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:560,width:"100%",padding:0,maxHeight:"92vh"}}>
        {/* Sticky header */}
        <div style={{background:accent,color:"#fff",padding:"14px 18px",position:"sticky",top:0,borderRadius:"16px 16px 0 0",zIndex:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button onClick={close} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"×"}</button>
            <div style={{textAlign:"right",flex:1,marginInlineEnd:8}}>
              <div style={{fontSize:11,opacity:0.85}}>{isDev?"🌱 פרויקט":"🔧 תחזוקה"}</div>
              <div style={{fontSize:18,fontWeight:700}}>{site.name}</div>
            </div>
            <button onClick={()=>setSiteDetailTab("edit")} title="עריכה מהירה" style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>{"✏️"}</button>
          </div>
          {/* Sub tabs */}
          <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2}}>
            {detailTabs.map(t=><button key={t.key} onClick={()=>setSiteDetailTab(t.key)} style={{flex:"0 0 auto",padding:"6px 10px",borderRadius:14,border:"none",background:siteDetailTab===t.key?"rgba(255,255,255,0.3)":"rgba(255,255,255,0.1)",color:"#fff",fontSize:11,fontWeight:siteDetailTab===t.key?700:400,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.icon+" "+t.label}</button>)}
          </div>
        </div>

        <div style={{padding:"16px 18px",overflowY:"auto",maxHeight:"calc(92vh - 110px)"}}>
          {/* OVERVIEW - all info in one scroll */}
          {siteDetailTab==="overview" && <div>
            {(()=>{
              const dailyLogs=data.dailyLogs||{};
              const openTasks=siteTasks.filter(t=>t.status!=="done");

              // Find oldest open task
              let oldestOpenDate=null;
              openTasks.forEach(t=>{
                const d=t.date||t.createdAt||"";
                if(d && (!oldestOpenDate||d<oldestOpenDate))oldestOpenDate=d;
              });
              const daysSinceOldest=oldestOpenDate?Math.floor((new Date(todayISO)-new Date(oldestOpenDate))/(1000*60*60*24)):0;

              // Last visit
              let lastVisitDate=null;
              Object.keys(dailyLogs).sort().reverse().forEach(dateKey=>{
                if(lastVisitDate)return;
                const dayLog=dailyLogs[dateKey]||{};
                if(dayLog[site.id])lastVisitDate=dateKey;
              });
              const daysSinceLastVisit=lastVisitDate?Math.floor((new Date(todayISO)-new Date(lastVisitDate))/(1000*60*60*24)):null;

              // Active reminders
              const activeReminders=[];
              Object.keys(dailyLogs).sort().reverse().forEach(dateKey=>{
                const dayLog=dailyLogs[dateKey]||{};
                const siteLog=dayLog[site.id];
                if(siteLog && Array.isArray(siteLog.reminders)){
                  siteLog.reminders.forEach(r=>{
                    if(r && r.text && !r.done)activeReminders.push({date:dateKey,text:r.text,key:dateKey+"_"+r.text});
                  });
                }
              });

              // Timeline
              const timeline=[];
              Object.keys(dailyLogs).sort().reverse().forEach(dateKey=>{
                const dayLog=dailyLogs[dateKey]||{};
                const siteLog=dayLog[site.id];
                if(siteLog && (siteLog.summary||(siteLog.extras||[]).length>0)){
                  timeline.push({date:dateKey,summary:siteLog.summary||"",extras:siteLog.extras||[]});
                }
              });

              const markReminderDone=(date,text)=>{
                up(d=>{
                  if(!d.dailyLogs||!d.dailyLogs[date]||!d.dailyLogs[date][site.id])return;
                  const rems=d.dailyLogs[date][site.id].reminders||[];
                  const idx=rems.findIndex(r=>r && r.text===text);
                  if(idx>=0)rems[idx]={...rems[idx],done:true};
                });
              };

              const unbilledExtras=siteExtras.filter(e=>!e.invoiced);

              return <div>
                {/* CONTACT BLOCK - prominent */}
                <div style={{background:accentBg,borderRadius:12,padding:14,marginBottom:14,border:"1px solid "+accent}}>
                  {site.client && <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>{"👤 "+site.client}</div>}
                  {site.phone && <div style={{marginBottom:6}}>
                    <a href={"tel:"+site.phone} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#fff",borderRadius:8,textDecoration:"none",border:"1px solid "+accent}}>
                      <span style={{fontSize:18}}>{"📞"}</span>
                      <span style={{flex:1,textAlign:"right",fontSize:15,fontWeight:700,color:accent,direction:"ltr"}}>{site.phone}</span>
                      <span style={{fontSize:11,color:C.txtM}}>{"לחץ להתקשרות"}</span>
                    </a>
                  </div>}
                  {site.address && <div style={{marginBottom:6}}>
                    <a href={"https://waze.com/ul?q="+encodeURIComponent(site.address)} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#fff",borderRadius:8,textDecoration:"none",border:"1px solid "+accent}}>
                      <span style={{fontSize:18}}>{"📍"}</span>
                      <span style={{flex:1,textAlign:"right",fontSize:13,color:C.txt}}>{site.address}</span>
                      <span style={{fontSize:11,color:C.txtM}}>{"ניווט"}</span>
                    </a>
                  </div>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,marginTop:8,color:C.txtM}}>
                    {lastVisitDate?<span>{"🗓 ביקור אחרון: "+(daysSinceLastVisit===0?"היום":daysSinceLastVisit===1?"אתמול":"לפני "+daysSinceLastVisit+" ימים")}</span>:<span>{"🗓 אין ביקורים מתועדים"}</span>}
                    <span>{isDev?(site.deadline?"📅 יעד: "+site.deadline:"🌱 פרויקט"):"🔄 "+(site.frequency||"")}</span>
                  </div>
                </div>

                {/* ALERT: open tasks */}
                {openTasks.length>0 && <div style={{background:daysSinceOldest>30?"#fee":daysSinceOldest>14?"#fff7ed":C.cardA,border:"2px solid "+(daysSinceOldest>30?C.red:daysSinceOldest>14?C.org:C.bdr),borderRadius:12,padding:12,marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:openTasks.length>0?8:0}}>
                    <span style={{fontSize:18,fontWeight:700,color:daysSinceOldest>30?C.red:daysSinceOldest>14?C.org:C.txt}}>{openTasks.length}</span>
                    <div style={{textAlign:"right",flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{"📋 משימות פתוחות"}</div>
                      {daysSinceOldest>14 && <div style={{fontSize:10,color:daysSinceOldest>30?C.red:C.org,marginTop:1}}>{"⚠️ הוותיקה: לפני "+daysSinceOldest+" ימים"}</div>}
                    </div>
                  </div>
                  {/* List the open tasks */}
                  <div style={{marginTop:6}}>
                    {openTasks.slice(0,5).map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 7px",background:"#fff",borderRadius:6,marginBottom:3,border:"1px solid "+C.bdr}}>
                      <button onClick={()=>{up(d=>{const dy2=t.date||todayISO;if(!d.dailyTasks)d.dailyTasks={};const dt=d.dailyTasks[dy2]||[];const idx=dt.findIndex(x=>x.id===t.id);if(idx>=0)dt[idx].status="done";});}} style={{background:"none",border:"1.5px solid "+C.grn,color:C.grn,fontSize:11,cursor:"pointer",padding:"2px 6px",borderRadius:5,fontFamily:"inherit",fontWeight:700}}>{"✓"}</button>
                      <div style={{flex:1,fontSize:12,color:C.txt,textAlign:"right"}}>{t.notes||"(ללא תיאור)"}</div>
                      {t.date && <span style={{fontSize:9,color:C.txtL}}>{t.date}</span>}
                    </div>)}
                    {openTasks.length>5 && <div style={{fontSize:10,color:C.txtM,textAlign:"center",marginTop:4}}>{"+ עוד "+(openTasks.length-5)+" משימות"}</div>}
                  </div>
                </div>}

                {/* ACTIVE REMINDERS */}
                {activeReminders.length>0 && <div style={{background:C.bluB,borderRadius:12,padding:12,marginBottom:12,border:"2px solid "+C.blu}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.blu,marginBottom:8,textAlign:"right"}}>{"🔔 תזכורות לביקור הבא ("+activeReminders.length+")"}</div>
                  {activeReminders.map(rem=><div key={rem.key} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 8px",background:"#fff",borderRadius:8,marginBottom:5,border:"1px solid "+C.blu}}>
                    <button onClick={()=>markReminderDone(rem.date,rem.text)} style={{background:C.grn,border:"none",color:"#fff",fontSize:11,cursor:"pointer",padding:"3px 8px",borderRadius:6,fontFamily:"inherit",fontWeight:700}}>{"✓"}</button>
                    <div style={{flex:1,textAlign:"right"}}>
                      <div style={{fontSize:13,color:C.txt}}>{rem.text}</div>
                      <div style={{fontSize:9,color:C.txtL}}>{"מ: "+fmtFull(new Date(rem.date))}</div>
                    </div>
                  </div>)}
                </div>}

                {/* BILLING SECTION */}
                {(unbilledExtras.length>0||billInvoiced>0) && <div style={{background:"#fff7ed",borderRadius:12,padding:12,marginBottom:12,border:"1px solid "+C.org}}>

          <label style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px",borderRadius:10,border:"2px dashed "+C.bdr,background:C.cardA,color:C.txtM,fontSize:12,cursor:"pointer",fontWeight:600}}>
            <span style={{fontSize:16}}>📷</span>{"מצלמה"}
            <input type="file" accept="image/*" capture="environment" onChange={handleAnyImg(img=>setForm(p=>({...p,image:img})))} style={{display:"none"}}/>
          </label>
          <label style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px",borderRadius:10,border:"2px dashed "+C.bdr,background:C.cardA,color:C.txtM,fontSize:12,cursor:"pointer",fontWeight:600}}>
            <span style={{fontSize:16}}>🖼️</span>{"גלריה"}
            <input type="file" accept="image/*" onChange={handleAnyImg(img=>setForm(p=>({...p,image:img})))} style={{display:"none"}}/>
          </label>
        </div>}
      </div>
      <button onClick={editReminder} style={{...sb,background:C.blu}}>{"שמור שינויים"}</button>
    </div></div>;

    // ─── PHOTO MENU (camera or gallery view) ───
    if(modal==="photoMenu")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.hdr,marginBottom:14,textAlign:"center"}}>{"📷 תמונות"}</h3>
      <button onClick={()=>{setExpImg(null);setExpStep(0);setForm({});setModal("quickPhoto");}} style={{width:"100%",padding:16,borderRadius:12,border:"none",background:C.hdr,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:22}}>📷</span>{"תמונת עבודה / אתר"}
      </button>
      <button onClick={()=>{setForm({invImg:"",invSiteId:"",invSupplier:"",invAmount:"",invDate:todayISO,invNote:"",invItems:"",invReading:false});setModal("invoiceCapture");}} style={{width:"100%",padding:16,borderRadius:12,border:"none",background:C.org,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:22}}>📄</span>{"חשבונית / תעודת משלוח"}
      </button>
      <button onClick={()=>{setModal(null);setView("gallery");}} style={{width:"100%",padding:16,borderRadius:12,border:"2px solid "+C.hdr,background:"#fff",color:C.hdr,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:22}}>🖼️</span>{"פתח גלריה ("+getAllPhotos(data).length+" תמונות)"}
      </button>
    </div></div>;

    // ─── INVOICE CAPTURE ───
    if(modal==="invoiceCapture"){
      const allSites=[...(data.maintenanceSites||[]).map(s=>({...s,_m:true})),...(data.devSites||[]).filter(s=>s.status!=="done").map(s=>({...s,_m:false}))];
      const canSave=form.invImg && form.invSiteId;
      const doSaveInvoice=()=>{
        if(!canSave)return;
        up(d=>{
          if(!d.invoices)d.invoices=[];
          d.invoices.push({
            id:uid(),
            img:form.invImg,
            siteId:form.invSiteId,
            supplier:form.invSupplier||"",
            amount:+form.invAmount||0,
            date:form.invDate||todayISO,
            items:form.invItems||"",
            note:form.invNote||"",
            createdAt:todayISO
          });
        });
        setModal(null);setForm({});
      };
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:480,maxHeight:"95vh",overflowY:"auto"}}>
        <h3 style={{fontSize:18,color:C.org,marginBottom:14,textAlign:"center"}}>{"📄 חשבונית / תעודת משלוח"}</h3>

        {/* Step 1: photo */}
        {!form.invImg ? <div>
          <label style={{display:"block",width:"100%",padding:"30px 16px",borderRadius:12,border:"2px dashed "+C.org,background:"#fff7ed",textAlign:"center",cursor:"pointer",marginBottom:8}}>
            <div style={{fontSize:40,marginBottom:8}}>{"📷"}</div>
            <div style={{fontSize:15,fontWeight:700,color:C.org}}>{"צלם את החשבונית"}</div>
            <div style={{fontSize:11,color:C.txtM,marginTop:4}}>{"לחץ כאן לפתיחת המצלמה"}</div>
            <input type="file" accept="image/*" capture="environment" onChange={handleAnyImg(img=>{setForm(p=>({...p,invImg:img}));readInvoice(img);})} style={{display:"none"}}/>
          </label>
          <label style={{display:"block",width:"100%",padding:"10px",borderRadius:8,border:"1px solid "+C.bdr,textAlign:"center",cursor:"pointer",fontSize:12,color:C.txtM}}>
            {"🖼️ או בחר תמונה מהגלריה"}
            <input type="file" accept="image/*" onChange={handleAnyImg(img=>{setForm(p=>({...p,invImg:img}));readInvoice(img);})} style={{display:"none"}}/>
          </label>
        </div> : <div>
          {/* Image preview */}
          <div style={{position:"relative",marginBottom:12}}>
            <img src={form.invImg} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover"}} alt=""/>
            <button onClick={()=>setForm(p=>({...p,invImg:"",invSupplier:"",invAmount:"",invItems:"",invError:""}))} style={{position:"absolute",top:6,insetInlineStart:6,background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>{"🔄"}</button>
          </div>

          {/* AI reading status */}
          {form.invReading && <div style={{background:C.bluB,borderRadius:8,padding:"10px 12px",marginBottom:12,textAlign:"center",fontSize:13,color:C.blu,fontWeight:700}}>{"🤖 קורא את החשבונית..."}</div>}
          {form.invError && <div style={{background:"#fff3cd",borderRadius:8,padding:"8px 12px",marginBottom:12,textAlign:"center",fontSize:12,color:C.org}}>{"⚠️ "+form.invError}</div>}
          {!form.invReading && !form.invError && (form.invSupplier||form.invAmount) && <div style={{background:C.grnP,borderRadius:8,padding:"8px 12px",marginBottom:12,textAlign:"center",fontSize:12,color:C.grn,fontWeight:700}}>{"✓ הפרטים מולאו אוטומטית - בדוק ותקן אם צריך"}</div>}

          {/* Site selector - REQUIRED */}
          <label style={{...lb,color:C.org}}>{"🏠 שייך לאתר (חובה)"}</label>
          <select value={form.invSiteId||""} onChange={e=>setForm(p=>({...p,invSiteId:e.target.value}))} style={{...inp,marginBottom:12,border:"1.5px solid "+(form.invSiteId?C.bdr:C.org)}}>
            <option value="">{"-- בחר אתר --"}</option>
            {allSites.map(s=><option key={s.id} value={s.id}>{(s._m?"🔧 ":"🌱 ")+s.name}</option>)}
          </select>

          {/* Editable fields */}
          <label style={lb}>{"🏪 ספק"}</label>
          <input value={form.invSupplier||""} onChange={e=>setForm(p=>({...p,invSupplier:e.target.value}))} placeholder="שם הספק" style={{...inp,marginBottom:10}}/>

          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1}}>
              <label style={lb}>{"💰 סכום"}</label>
              <input type="number" value={form.invAmount||""} onChange={e=>setForm(p=>({...p,invAmount:e.target.value}))} placeholder="₪" style={inp}/>
            </div>
            <div style={{flex:1}}>
              <label style={lb}>{"📅 תאריך"}</label>
              <input type="date" value={form.invDate||todayISO} onChange={e=>setForm(p=>({...p,invDate:e.target.value}))} style={inp}/>
            </div>
          </div>

          <label style={lb}>{"📦 פריטים"}</label>
          <textarea value={form.invItems||""} onChange={e=>setForm(p=>({...p,invItems:e.target.value}))} placeholder="מה נכלל בחשבונית" style={{...inp,minHeight:50,marginBottom:10}}/>

          <label style={lb}>{"📝 הערה"}</label>
          <input value={form.invNote||""} onChange={e=>setForm(p=>({...p,invNote:e.target.value}))} placeholder="הערה חופשית (לא חובה)" style={{...inp,marginBottom:14}}/>

          <button onClick={doSaveInvoice} disabled={!canSave} style={{...sb,background:canSave?C.org:C.bdr,opacity:canSave?1:0.5,cursor:canSave?"pointer":"not-allowed"}}>{canSave?"✓ שמור חשבונית":"בחר אתר כדי לשמור"}</button>
        </div>}
      </div></div>;
    }

    // ─── BILLING FORM ───
    if(modal==="billingForm")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:18,color:C.org,marginBottom:14,textAlign:"center"}}>{"💰 שלח לחיוב"}</h3>
      <div style={{marginBottom:14}}>
        <label style={lb}>{"תוספות / שינויים"}</label>
        <textarea value={form.extras||""} onChange={e=>setForm({...form,extras:e.target.value})} placeholder={"לדוגמה: הוספנו שתילים..."} style={{...inp,minHeight:100}}/>
      </div>
      <button onClick={()=>{markBillable(form.taskDay,form.taskId,form.extras||"");setModal(null);setForm({});}} style={{...sb,background:C.org}}>{"שלח לחיוב"}</button>
    </div></div>;

    // ─── QUICK PHOTO ───
    if(modal==="quickPhoto")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      {expStep===0 && <div>
        <div style={{fontSize:18,fontWeight:700,textAlign:"center",marginBottom:16,color:C.hdr}}>{"📷 הוסף תמונה"}</div>

        {/* Type selector */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          <button onClick={()=>setForm(p=>({...p,photoType:""}))} style={{flex:1,padding:"10px",borderRadius:8,border:"2px solid "+(!form.photoType?C.hdr:C.bdr),background:!form.photoType?C.grnP:"#fff",color:!form.photoType?C.hdr:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"רגילה"}</button>
          <button onClick={()=>setForm(p=>({...p,photoType:"before"}))} style={{flex:1,padding:"10px",borderRadius:8,border:"2px solid "+(form.photoType==="before"?C.org:C.bdr),background:form.photoType==="before"?"#fff3cd":"#fff",color:form.photoType==="before"?C.org:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"לפני"}</button>
          <button onClick={()=>setForm(p=>({...p,photoType:"after"}))} style={{flex:1,padding:"10px",borderRadius:8,border:"2px solid "+(form.photoType==="after"?C.grn:C.bdr),background:form.photoType==="after"?C.grnP:"#fff",color:form.photoType==="after"?C.grn:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"אחרי"}</button>
        </div>

        {/* Camera or Gallery */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"20px",borderRadius:14,border:"3px dashed "+C.hdr,background:C.grnP,color:C.hdr,fontSize:16,cursor:"pointer",fontWeight:700}}>
            <span style={{fontSize:36}}>📷</span>{"צלם עכשיו"}
            <input type="file" accept="image/*" capture="environment" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setExpImg(ev.target.result);setExpStep(1);};r.readAsDataURL(f);}} style={{display:"none"}}/>
          </label>
          <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"20px",borderRadius:14,border:"3px dashed "+C.blu,background:C.bluB,color:C.blu,fontSize:16,cursor:"pointer",fontWeight:700}}>
            <span style={{fontSize:36}}>🖼️</span>{"בחר מהגלריה"}
            <input type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setExpImg(ev.target.result);setExpStep(1);};r.readAsDataURL(f);}} style={{display:"none"}}/>
          </label>
        </div>
      </div>}

      {expStep===1 && <div>
        <div style={{fontSize:16,fontWeight:700,textAlign:"center",marginBottom:10,color:C.hdr}}>{"לאיזה אתר לשייך?"}</div>
        {expImg && <img src={expImg} style={{width:"100%",borderRadius:10,marginBottom:12,maxHeight:160,objectFit:"cover"}} alt=""/>}
        <input value={form.photoNote||""} onChange={e=>setForm({...form,photoNote:e.target.value})} placeholder={"הערה (לא חובה)"} style={{...inp,marginBottom:10}}/>
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"40vh",overflowY:"auto"}}>
          {form.siteId ? <button onClick={()=>{savePhoto(form.siteId,form.photoType,form.photoNote,expImg);setExpImg(null);setExpStep(0);setForm({});setModal(null);}} style={{width:"100%",padding:"14px",borderRadius:10,border:"2px solid "+C.grn,background:C.grnP,color:C.grn,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"✓ שמור עבור "+sn(form.siteId)}</button> : <React.Fragment>
            {allSites.map(s=><button key={s.id} onClick={()=>{savePhoto(s.id,form.photoType,form.photoNote,expImg);setExpImg(null);setExpStep(0);setForm({});setModal(null);}} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid "+C.bdr,background:C.wht,color:C.txt,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"right"}}>
              {(s.type==="m"?"🔧 ":"🌱 ")+s.name}
            </button>)}
            <button onClick={()=>{savePhoto("",form.photoType,form.photoNote,expImg);setExpImg(null);setExpStep(0);setForm({});setModal(null);}} style={{width:"100%",padding:"12px",borderRadius:10,border:"2px dashed "+C.bdr,background:C.cardA,color:C.txtM,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"📁 כללי (ללא שיוך)"}</button>
          </React.Fragment>}
        </div>
      </div>}
    </div></div>;

    // ─── QUICK SUB ───
    if(modal==="quickSub"){
      const dates=form.subDates||[todayISO];
      const addDate=()=>setForm(p=>({...p,subDates:[...(p.subDates||[]),todayISO]}));
      const updateDate=(i,val)=>setForm(p=>{const arr=[...(p.subDates||[])];arr[i]=val;return {...p,subDates:arr};});
      const removeDate=(i)=>setForm(p=>{const arr=[...(p.subDates||[])];arr.splice(i,1);return {...p,subDates:arr.length?arr:[todayISO]};});
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:500}}>
        <h3 style={{fontSize:18,color:C.blu,marginBottom:4,textAlign:"center"}}>{"🔨 קבלן משנה"}</h3>
        <div style={{marginBottom:12}}><label style={lb}>{"שם"}</label><input value={form.subName||""} onChange={e=>setForm({...form,subName:e.target.value})} style={inp} autoFocus/></div>
        <div style={{marginBottom:12}}><label style={lb}>{"אתר"}</label>
          <select value={form.subSiteId||""} onChange={e=>setForm({...form,subSiteId:e.target.value})} style={inp}>
            <option value="">{"בחר..."}</option>
            <optgroup label="פרויקטים">{(data.devSites||[]).map(s=><option key={s.id} value={s.id}>{"🌱 "+s.name}</option>)}</optgroup>
            <optgroup label="תחזוקות">{(data.maintenanceSites||[]).map(s=><option key={s.id} value={s.id}>{"🔧 "+s.name}</option>)}</optgroup>
            <option value="__new__">{"➕ פרויקט חדש"}</option>
          </select>
        </div>
        {form.subSiteId==="__new__" && <div style={{marginBottom:12}}><input value={form.subNewSite||""} onChange={e=>setForm({...form,subNewSite:e.target.value})} placeholder={"שם פרויקט"} style={inp}/></div>}
        <div style={{marginBottom:14}}><label style={lb}>{"ימי עבודה"}</label>
          {dates.map((d,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
            <input type="date" value={d} onChange={e=>updateDate(i,e.target.value)} style={{...inp,flex:1}}/>
            {dates.length>1 && <button onClick={()=>removeDate(i)} style={{background:"none",border:"none",color:C.red,fontSize:18,cursor:"pointer",padding:4}}>{"✕"}</button>}
          </div>)}
          <button onClick={addDate} style={{padding:"6px 12px",borderRadius:8,border:"1px dashed "+C.bdr,background:C.cardA,color:C.txtM,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"+ יום נוסף"}</button>
        </div>
        <button onClick={quickAddSub} style={{...sb,background:C.blu}}>{"שבץ"}</button>
      </div></div>;
    }

    // ─── COMPLETE SUB ───
    if(modal==="completeSub"){
      const sub=(data.subContracts||[]).find(s=>s.id===form.subId);
      if(!sub)return null;
      const adjustCount=(n)=>setForm(p=>({...p,subWorkerCount:Math.max(1,(p.subWorkerCount||1)+n)}));
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={{...bx,maxWidth:500}}>
        <h3 style={{fontSize:18,color:C.blu,marginBottom:14,textAlign:"center"}}>{"✓ פרטי ביצוע"}</h3>
        <div style={{marginBottom:12}}>
          <label style={lb}>{"כמה עובדים"}</label>
          <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center"}}>
            <button onClick={()=>adjustCount(-1)} style={{width:36,height:36,borderRadius:"50%",border:"1px solid "+C.bdr,background:C.wht,fontSize:18,cursor:"pointer",fontWeight:700}}>−</button>
            <span style={{fontSize:22,fontWeight:700,minWidth:40,textAlign:"center"}}>{form.subWorkerCount||1}</span>
            <button onClick={()=>adjustCount(1)} style={{width:36,height:36,borderRadius:"50%",border:"1px solid "+C.bdr,background:C.wht,fontSize:18,cursor:"pointer",fontWeight:700}}>+</button>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={lb}>{"שעות"}</label>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="time" value={form.subFrom||dStart()} onChange={e=>setForm({...form,subFrom:e.target.value})} style={{...inp,flex:1}}/>
            <span>{"עד"}</span>
            <input type="time" value={form.subTo||dEnd()} onChange={e=>setForm({...form,subTo:e.target.value})} style={{...inp,flex:1}}/>
          </div>
        </div>
        <div style={{marginBottom:14}}><label style={lb}>{"הערות"}</label><textarea value={form.subNotes||""} onChange={e=>setForm({...form,subNotes:e.target.value})} style={{...inp,minHeight:60}}/></div>
        <button onClick={completeSub} style={{...sb,background:C.grn}}>{"✓ שמור"}</button>
      </div></div>;
    }

    // ─── CONFIRM DELETE SUB ───
    if(modal==="confirmDelSub"){
      const sub=(data.subContracts||[]).find(s=>s.id===form.subId);
      if(!sub)return null;
      const dateKey=form.subDate||todayISO;
      const multipleDates=(sub.dates||[]).length>1;
      return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
        <h3 style={{fontSize:17,color:C.red,textAlign:"center",marginBottom:14}}>{"🗑 מחק "+sub.name+"?"}</h3>
        {multipleDates ? <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={()=>{removeSubFromDay(form.subId,dateKey);setModal(null);setForm({});}} style={{padding:"14px",borderRadius:10,border:"2px solid "+C.org,background:"#fff",color:C.org,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"רק היום הזה"}</button>
          <button onClick={()=>{delSub(form.subId);setModal(null);setForm({});}} style={{padding:"14px",borderRadius:10,border:"2px solid "+C.red,background:C.red,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"מחק הכל"}</button>
          <button onClick={close} style={{padding:"10px",borderRadius:10,border:"1px solid "+C.bdr,background:"#fff",color:C.txtM,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
        </div> : <div style={{display:"flex",gap:8}}>
          <button onClick={close} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid "+C.bdr,background:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{"ביטול"}</button>
          <button onClick={()=>{delSub(form.subId);setModal(null);setForm({});}} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:C.red,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"מחק"}</button>
        </div>}
      </div></div>;
    }

    // ─── ADD SITE QUICK ───
    if(modal==="addSiteQuick")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:17,color:C.grn,marginBottom:14}}>{"הוסף אתר / פרויקט"}</h3>
      <div style={{marginBottom:10}}><input value={form.newSiteName||""} onChange={e=>setForm({...form,newSiteName:e.target.value})} placeholder={"שם"} style={inp}/></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>{if(!(form.newSiteName||"").trim())return;up(d=>{d.devSites=[...(d.devSites||[]),{id:uid(),name:form.newSiteName.trim(),deadline:"",status:"active"}];});setForm({});setModal(null);}} style={{flex:1,...sb,background:C.blu}}>{"🌱 פרויקט"}</button>
        <button onClick={()=>{if(!(form.newSiteName||"").trim())return;up(d=>{d.maintenanceSites=[...(d.maintenanceSites||[]),{id:uid(),name:form.newSiteName.trim(),frequency:"כל שבוע"}];});setForm({});setModal(null);}} style={{flex:1,...sb,background:C.org}}>{"🔧 תחזוקה"}</button>
      </div>
    </div></div>;

    // ─── RESET ───
    if(modal==="reset")return <div onClick={close} style={ov}><div onClick={e=>e.stopPropagation()} style={bx}>
      <h3 style={{fontSize:17,color:C.red,textAlign:"center",marginBottom:10}}>{"⚠️ למחוק הכל?"}</h3>
      <div style={{display:"flex",gap:8}}>
        <button onClick={async()=>{await save({...INIT});setData({...INIT});setModal(null);}} style={{flex:1,padding:14,borderRadius:10,border:"none",background:C.red,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"כן"}</button>
        <button onClick={close} style={{flex:1,padding:14,borderRadius:10,border:"1px solid "+C.bdr,background:C.wht,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"לא"}</button>
      </div>
    </div></div>;

    return null;
  };

  // ZOOM IMAGE OVERLAY
  const zoomOverlay = zoomImg && <div onClick={()=>setZoomImg(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}}>
    <button onClick={()=>setZoomImg(null)} style={{position:"absolute",top:20,right:20,background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",width:40,height:40,borderRadius:"50%",fontSize:20,cursor:"pointer",fontFamily:"inherit"}}>{"×"}</button>
    <img src={typeof zoomImg==="string"?zoomImg:zoomImg.image} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}} alt=""/>
    {typeof zoomImg!=="string" && <div style={{position:"absolute",bottom:20,left:20,right:20,padding:"10px 14px",background:"rgba(0,0,0,0.7)",color:"#fff",borderRadius:10,fontSize:13}}>
      {zoomImg.siteId && <div style={{fontWeight:700,marginBottom:4}}>{sn(zoomImg.siteId)}</div>}
      {zoomImg.photoType && <span style={{padding:"2px 8px",borderRadius:6,fontSize:11,background:zoomImg.photoType==="before"?"#fff3cd":"#d8f3dc",color:zoomImg.photoType==="before"?C.org:C.grn,marginLeft:8}}>{zoomImg.photoType==="before"?"לפני":"אחרי"}</span>}
      {zoomImg.note && <div style={{fontSize:12,marginTop:4,opacity:0.9}}>{zoomImg.note}</div>}
      {zoomImg.date && <div style={{fontSize:11,opacity:0.7,marginTop:4}}>{fmtFull(zoomImg.date)}</div>}
    </div>}
  </div>;

  return(<div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Rubik',sans-serif",direction:"rtl",color:C.txt,maxWidth:480,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,0.08)"}}>
    {header}
    <div style={{paddingBottom:20}}>
      {cv==="monthly"&&monthlyView}
      {cv==="weekly"&&weeklyView}
      {cv==="daily"&&dailyView}
      {cv==="gallery"&&galleryView}
      {cv==="projects"&&projectsView}
      {cv==="settings"&&settingsView}
    </div>
    {renderModal()}
    {zoomOverlay}
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
